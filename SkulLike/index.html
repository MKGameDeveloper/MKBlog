  new BossSpec('폭탄 사과나무', BossArchetype.caster, BossShape.humanoid, new Color(0xFF6D4C41), 340, 40, { visual: 'appleTree' }),
];
const _tier1 = [
  new BossSpec('바위 골렘', BossArchetype.jumper, BossShape.golem, new Color(0xFF8D6E63), 520, 110, { visual: 'golem' }),
  new BossSpec('숲의 마녀', BossArchetype.caster, BossShape.humanoid, new Color(0xFF00B4D8), 440, 70, { visual: 'witch' }),
  new BossSpec('용병단장', BossArchetype.flurry, BossShape.humanoid, new Color(0xFFFFB300), 500, 120, { visual: 'mercenary' }),
  new BossSpec('암석괴인', BossArchetype.jumper, BossShape.golem, new Color(0xFF757575), 580, 100, { visual: 'rockBrute' }),
  new BossSpec('미이라', BossArchetype.flurry, BossShape.humanoid, new Color(0xFFCDBE9A), 500, 95, { visual: 'mummy' }),
  new BossSpec('그레이트 웜', BossArchetype.jumper, BossShape.beast, new Color(0xFF8E6E53), 600, 90, { visual: 'worm' }),
  new BossSpec('용인족 전사', BossArchetype.charger, BossShape.humanoid, new Color(0xFF2E7D32), 580, 130, { visual: 'dragonkin' }),
];
const _tier2 = [
  new BossSpec('데스 나이트', BossArchetype.iaido, BossShape.humanoid, new Color(0xFFEF476F), 660, 150, { visual: 'knight' }),
  new BossSpec('도적 대장', BossArchetype.flurry, BossShape.humanoid, new Color(0xFF26A69A), 600, 165, { visual: 'bandit' }),
  new BossSpec('마왕', BossArchetype.caster, BossShape.humanoid, new Color(0xFFB5179E), 760, 90, { visual: 'demonKing' }),
  new BossSpec('도플갱어', BossArchetype.iaido, BossShape.humanoid, new Color(0xFF455A64), 680, 160, { visual: 'doppel' }),
  new BossSpec('늑대왕', BossArchetype.charger, BossShape.beast, new Color(0xFF5C6BC0), 700, 175, { visual: 'wolfKing' }),
  new BossSpec('거미 여제', BossArchetype.caster, BossShape.beast, new Color(0xFF6A1B9A), 700, 120, { visual: 'spider' }),
  new BossSpec('드래곤', BossArchetype.jumper, BossShape.beast, new Color(0xFFD32F2F), 800, 135, { visual: 'dragon' }),
];

const _biomeBoss = {
  [Biome.forest]: ['boar', 'witch', 'eagle', 'appleTree'],
  [Biome.darkForest]: ['witch', 'boar', 'wolfKing', 'appleTree'],
  [Biome.silentJungle]: ['eagle', 'witch', 'worm', 'appleTree', 'spider', 'dragonkin'],
  [Biome.cave]: ['golem', 'goblin', 'rockBrute', 'worm', 'spider'],
  [Biome.crystalMine]: ['golem', 'witch', 'rockBrute', 'spider'],
  [Biome.dwarfMine]: ['golem', 'goblin', 'rockBrute', 'worm'],
  [Biome.goblinCamp]: ['goblin', 'bandit'],
  [Biome.ruins]: ['demonKing', 'bandit', 'mummy'],
  [Biome.volcano]: ['demonKing', 'golem', 'rockBrute', 'dragon', 'dragonkin'],
  [Biome.magma]: ['demonKing', 'rockBrute', 'dragon'],
  [Biome.dragonLair]: ['dragon', 'dragonkin', 'demonKing', 'eagle', 'worm'],
  [Biome.bearCave]: ['boar', 'golem', 'redBear', 'wolfKing'],
  [Biome.keep]: ['knight', 'mercenary', 'doppel', 'mummy'],
  [Biome.kingdom]: ['knight', 'bandit', 'doppel'],
  [Biome.abyss]: ['demonKing', 'knight', 'doppel', 'worm', 'spider'],
  [Biome.bloodRiver]: ['bandit', 'demonKing', 'wolfKing'],
};

function _darkBiome(b) { return b === Biome.darkForest || b === Biome.abyss || b === Biome.ruins || b === Biome.bloodRiver || b === Biome.silentJungle; }
function _humanBiome(b) { return b === Biome.keep || b === Biome.kingdom || b === Biome.ruins || b === Biome.abyss || b === Biome.goblinCamp || b === Biome.bloodRiver; }
function _fireBiome(b) { return b === Biome.volcano || b === Biome.magma || b === Biome.dragonLair; }

function pickBoss(floor, rng, used = null, biome = null) {
  const tier = floor <= 7 ? _tier0 : (floor <= 13 ? _tier1 : _tier2);
  const seen = used || new Set();
  let fresh = tier.where(b => !seen.contains(b.name)).toList();
  if (fresh.isEmpty) {
    fresh = [..._tier0, ..._tier1, ..._tier2].where(b => !seen.contains(b.name)).toList();
  }
  const pool = fresh.isNotEmpty ? fresh : tier;
  if (biome !== null) {
    const pref = _biomeBoss[biome] || [];
    const themed = pool.where(b => pref.contains(b.visual)).toList();
    if (themed.isNotEmpty) return themed[rng.nextInt(themed.length)];
  }
  return pool[rng.nextInt(pool.length)];
}

// =====================================================================
//  world.dart  (GameWorld — game logic / loop)
// =====================================================================
class GameWorld {
  constructor(meta, opts = {}) {
    this.rng = new Random();
    this.meta = meta;
    this.town = opts.town === undefined ? false : opts.town;

    this.graph = null;
    this.floor = 1;
    this.totalFloors = 20;
    this.currentNodeId = 0;
    this.roomType = RoomType.start;
    this.biome = null;

    this.player = null;
    this._playerReady = false;
    this.enemies = [];
    this.allies = [];
    this.killStacks = 0;
    this.paladinSwordTimer = 0;
    this.paladinSwordX = 0;
    this.paladinSwordY = 0;
    this.paladinSwordBuff = false;
    this.shieldCrystal = null;
    this.shieldCrystalHp = 0;
    this._crystalHitSwing = false;
    this.boss = null;
    this.projectiles = [];
    this.particles = [];
    this.skillFx = [];
    this.ground = Rect.zero;
    this.groundSegments = [];
    this.platforms = [];
    this.solids = [];
    this.doors = [];
    this.shopItems = [];
    this.bushes = [];
    this.traps = [];
    this.mines = [];
    this.storms = [];
    this.props = [];
    this.chest = null;
    this.roomWidth = 0;

    this.combatNoise = 0;
    this.noiseX = 0; this.noiseY = 0;
    this.exitPortal = null;
    this.roomCleared = false;
    this.enterPrompt = null;

    this.skullDrops = [];
    this.activeDrop = null;

    this.blacksmithRect = Rect.zero;
    this.traitsRect = Rect.zero;
    this.graveyardRect = Rect.zero;
    this.departRect = Rect.zero;
    this.uiRequest = TownUI.none;
    this.townPrompt = null;
    this.townPromptPos = null;
    this.graveyardCost = 40;
    this.pullsUsed = 0;
    // altar: a prayed-for weapon falls from the sky and embeds; the player must
    // then interact with it to acquire (a one-time start weapon, replaceable).
    this.altarWeapon = null;
    this.altarFall = 0; // 0..1 sky-fall progress

    this.skullSlots = [];
    this.activeSlot = 0;
    this.gold = 0;
    this.shopAtk = 1.0;
    this.lifesteal = 0;
    this.maxHp = 100;
    this.curHp = 100;
    this.runSouls = 0;

    this.phase = GamePhase.playing;
    this.kills = 0;

    this.moveLeft = false; this.moveRight = false;
    this.moveUp = false; this.moveDown = false;
    this._jumpQueued = false;
    this._attackQueued = false;
    this._interactQueued = false;
    this._dodgeQueued = false;
    this._skillQueued = false;
    this._swapQueued = false;
    this._slot1Queued = false;
    this._slot2Queued = false;

    this.camX = 0;
    this.camY = 0;
    this.camMinY = 0;
    this.shake = 0;
    this.clock = 0;
    this.bannerTimer = 0;
    this.bannerText = '';
    this._transitionCd = 0;

    if (this.town) this._enterTown();
    else this._startRun();
  }

  queueJump() { this._jumpQueued = true; }
  queueAttack() { this._attackQueued = true; }
  queueInteract() { this._interactQueued = true; }
  queueDodge() { this._dodgeQueued = true; }
  queueSkill() { this._skillQueued = true; }
  queueSwap() { this._swapQueued = true; }
  queueSlot1() { this._slot1Queued = true; }
  queueSlot2() { this._slot2Queued = true; }
  closeUI() { this.uiRequest = TownUI.none; }

  devGiveSkull(t) {
    const s = skull(t);
    if (this.skullSlots.isEmpty) {
      this.skullSlots = [s];
      this.activeSlot = 0;
    } else {
      this.activeSlot = this.activeSlot.clamp(0, this.skullSlots.length - 1);
      this.skullSlots[this.activeSlot] = s;
    }
    this.player.skulls = this.skullSlots.slice();
    this.player.active = this.activeSlot;
    this.player.skillTimer = 0;
    if (this.town) {
      this.meta.preparedSkull = t;
      this.meta.save();
    }
    this._banner('[DEV] ' + s.name + ' 장착', 1.6);
  }

  get node() { return this.graph.byId(this.currentNodeId); }

  get atkMul() {
    let f = 1;
    if (this.player.hasStatus(StatusKind.weaken)) f *= 0.7;
    if (this.player.hasStatus(StatusKind.atkUp)) f *= 1.4;
    if (this.player.flyTimer > 0) f *= 1.9;
    if (this.player.auraTimer > 0) f *= 1.4;
    if (this.paladinSwordBuff) f *= 1.8;
    return this.player.skull.atkMul * this.shopAtk *
      (1 + this.meta.bonusAtkMul + this.meta.atkTraitMul(this.player.skull.category)) *
      this._passiveAtkMul() * f;
  }

  get _passive() { return passiveOf(this.player.skull.type); }

  _passiveAtkMul() {
    const pv = this._passive;
    switch (pv.kind) {
      case PassiveKind.atkUp:
        return 1.0 + pv.value;
      case PassiveKind.berserk: {
        const frac = (this.player.hp / this.player.maxHp).clamp(0.0, 1.0);
        return 1.0 + pv.value * (1 - frac);
      }
      case PassiveKind.killStack:
        return 1.0 + this.killStacks * pv.value;
      default:
        return 1.0;
    }
  }

  _critMul() {
    const pv = this._passive;
    if (pv.kind === PassiveKind.crit && this.rng.nextDouble() < pv.value) return 1.8;
    return 1.0;
  }

  _playerOnHit(e) {
    const pv = this._passive;
    switch (pv.kind) {
      case PassiveKind.bleedHit:
        e.addStatus(StatusKind.bleed, 2.5, pv.value * this.atkMul);
        break;
      case PassiveKind.burnHit:
        if (this.rng.nextDouble() < pv.value) e.addStatus(StatusKind.burn, 2.5, 5 * this.atkMul);
        break;
      case PassiveKind.poisonHit:
        e.addStatus(StatusKind.poison, 3.5, pv.value);
        break;
      case PassiveKind.slowHit:
        e.addStatus(StatusKind.slow, 1.8, 1);
        break;
      case PassiveKind.stunHit:
        if (!(e instanceof Boss) && this.rng.nextDouble() < pv.value) e.addStatus(StatusKind.stun, 0.5, 1);
        break;
      case PassiveKind.execute:
        if (!(e instanceof Boss) && this.rng.nextDouble() < pv.value) {
          e.damage(99999);
          this._fx('runes', e.cx, e.cy, 0.4, new Color(0xFF18FFFF), { size: 40 });
        }
        break;
      default:
        break;
    }
  }

  _updateStatuses(e, dt) {
    if (e.statuses.isEmpty) return;
    for (const s of e.statuses) {
      s.timer -= dt;
      switch (s.kind) {
        case StatusKind.poison:
        case StatusKind.burn:
        case StatusKind.bleed:
        case StatusKind.infect:
          e.hp -= s.power * dt;
          if (e.hp <= 0 && !e.dead) { e.hp = 0; e.dead = true; }
          break;
        case StatusKind.stun:
        case StatusKind.bind:
          e.hurtTimer = max(e.hurtTimer, s.timer);
          break;
        case StatusKind.regen:
          e.hp = min(e.maxHp, e.hp + s.power * dt);
          break;
        default:
          break;
      }
    }
    e.statuses.removeWhere(s => s.timer <= 0);
  }

  // ---------------- TOWN ----------------
  _enterTown() {
    this.floor = 0;
    this.biome = kBiomes[Biome.ruins];
    this.roomWidth = 2400;
    this.maxHp = 100 + this.meta.bonusMaxHp + this.meta.traitBonusHp;
    this.curHp = this.maxHp;
    this.shopAtk = 1.0;
    this.pullsUsed = 0;
    this.altarWeapon = null;
    this.altarFall = 0;
    this.skullSlots = [skull(this.meta.startSkull)];
    this.activeSlot = 0;
    this.ground = Rect.fromLTWH(0, kGroundY, this.roomWidth, 320);
    this.groundSegments = [this.ground];
    this.solids = [
      this.ground,
      Rect.fromLTWH(-60, -600, 60, 1600),
      Rect.fromLTWH(this.roomWidth, -600, 60, 1600),
    ];
    this.platforms = [];
    this.enemies = [];
    this.boss = null;
    this.doors = [];
    this.shopItems = [];
    this.bushes = [];
    this.traps = [];
    this.mines = [];
    this.storms = [];
    this.chest = null;
    this.exitPortal = null;
    this.projectiles = [];
    this.particles = [];
    this.skillFx = [];
    this.skullDrops = [];
    this.activeDrop = null;
    this.blacksmithRect = Rect.fromLTWH(this.roomWidth * 0.24 - 40, kGroundY - 92, 80, 92);
    this.traitsRect = Rect.fromLTWH(this.roomWidth * 0.36 - 30, kGroundY - 130, 60, 130);
    this.graveyardRect = Rect.fromLTWH(this.roomWidth - 250, kGroundY - 120, 150, 120);
    this.departRect = Rect.fromLTWH(this.roomWidth * 0.5 - 38, kGroundY - 158, 76, 158);
    this.player = new Player(this.roomWidth * 0.42, kGroundY - 50, this.skullSlots[0], this.meta.dodgeCharges, this.maxHp);
    this.camX = 0;
    this.camY = 0;
    this.camMinY = 0;
    this.phase = GamePhase.playing;
    this._snapCamera();
    this._banner('망자의 마을', 1.8);
  }

  _updateTown(dt) {
    // a prayed-for weapon descends from the sky and embeds into the altar
    if (this.altarWeapon !== null && this.altarFall < 1) {
      const prev = this.altarFall;
      this.altarFall = min(1, this.altarFall + dt * 2.4);
      if (prev < 1 && this.altarFall >= 1) this._altarImpact();
    }
    if (this.uiRequest !== TownUI.none) {
      this._clearInput();
      this._updateParticles(dt);
      return;
    }
    this._updatePlayer(dt);
    this._updateProjectiles(dt);
    this._updateParticles(dt);
    this._handleTownInteract();
    this._camera(dt);
    this._clearInput();
  }

  _handleTownInteract() {
    this.townPrompt = null;
    this.townPromptPos = null;
    const p = this.player;
    const prompt = (s) => { this.townPrompt = s; this.townPromptPos = new Offset(p.cx, p.y - 26); };

    if (p.rect.overlaps(this.departRect.inflate(30))) {
      prompt('E: 모험 시작');
      if (this._interactQueued) this.uiRequest = TownUI.depart;
    } else if (p.rect.overlaps(this.blacksmithRect.inflate(40))) {
      prompt('E: 대장장이 (강화)');
      if (this._interactQueued) this.uiRequest = TownUI.blacksmith;
    } else if (p.rect.overlaps(this.traitsRect.inflate(40))) {
      prompt('E: 영혼의 비석 (특성)');
      if (this._interactQueued) this.uiRequest = TownUI.traits;
    } else if (p.rect.overlaps(this.graveyardRect.inflate(40))) {
      if (this.altarWeapon !== null && this.altarFall >= 1) {
        // a weapon is embedded — interact to acquire it
        const s = skull(this.altarWeapon);
        prompt('E: 무기 획득 — [' + tierLabel(s.tier) + '] ' + s.name);
        if (this._interactQueued) this._takeAltarWeapon();
      } else if (this.altarWeapon !== null) {
        prompt('무기가 제단으로 내려오는 중...');
      } else {
        const left = this.meta.maxPulls - this.pullsUsed;
        prompt(left > 0
          ? 'E: 제단에서 기도 (영혼 ' + this.graveyardCost + ' · 남은 ' + left + '회)'
          : '제단: 이번 방문 기도 소진 (다음 방문에 가능)');
        if (this._interactQueued) this._prayAltar();
      }
    }
  }

  // pray: roll a one-time weapon and make it fall from the sky into the altar.
  _prayAltar() {
    if (this.pullsUsed >= this.meta.maxPulls) {
      this._banner('이번 방문엔 더 기도할 수 없다', 1.6);
      return;
    }
    if (this.meta.souls < this.graveyardCost) {
      this._banner('영혼이 부족하다 (' + this.graveyardCost + ' 필요)', 1.6);
      return;
    }
    const pool = SkullType.values.where(t => t !== SkullType.basic);
    this.meta.souls -= this.graveyardCost;
    this.pullsUsed++;
    this.altarWeapon = rollSkull(this.rng, pool, this.meta.luckMul);
    this.altarFall = 0;
    this.shake = max(this.shake, 0.16);
    this._banner('기도가 응답했다 — 하늘에서 무기가 내려온다...', 1.8);
    const eye = skull(this.altarWeapon).eye;
    for (let i = 0; i < 20; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      this.particles.add(new Particle(this.graveyardRect.center.dx, this.graveyardRect.bottom - 60, cos(a) * 120, -this.rng.nextDouble() * 220 - 40, 0.7, 4, eye, 120));
    }
  }

  // the weapon strikes home: shake, burst, and a prompt to pick it up.
  _altarImpact() {
    const gx = this.graveyardRect.center.dx;
    const gy = this.graveyardRect.bottom - 60;
    const eye = skull(this.altarWeapon).eye;
    this.shake = max(this.shake, 0.3);
    this._fx('ring', gx, gy, 0.45, eye, { size: 80 });
    this._fx('crack', gx, gy, 0.4, new Color(0xFFFFD166), { size: 90 });
    for (let i = 0; i < 24; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp2 = 120 + this.rng.nextDouble() * 200;
      this.particles.add(new Particle(gx, gy, cos(a) * sp2, sin(a) * sp2 - 60, 0.5 + this.rng.nextDouble() * 0.4, 4 + this.rng.nextDouble() * 4, (i % 2 === 0) ? eye : new Color(0xFFFFF59D), 360));
    }
    this._banner('무기가 제단에 박혔다 — E로 획득', 2.0);
  }

  // acquire the embedded weapon as the (one-time, replaceable) start weapon.
  _takeAltarWeapon() {
    const t = this.altarWeapon;
    if (t === null) return;
    this.meta.preparedSkull = t;
    this.meta.save();
    this.skullSlots[0] = skull(t);
    this.player.skulls = this.skullSlots.slice();
    this.player.active = this.activeSlot.clamp(0, this.skullSlots.length - 1);
    const s = skull(t);
    this.altarWeapon = null;
    this.altarFall = 0;
    this._banner('[' + tierLabel(s.tier) + '] ' + s.name + ' 무기 획득!  (이번 런 1회성 시작 무기)', 2.4);
    for (let i = 0; i < 22; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      this.particles.add(new Particle(this.player.cx, this.player.cy, cos(a) * 160, sin(a) * 160 - 40, 0.6, 4, s.eye, 200));
    }
  }

  // ---------------- RUN ----------------
  _startRun() {
    this.floor = 1;
    this.gold = 0;
    this.meta.usedBosses.clear();
    this.shopAtk = 1.0;
    this.lifesteal = 0;
    this.maxHp = 100 + this.meta.bonusMaxHp + this.meta.traitBonusHp;
    this.curHp = this.maxHp;
    this.kills = 0;
    this.runSouls = 0;
    const startType = this.meta.takeStartSkull();
    this.meta.save();
    this.skullSlots = [skull(startType)];
    this.activeSlot = 0;
    this.phase = GamePhase.playing;
    this.graph = generateFloor(1, this.rng);
    this._enterRoom(this.graph.startId);
  }

  _enterRoom(id) {
    this.currentNodeId = id;
    const n = this.graph.byId(id);
    this.roomType = n.type;
    this.biome = kBiomes[this.graph.biome];
    const data = buildRoom(n, this.floor, this.rng, this.graph, this.meta.usedBosses);
    this.roomWidth = data.width;
    this.ground = data.ground;
    this.groundSegments = data.groundSegments.isEmpty ? [data.ground] : data.groundSegments;
    this.camMinY = data.camMinY;
    this.platforms = data.platforms;
    this.solids = data.solids;
    this.doors = data.doors;
    this.shopItems = data.shopItems;
    this.bushes = data.bushes;
    this.traps = data.traps;
    this.mines = [];
    this.storms = [];
    this.chest = data.chest;
    this.exitPortal = null;
    this.enterPrompt = null;
    this.skullDrops = [];
    this.activeDrop = null;
    this.projectiles = [];
    this.particles = [];
    this.skillFx = [];
    this.camX = 0;
    this.camY = 0;
    this._transitionCd = 0.3;

    const carried = this._playerReady ? this.player.statuses.slice() : [];
    this.player = new Player(120, kGroundY - 50, this.skullSlots[this.activeSlot], this.meta.dodgeCharges, this.maxHp);
    this.player.skulls = this.skullSlots.slice();
    this.player.active = this.activeSlot;
    this.player.hp = this.curHp.clamp(1, this.maxHp);
    this.player.statuses.addAll(carried);
    this._playerReady = true;

    this.enemies = data.spawns.map(s => this._scaleEnemy(this._makeEnemy(s)));
    this.allies = this.allies.where(a => a.persistent).toList();
    for (const a of this.allies) {
      a.x = this.player.x + (this.rng.nextDouble() * 30 - 15);
      a.y = this.player.y;
      a.vx = 0;
      a.vy = 0;
      a.facing = this.player.facing;
    }
    this.shieldCrystal = null;
    this.shieldCrystalHp = 0;
    this._crystalHitSwing = false;
    if (this.enemies.any(e => e.kind === EnemyKind.shield)) {
      const cxp = (this.roomWidth * 0.72).clamp(360.0, this.roomWidth - 80.0);
      this.shieldCrystal = Rect.fromLTWH(cxp - 12, kGroundY - 54, 24, 54);
      this.shieldCrystalHp = 60 + this.floor * 4;
    }
    if (n.type === RoomType.boss && data.boss !== null) {
      const b = new Boss(data.boss, (this.roomWidth * 0.62).clamp(300.0, this.roomWidth - 240), kGroundY - 96);
      b.maxHp *= this._floorHpMul;
      b.hp = data.boss.maxHp * this._floorHpMul;
      b.dr = this._floorDr;
      this.boss = b;
    } else {
      this.boss = null;
    }
    this.props = data.props;

    this.roomCleared = n.type === RoomType.start || n.type === RoomType.shop;
    if (this.roomCleared) n.cleared = true;

    switch (n.type) {
      case RoomType.start:
        this._banner(this.floor + '층 · ' + this.biome.name, 1.8);
        break;
      case RoomType.combat:
        this._banner('전투의 방', 1.0);
        break;
      case RoomType.shop:
        this._banner('상점 (E로 구매)', 1.6);
        break;
      case RoomType.boss:
        this._banner('보스 — ' + data.boss.name, 2.2);
        this.shake = 0.4;
        break;
    }
    this._snapCamera();
  }

  _makeEnemy(s) {
    let e;
    switch (s.kind) {
      case EnemyKind.grunt:
        e = new Enemy(s.kind, s.x, s.y - 40, 32, 40, 26, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.bat:
        return new Enemy(s.kind, s.x, s.y, 32, 24, 16, this.rng.nextDouble() * 6);
      case EnemyKind.gargoyle:
        return new Enemy(s.kind, s.x, s.y - 90, 34, 30, 36, this.rng.nextDouble() * 6);
      case EnemyKind.ghoul:
        e = new Enemy(s.kind, s.x, s.y - 40, 28, 40, 28, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.mage:
        return new Enemy(s.kind, s.x, s.y - 46, 30, 46, 22, this.rng.nextDouble() * 6);
      case EnemyKind.fireMage:
        e = new Enemy(s.kind, s.x, s.y - 46, 30, 46, 24, this.rng.nextDouble() * 6);
        e.atkCd = 0.8 + this.rng.nextDouble(); return e;
      case EnemyKind.slime:
        e = new Enemy(s.kind, s.x, s.y - 26, 36, 26, 20, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.archer:
        e = new Enemy(s.kind, s.x, s.y - 44, 30, 44, 20, this.rng.nextDouble() * 6);
        e.atkCd = 0.6 + this.rng.nextDouble(); return e;
      case EnemyKind.brute:
        e = new Enemy(s.kind, s.x, s.y - 54, 46, 54, 60, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.goblin:
        e = new Enemy(s.kind, s.x, s.y - 32, 26, 32, 18, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.assassin:
        e = new Enemy(s.kind, s.x, s.y - 42, 26, 42, 24, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; e.atkCd = 0.5 + this.rng.nextDouble(); return e;
      case EnemyKind.heretic:
        e = new Enemy(s.kind, s.x, s.y - 44, 28, 44, 26, this.rng.nextDouble() * 6);
        e.atkCd = 0.8 + this.rng.nextDouble(); return e;
      case EnemyKind.thief:
        e = new Enemy(s.kind, s.x, s.y - 36, 26, 36, 20, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; e.atkCd = 0.4 + this.rng.nextDouble(); return e;
      case EnemyKind.knightSoldier:
        e = new Enemy(s.kind, s.x, s.y - 46, 30, 46, 44, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; e.atkCd = 0.8 + this.rng.nextDouble(); return e;
      case EnemyKind.brawler:
        e = new Enemy(s.kind, s.x, s.y - 40, 28, 40, 32, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.dwarf:
        e = new Enemy(s.kind, s.x, s.y - 38, 38, 38, 52, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.darkElf:
        e = new Enemy(s.kind, s.x, s.y - 46, 30, 46, 26, this.rng.nextDouble() * 6);
        e.atkCd = 0.8 + this.rng.nextDouble(); return e;
      case EnemyKind.plant:
        e = new Enemy(s.kind, s.x, s.y - 30, 36, 30, 34, this.rng.nextDouble() * 6);
        e.t2 = 0; e.plantVariant = this.floor < 2 ? 0 : this.rng.nextInt(4); return e;
      case EnemyKind.hammer:
        e = new Enemy(s.kind, s.x, s.y - 56, 46, 56, 80, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
      case EnemyKind.shield:
        e = new Enemy(s.kind, s.x, s.y - 52, 42, 52, 90, this.rng.nextDouble() * 6);
        e.facing = this.rng.nextBool() ? 1 : -1; return e;
    }
  }

  update(dt) {
    if (dt > 0.05) dt = 0.05;
    this.clock += dt;
    if (this.shake > 0) this.shake -= dt;
    if (this.bannerTimer > 0) this.bannerTimer -= dt;
    if (this._transitionCd > 0) this._transitionCd -= dt;
    if (this.chest !== null) this.chest.t += dt;

    if (this.town) { this._updateTown(dt); return; }

    if (this.phase !== GamePhase.playing) {
      this._updateParticles(dt);
      this._clearInput();
      return;
    }

    this._updatePlayer(dt);
    this._updateStatuses(this.player, dt);
    if (this._passive.kind === PassiveKind.regenIdle && !this.player.dead) {
      this.player.hp = min(this.player.maxHp, this.player.hp + this._passive.value * dt);
    }
    this.curHp = this.player.hp;
    if (this.player.dead && this.phase === GamePhase.playing) {
      this.phase = GamePhase.gameover;
      this._banner('GAME OVER', 999);
    }
    if (this.combatNoise > 0) this.combatNoise -= dt;
    this.player.hidden = !this.player.attacking && this.player.dodgeTimer <= 0 &&
      this.bushes.any(b => this.player.rect.overlaps(b.rect));
    for (const e of this.enemies) {
      this._updateEnemyAggro(e, dt);
      this._updateEnemy(e, dt);
    }
    if (this.boss !== null) this._updateBoss(this.boss, dt);
    for (const a of this.allies) this._updateAlly(a, dt);
    this.allies.removeWhere(a => {
      if (a.life <= 0 || a.dead) { this._allyPoof(a); return true; }
      return false;
    });
    this._updateProjectiles(dt);
    this._updateParticles(dt);
    this._updateTraps(dt);
    this._updateMines(dt);
    this._updateStorms(dt);
    this._spreadInfection(dt);
    this._resolveCombat();

    const splits = [];
    this.enemies.removeWhere(e => {
      if (e.dead) {
        if (e.hasStatus(StatusKind.infect)) this._plagueContagion(e.cx, e.cy);
        this._deathBurst(e);
        this.kills++;
        this.runSouls += 2;
        this._awardGold(3 + this.rng.nextInt(4) + this.floor);
        if (passiveOf(this.player.skull.type).kind === PassiveKind.killStack) this.killStacks++;
        if (this.player.skull.type === SkullType.voidlord && this.allies.where(a => a.persistent).length < 5) {
          this._spawnVoidMinion(e.cx, e.y);
        }
        if (e.kind === EnemyKind.slime && e.w >= 34) {
          for (let i = -1; i <= 1; i += 2) {
            const sl = new Enemy(EnemyKind.slime, e.x, e.y - 8, 22, 16, 8, this.rng.nextDouble() * 6);
            sl.facing = i; sl.aggro = true; sl.aggroTimer = 3.5; sl.vx = i * 120.0; sl.vy = -260;
            splits.add(sl);
          }
        }
        return true;
      }
      return false;
    });
    this.enemies.addAll(splits);
    if (this.boss !== null && this.boss.dead) {
      this._deathBurst(this.boss);
      this._awardGold(25 + this.floor * 5);
      this.runSouls += 15;
      if (passiveOf(this.player.skull.type).kind === PassiveKind.killStack) this.killStacks++;
      if (this.chest == null) this.chest = new Chest(this.roomWidth * 0.5, { groundY: kGroundY });
      this.boss = null;
      this._banner(this.floor >= this.totalFloors ? '최종 보스 처치!' : '포탈이 열렸다 → E로 입장', 2.4);
      this.exitPortal = Rect.fromLTWH(this.roomWidth * 0.66 - 35, kGroundY - 110, 70, 110);
    }

    if (this.roomType === RoomType.combat && !this.roomCleared && this.enemies.isEmpty) {
      this.roomCleared = true;
      this.node.cleared = true;
      this._banner('클리어! 문이 열렸다', 1.4);
    }

    this._handleTransitions();
    this._handleChest();
    this._handleShop();
    this._camera(dt);
    this.curHp = this.player.hp;
    this._clearInput();
  }

  _clearInput() {
    this._jumpQueued = this._attackQueued = this._interactQueued = false;
    this._dodgeQueued = this._skillQueued = this._swapQueued = false;
    this._slot1Queued = this._slot2Queued = false;
  }

  _handleChest() {
    const c = this.chest;
    if (c !== null && !c.opened) {
      if (this.player.rect.overlaps(c.rect.inflate(26))) {
        if (this.enterPrompt == null) this.enterPrompt = new Offset(this.player.cx, this.player.y - 24);
        if (this._interactQueued) {
          c.opened = true;
          this._interactQueued = false;
          this._openChest(c);
        }
      }
    }
    let nearest = null;
    let best = Infinity;
    for (const d of this.skullDrops) {
      const dx = (this.player.cx - d.x).abs();
      const dy = (this.player.cy - (kGroundY - 60)).abs();
      d.near = dx < 90 && dy < 180;
      if (d.near && dx < best) { best = dx; nearest = d; }
    }
    this.activeDrop = nearest;
    if (this.activeDrop !== null) {
      if (this._slot1Queued) this._equipSlot(0);
      if (this._slot2Queued) this._equipSlot(1);
    }
  }

  _openChest(c) {
    const equipped = new Set(this.skullSlots.map(s => s.type));
    const onGround = new Set(this.skullDrops.map(d => d.type));
    const avail = SkullType.values.where(t => !equipped.contains(t) && !onGround.contains(t));
    this.shake = max(this.shake, 0.2);
    for (let i = 0; i < 22; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      this.particles.add(new Particle(c.x, kGroundY - 30, cos(a) * 220, sin(a) * 220 - 100, 0.6, 4, new Color(0xFFFFD166), 400));
    }
    const rolled = rollSkull(this.rng, avail, this.meta.luckMul);
    if (rolled === null) {
      this._banner('이미 모든 해골을 보유 중', 1.8);
      return;
    }
    this.skullDrops.add(new SkullDrop(rolled, c.x));
    const s = skull(rolled);
    this._banner(`무기 발견 — [${tierLabel(s.tier)}] ${s.name}!  ·  1/2 키로 슬롯 선택`, 3.0);
  }

  _equipSlot(slot) {
    const drop = this.activeDrop;
    if (drop === null) return;
    const s = skull(drop.type);
    this.skullDrops.remove(drop);
    this.activeDrop = null;

    let displaced = null;
    if (slot === 0) {
      displaced = this.skullSlots[0];
      this.skullSlots[0] = s;
    } else {
      if (this.skullSlots.length < 2) {
        this.skullSlots.add(s);
      } else {
        displaced = this.skullSlots[1];
        this.skullSlots[1] = s;
      }
    }
    if (displaced !== null) this.skullDrops.add(new SkullDrop(displaced.type, drop.x));

    this.activeSlot = this.activeSlot.clamp(0, this.skullSlots.length - 1);
    this.player.skulls = this.skullSlots.slice();
    this.player.active = this.activeSlot;
    this._banner(displaced !== null
      ? `${s.name} 장착 · ${displaced.name} 내려놓음`
      : `${s.name} → 슬롯 ${slot + 1} 장착!`, 1.8);
  }

  _handleTransitions() {
    this.enterPrompt = null;
    if (this.exitPortal !== null && this.player.rect.overlaps(this.exitPortal)) {
      this.enterPrompt = new Offset(this.player.cx, this.player.y - 24);
      if (this._interactQueued && this._transitionCd <= 0) {
        if (this.floor >= this.totalFloors) {
          this.phase = GamePhase.victory;
          this.runSouls += 40;
          this._banner('승리! 모든 층 클리어 🏆', 999);
        } else {
          this.floor += 1;
          this.runSouls += 8;
          this.curHp = min(this.maxHp, this.curHp + 25);
          this.graph = generateFloor(this.floor, this.rng);
          this._enterRoom(this.graph.startId);
        }
      }
      return;
    }
    if (!this.roomCleared) return;
    for (const d of this.doors) {
      if (this.player.rect.overlaps(d.rect)) {
        this.enterPrompt = new Offset(this.player.cx, this.player.y - 24);
        if (this._interactQueued && this._transitionCd <= 0) this._enterRoom(d.target);
        return;
      }
    }
  }

  _handleShop() {
    if (this.roomType !== RoomType.shop || !this._interactQueued) return;
    for (const it of this.shopItems) {
      if (it.bought) continue;
      if (!this.player.rect.overlaps(it.pedestal.inflate(34))) continue;
      if (this.gold < it.cost) { this._banner('골드가 부족하다', 1.0); return; }
      this.gold -= it.cost;
      it.bought = true;
      switch (it.kind) {
        case 'heal': this.player.hp = min(this.player.maxHp, this.player.hp + 50); break;
        case 'maxhp': this.maxHp += 25; this.player.maxHp = this.maxHp; this.player.hp += 25; break;
        case 'atk': this.shopAtk += 0.25; break;
        case 'shieldbuff': this.player.addStatus(StatusKind.shield, 20, 1); break;
        case 'regenbuff': this.player.addStatus(StatusKind.regen, 15, 4); break;
        case 'hastebuff': this.player.addStatus(StatusKind.haste, 18, 1); break;
        case 'atkupbuff': this.player.addStatus(StatusKind.atkUp, 15, 1); break;
        case 'lifesteal': this.lifesteal += 0.15; break;
      }
      this.curHp = this.player.hp;
      this._banner(`구매: ${it.name}`, 1.4);
      for (let i = 0; i < 14; i++) {
        const a = this.rng.nextDouble() * pi * 2;
        this.particles.add(new Particle(it.pedestal.center.dx, it.pedestal.top, cos(a) * 160, sin(a) * 160 - 80, 0.6, 4, new Color(0xFFFFD166), 400));
      }
      return;
    }
  }

  _awardGold(amount) { this.gold += amount; }

  _updateAlly(a, dt) {
    if (!a.persistent) a.life -= dt;
    a.animTime += dt;
    if (a.atkCd > 0) a.atkCd -= dt;
    if (a.jumpCd > 0) a.jumpCd -= dt;

    let target = null;
    let best = 1e9;
    for (const e of this.enemies) {
      if (e.dead) continue;
      const d = e.center.sub(a.center).distance;
      if (d < best) { best = d; target = e; }
    }
    if (this.boss !== null && !this.boss.dead) {
      const d = this.boss.center.sub(a.center).distance;
      if (d < best) { best = d; target = this.boss; }
    }

    a.vy += kGravity * dt;
    if (a.vy > 1200) a.vy = 1200;

    if (target !== null && best < 600) {
      const dx = target.cx - a.cx;
      const dy = target.cy - a.cy;
      a.facing = dx >= 0 ? 1 : -1;
      const inRange = dx.abs() <= 34 && dy.abs() <= 46;
      if (!inRange) {
        a.vx = a.facing * 165.0;
        const blocked = this._wallAhead(a) || !this._groundAhead(a);
        if (a.onGround && a.jumpCd <= 0 && (dy < -34 || blocked)) {
          a.vy = -860;
          a.onGround = false;
          a.jumpCd = 0.7;
        }
      } else {
        a.vx = 0;
        if (a.atkCd <= 0) {
          a.atkCd = 0.6;
          const t = target;
          if (t instanceof Boss) {
            this._damageBoss(t, a.atk * this.atkMul);
          } else {
            t.damage(a.atk * this.atkMul);
            if (t instanceof Enemy && t.kind !== EnemyKind.bat) t.vx = a.facing * 120;
          }
          if (a.source !== null) a.source.attackAnim = 0.25;
          this._hitSpark(target.cx, target.cy, a.facing);
        }
      }
    } else {
      const dx = this.player.cx - a.cx;
      if (dx.abs() > 60) {
        a.facing = dx >= 0 ? 1 : -1;
        a.vx = a.facing * 130.0;
      } else {
        a.vx = 0;
      }
    }

    for (const e of this.enemies) {
      if (!e.dead && e.rect.overlaps(a.rect)) a.damage(this._contactDmg(e.kind) * 1.6 * dt);
    }
    if (this.boss !== null && !this.boss.dead && this.boss.rect.overlaps(a.rect)) a.damage(40 * dt);

    this._moveAndCollide(a, dt);

    const src = a.source;
    if (src !== null) {
      src.x = a.x; src.y = a.y; src.facing = a.facing; src.animTime = a.animTime;
      src.hp = a.hp; src.maxHp = a.maxHp; src.vx = a.vx; src.vy = a.vy; src.onGround = a.onGround;
      src.aggro = false;
      if (src.attackAnim > 0) src.attackAnim -= dt;
    }
  }

  _allyPoof(a) {
    for (let i = 0; i < 12; i++) {
      const ang = this.rng.nextDouble() * pi * 2;
      this.particles.add(new Particle(a.cx, a.cy, cos(ang) * 120, sin(ang) * 120 - 40, 0.4, 4, new Color(0xFFB388FF), 80));
    }
  }

  _spawnVoidMinion(x, y) {
    const kinds = ['werewolf', 'werebear', 'deathknight', 'lich'];
    const kind = kinds[this.rng.nextInt(kinds.length)];
    const hp = (this.player.maxHp * 0.22).clamp(18.0, 80.0);
    const atk = kind === 'werebear' ? 16.0 : (kind === 'deathknight' ? 14.0 : (kind === 'lich' ? 11.0 : 12.0));
    const al = new Ally(x - 11, y, 99999.0, hp, { atk: atk, kind: kind, persistent: true });
    al.facing = this.player.facing; al.vy = -200;
    this.allies.add(al);
    this._fx('runes', x, y - 10, 0.45, new Color(0xFFE040FB), { size: 40 });
    for (let s = 0; s < 12; s++) {
      const ang = this.rng.nextDouble() * pi * 2;
      this.particles.add(new Particle(x, y, cos(ang) * 130, -this.rng.nextDouble() * 200, 0.5, 5, (s % 2 === 0) ? new Color(0xFFE040FB) : new Color(0xFF7E1FA0), 260));
    }
  }

  _moveAndCollide(e, dt, oneWay = true) {
    e.x += e.vx * dt;
    for (const s of this.solids) {
      if (e.rect.overlaps(s)) {
        const rise = (e.y + e.h) - s.top;
        if (e.vy >= -1 && rise > 0 && rise <= kStepUp && this._canStandAt(e, e.x, s.top - e.h)) {
          e.y = s.top - e.h;
          e.onGround = true;
          continue;
        }
        if (e.vx > 0) e.x = s.left - e.w;
        else if (e.vx < 0) e.x = s.right;
        e.vx = 0;
      }
    }
    const oldBottom = e.y + e.h;
    e.onGround = false;
    e.y += e.vy * dt;
    for (const s of this.solids) {
      if (e.rect.overlaps(s)) {
        if (e.vy > 0) { e.y = s.top - e.h; e.onGround = true; }
        else if (e.vy < 0) e.y = s.bottom;
        e.vy = 0;
      }
    }
    const canOneWay = oneWay && !(e instanceof Enemy && e.dropTimer > 0);
    if (canOneWay && e.vy >= 0) {
      const newBottom = e.y + e.h;
      for (const p of this.platforms) {
        if (e.x + e.w > p.left + 2 && e.x < p.right - 2 && oldBottom <= p.top + 8 && newBottom >= p.top) {
          e.y = p.top - e.h;
          e.vy = 0;
          e.onGround = true;
        }
      }
    }
  }

  _surfaceAt(px, py) {
    for (const s of this.solids) {
      if (s.contains(new Offset(px, py))) return true;
    }
    for (const p of this.platforms) {
      if (px >= p.left && px <= p.right && py >= p.top && py <= p.top + 10) return true;
    }
    return false;
  }

  _canStandAt(e, nx, ny) {
    const box = Rect.fromLTWH(nx, ny, e.w, e.h);
    for (const s of this.solids) {
      if (box.overlaps(s.deflate(0.5))) return false;
    }
    return true;
  }

  _groundAhead(e) { return this._surfaceAt(e.facing > 0 ? e.x + e.w + 4 : e.x - 4, e.y + e.h + 6); }

  _wallAhead(e) {
    const px = e.facing > 0 ? e.x + e.w + 4 : e.x - 4;
    for (const s of this.solids) {
      if (px >= s.left && px <= s.right && e.y + e.h - 4 > s.top + kStepUp && e.y + 4 < s.bottom) return true;
    }
    return false;
  }

  // enemies + the boss (if present) — note: may include dead ones (filtered by callers)
  _targets() { return this.boss !== null ? this.enemies.concat([this.boss]) : this.enemies.slice(); }

  _updatePlayer(dt) {
    const p = this.player;
    p.animTime += dt;
    if (p.hitFlash > 0) p.hitFlash -= dt;
    if (p.hurtTimer > 0) p.hurtTimer -= dt;
    if (p.invuln > 0) p.invuln -= dt;
    if (p.swapCd > 0) p.swapCd -= dt;
    if (p.skillTimer > 0) p.skillTimer -= dt;
    if (p.skillActive > 0) p.skillActive -= dt;
    if (p.flyTimer > 0) p.flyTimer -= dt;
    if (p.ghostTimer > 0) { p.ghostTimer -= dt; this._ghostReap(); }
    if (p.rideTimer > 0) { p.rideTimer -= dt; if (p.rideTimer <= 0) p.rammed.clear(); }
    if (p.stealthTimer > 0) p.stealthTimer -= dt;
    if (p.reflectTimer > 0) p.reflectTimer -= dt;
    if (p.auraTimer > 0) p.auraTimer -= dt;
    if (!this.town && p.burstShots > 0) {
      p.burstCd -= dt;
      if (p.burstCd <= 0) { this._fireBurstBolt(p); p.burstShots -= 1; p.burstCd = 0.1; }
    }
    if (!this.town && p.railgunTimer > 0) {
      p.railgunTimer -= dt;
      p.railgunCd -= dt;
      if (p.railgunCd <= 0) { this._railBeam(p); p.railgunCd = 0.5; }
    }
    if (this.paladinSwordTimer > 0) {
      this.paladinSwordTimer -= dt;
      this.paladinSwordBuff = this.paladinSwordTimer > 0 &&
        (p.cx - this.paladinSwordX).abs() < 120 && (p.cy - this.paladinSwordY).abs() < 170;
    } else {
      this.paladinSwordBuff = false;
    }
    if (p.dodgeCharge < p.dodgeMax) p.dodgeCharge += dt / 1.1;
    p.dodgeMax = this.meta.dodgeCharges + (this._skullExtraDash() ? 1 : 0);
    if (p.dodgeCharge > p.dodgeMax) p.dodgeCharge = p.dodgeMax;
    if (p.onGround) p.airJumpsLeft = this._skullAgile() ? 1 : 0;

    if (p.hasStatus(StatusKind.stun)) {
      this.moveLeft = this.moveRight = false;
      this.moveUp = this.moveDown = false;
      this._jumpQueued = this._attackQueued = this._dodgeQueued = false;
      this._skillQueued = this._swapQueued = false;
    }

    if (this._swapQueued && this.skullSlots.length > 1 && p.swapCd <= 0) {
      this.activeSlot = 1 - this.activeSlot;
      p.active = this.activeSlot;
      p.swapCd = 0.4;
      for (let i = 0; i < 12; i++) {
        const a = this.rng.nextDouble() * pi * 2;
        this.particles.add(new Particle(p.cx, p.cy, cos(a) * 150, sin(a) * 150, 0.4, 4, p.skull.eye, 0));
      }
    }

    if (this._dodgeQueued && p.dodgeTimer <= 0 && p.dodgeCharge >= 1) {
      p.dodgeCharge -= 1;
      p.dodgeDir = (this.moveLeft && !this.moveRight) ? -1 : (this.moveRight && !this.moveLeft ? 1 : p.facing);
      p.facing = p.dodgeDir;
      if (p.skull.type === SkullType.swordsaint) {
        this._swordsaintBlink(p); // near-instant teleport (a damage dash -> invulnerable)
      } else {
        // an ordinary dodge: a quick slide that repositions but is NOT invulnerable
        p.dodgeTimer = kDashTime;
        this._dust(p.cx, p.y + p.h);
      }
    }

    if (p.dodgeTimer > 0) {
      p.dodgeTimer -= dt;
      p.vx = p.dodgeDir * kDashSpeed;
      p.vy += kGravity * dt * 0.3;
      if (this.rng.nextDouble() < 0.7) {
        this.particles.add(new Particle(p.cx, p.cy, -p.dodgeDir * 60, 0, 0.25, 5, p.skull.eye.withOpacity(0.6), 0));
      }
    } else {
      let dir = 0;
      if (this.moveLeft) dir -= 1;
      if (this.moveRight) dir += 1;
      if (p.attacking) dir *= 0.35;
      let sm = 1;
      if (p.hasStatus(StatusKind.slow)) sm *= 0.55;
      if (p.hasStatus(StatusKind.haste)) sm *= 1.45;
      if (p.rideTimer > 0) sm *= 1.5;
      const horiz = kPlayerSpeed * p.skull.speedMul * sm * this.meta.traitSpeedMul;
      p.vx = dir * horiz;
      if (dir !== 0) p.facing = dir > 0 ? 1 : -1;
      if (p.flyTimer > 0) {
        let vdir = 0;
        if (this.moveUp) vdir -= 1;
        if (this.moveDown) vdir += 1;
        p.vy = vdir * horiz * 0.8;
      } else {
        p.vy += kGravity * dt;
      }
    }
    if (p.vy > 1600) p.vy = 1600;

    if (p.onGround) p.coyote = 0.1;
    else if (p.coyote > 0) p.coyote -= dt;

    if (this._jumpQueued && p.dodgeTimer <= 0 && p.flyTimer <= 0) {
      if (p.coyote > 0) {
        p.vy = -kJumpVel * (p.rideTimer > 0 ? 1.5 : 1.0);
        p.coyote = 0;
        this._dust(p.cx, p.y + p.h);
      } else if (p.airJumpsLeft > 0) {
        p.airJumpsLeft -= 1;
        p.vy = -kJumpVel * 0.92;
        for (let i = 0; i < 9; i++) {
          const a = (i / 9) * pi * 2;
          this.particles.add(new Particle(p.cx, p.y + p.h, cos(a) * 130, sin(a).abs() * 90, 0.3, 4, p.skull.eye, 260));
        }
      }
    }

    if (this._attackQueued && p.dodgeTimer <= 0 && !this.town) this._doAttack();
    if (p.attackBuffer > 0) p.attackBuffer -= dt;
    if (p.attackTimer > 0) {
      p.attackTimer -= dt;
      if (p.attackTimer <= 0) {
        p.comboWindow = 0.5;
        if (p.attackBuffer > 0 && p.dodgeTimer <= 0 && !this.town) {
          p.attackBuffer = 0;
          this._doAttack();
        }
      }
    } else if (p.comboWindow > 0) {
      p.comboWindow -= dt;
      if (p.comboWindow <= 0 && p.attackBuffer <= 0) p.comboStep = 0;
    }

    if (this._skillQueued && p.skillTimer <= 0 && p.dodgeTimer <= 0 && !this.town) this._doSkill();

    this._moveAndCollide(p, dt);

    if (p.flyTimer > 0 && p.y < this.camMinY + 8) {
      p.y = this.camMinY + 8;
      if (p.vy < 0) p.vy = 0;
    }

    if (p.slamPending && p.onGround) {
      p.slamPending = false;
      this._slamShockwave(p, this.atkMul);
    }

    if (!this.town && p.y > kGroundY + 700) p.damage(9999);
    if (p.dead && this.phase === GamePhase.playing) {
      this.phase = GamePhase.gameover;
      this._banner('GAME OVER', 999);
      this.shake = 0.5;
    }
  }

  _ghostReap() {
    const p = this.player;
    for (const e of this.enemies) {
      if (e.dead || e.reaped) continue;
      if (!p.rect.overlaps(e.rect)) continue;
      e.hp *= 0.5;
      e.dr *= 0.5;
      e.reaped = true;
      this._fx('runes', e.cx, e.cy, 0.4, new Color(0xFFB388FF), { size: 40 });
      for (let i = 0; i < 12; i++) {
        const a = this.rng.nextDouble() * pi * 2;
        this.particles.add(new Particle(e.cx, e.cy, cos(a) * 150, sin(a) * 150 - 30, 0.5, 4, (i % 2 === 0) ? new Color(0xFFB388FF) : new Color(0xFF7E57C2), 80));
      }
    }
  }

  // 검성 대시 — a near-instant teleport: it jumps forward (collision-safe via a
  // short raymarch so it never lands inside terrain), zaps everything in the
  // corridor it crosses, leaves a crackling lightning wake, and grants brief
  // i-frames (the only dodge that's invulnerable, because it deals damage).
  _swordsaintBlink(p) {
    const dist = 330;
    const dir = p.dodgeDir;
    const startCx = p.cx;
    // raymarch to the farthest collision-free spot within reach
    let endX = p.x;
    const step = 6;
    const steps = Math.floor(dist / step);
    for (let s = 0; s < steps; s++) {
      const cand = endX + dir * step;
      if (cand < 16 || cand > this.roomWidth - p.w - 16) break;
      if (!this._canStandAt(p, cand, p.y)) break;
      endX = cand;
    }
    p.x = endX;
    const endCx = p.cx;
    p.invuln = max(p.invuln, 0.22);
    // corridor damage: everything crossed between start and end at the hero's band
    const dmul = this.atkMul;
    const lo = min(startCx, endCx) - 22, hi = max(startCx, endCx) + 22;
    const corridor = Rect.fromLTRB(lo, p.y - 8, hi, p.y + p.h + 8);
    for (const e of this.enemies) {
      if (e.dead || !corridor.overlaps(e.rect)) continue;
      e.damage(22 * dmul);
      this._playerOnHit(e);
      this._hitSpark(e.cx, e.cy, dir);
    }
    const b = this.boss;
    if (b !== null && !b.dead && corridor.overlaps(b.rect)) {
      this._damageBoss(b, 22 * dmul);
      this._hitSpark(b.cx, b.cy, dir);
    }
    // crackling lightning streak left in the wake
    this.skillFx.add(new SkillFx('lightning', startCx, p.cy, 0.28, new Color(0xFF18FFFF), { x2: endCx, y2: p.cy }));
    this.skillFx.add(new SkillFx('lightning', startCx, p.cy - 9, 0.22, new Color(0xFFB2EBF2), { x2: endCx, y2: p.cy + 7 }));
    for (let i = 0; i < 16; i++) {
      const tt = i / 15;
      this.particles.add(new Particle(startCx + (endCx - startCx) * tt, p.cy + (this.rng.nextDouble() - 0.5) * 24, (this.rng.nextDouble() - 0.5) * 70, (this.rng.nextDouble() - 0.5) * 120, 0.24, 3, (i % 2 === 0) ? new Color(0xFF18FFFF) : Colors.white, 0));
    }
    this.shake = max(this.shake, 0.14);
    this._dust(endCx, p.y + p.h);
    this._emitNoise(endCx, p.cy, 0.5);
  }

  _doAttack() {
    const p = this.player;
    if (p.attackTimer > 0) {
      p.attackBuffer = 0.4;
      return;
    }
    if (p.skull.throwerBasic) { this._doThrownBasic(p); return; }
    if (p.skull.rangedBasic) { this._doRangedBasic(p); return; }
    if (p.comboWindow > 0 && p.comboStep < 3) p.comboStep += 1;
    else p.comboStep = 1;
    p.attackDuration = p.skull.atkDur;
    p.attackTimer = p.attackDuration;
    p.comboWindow = 0;
    p.hitThisSwing.clear();
    p.finisherFired = false;
    if (p.onGround) p.vx += p.facing * 70;
    if (p.skull.type === SkullType.dragoon) {
      this._fx('dragon', p.cx + p.facing * 22, p.cy - 2, max(0.28, p.attackDuration), p.skull.eye, { dir: p.facing, size: 78 * p.skull.reachMul });
    }
    this._emitNoise(p.cx, p.cy, 0.5);
  }

  _doThrownBasic(p) {
    const sk = p.skull;
    const isRock = sk.type === SkullType.slinger;
    const cd = isRock ? 0.6 : 0.85;
    p.attackDuration = cd;
    p.attackTimer = cd;
    p.comboStep = 0;
    p.comboWindow = 0;
    p.finisherFired = false;
    const mul = this.atkMul;
    let shape, col;
    if (sk.type === SkullType.alchemist) { shape = 'potion'; col = new Color(0xFF9CCC65); }
    else if (isRock) { shape = 'rock'; col = new Color(0xFFFFB300); }
    else { shape = 'bomb'; col = new Color(0xFF455A64); }
    const dmg = (isRock ? 15.0 : 20.0) * mul;
    this.projectiles.add(new Projectile(p.cx + p.facing * 14, p.cy - 6, p.facing * (isRock ? 420.0 : 360.0), -260, 10, 1.6, dmg, false, col, { shape: shape, grav: 640 }));
    this._emitNoise(p.cx, p.cy, 0.5);
  }

  _doRangedBasic(p) {
    const sk = p.skull;
    if (sk.type === SkullType.lich) {
      const cd = 0.85;
      p.attackDuration = cd;
      p.attackTimer = cd;
      p.comboStep = 0;
      p.comboWindow = 0;
      p.finisherFired = false;
      const dmg = 16.0 * this.atkMul * sk.reachMul;
      const fy = p.cy + 6;
      this.projectiles.add(new Projectile(p.cx + p.facing * 16, fy, p.facing * 520.0, 0, 16, 1.0, dmg, false, new Color(0xFF7E57C2), { shape: 'darkhand', onHit: StatusKind.bind, onHitDur: 1.6, onHitPow: 1 }));
      for (let i = 0; i < 8; i++) {
        this.particles.add(new Particle(p.cx + p.facing * 24, fy + (this.rng.nextDouble() - 0.5) * 16, p.facing * (120 + this.rng.nextDouble() * 220), (this.rng.nextDouble() - 0.5) * 70, 0.3, 3 + this.rng.nextDouble() * 2, (i % 2 === 0) ? new Color(0xFF7E57C2) : new Color(0xFF311B92), 0));
      }
      this._emitNoise(p.cx, p.cy, 0.5);
      return;
    }
    const sniper = sk.weapon === 'sniper';
    const archer = sk.category === '궁수형';
    const gun = sk.type === SkullType.gunner;
    const mage = !sniper && !archer;
    const cd = sniper ? 1.4 : (archer ? 0.58 : 1.0);
    p.attackDuration = cd;
    p.attackTimer = cd;
    p.comboStep = 0;
    p.comboWindow = 0;
    p.finisherFired = false;
    const mul = this.atkMul;
    const dmg = (sniper ? 84.0 : (archer ? (gun ? 23.0 : 16.0) : 19.0)) * mul * sk.reachMul;
    const speed = sniper ? 1150.0 : (archer ? (gun ? 980.0 : 640.0) : 470.0);
    const r = sniper ? 7.0 : (archer ? 9.0 : 12.0);
    const shape = sniper ? 'bolt' : (archer ? (gun ? 'bolt' : 'arrow') : 'orb');
    const life = sniper ? 2.4 : 1.7;
    const fy = p.cy + 8;
    this.projectiles.add(new Projectile(p.cx + p.facing * 16, fy, p.facing * speed, 0, r, life, dmg, false, sk.eye, { shape: shape, splash: mage ? 56 : 0 }));
    const pv = this._passive;
    if (pv.kind === PassiveKind.multishot && this.rng.nextDouble() < pv.value) {
      for (let i = 0; i < 2; i++) {
        const vyoff = (i === 0 ? -1.0 : 1.0) * 95.0;
        this.projectiles.add(new Projectile(p.cx + p.facing * 16, fy, p.facing * speed, vyoff, r, life, dmg, false, sk.eye, { shape: shape, splash: mage ? 56 : 0 }));
      }
    }
    for (let i = 0; i < 5; i++) {
      this.particles.add(new Particle(p.cx + p.facing * 22, fy, p.facing * (60 + this.rng.nextDouble() * 120), (this.rng.nextDouble() - 0.5) * 90, 0.22, 3, sk.eye, 0));
    }
    this._emitNoise(p.cx, p.cy, 0.5);
  }

  _fireBurstBolt(p) {
    const mul = this.atkMul;
    const fy = p.cy + 8;
    this.projectiles.add(new Projectile(p.cx + p.facing * 16, fy, p.facing * 980.0, 0, 8, 2.0, 20.0 * mul, false, p.skull.eye, { shape: 'bolt' }));
    for (let i = 0; i < 4; i++) {
      this.particles.add(new Particle(p.cx + p.facing * 22, fy, p.facing * (60 + this.rng.nextDouble() * 140), (this.rng.nextDouble() - 0.5) * 80, 0.2, 3, p.skull.eye, 0));
    }
    p.skillActive = 0.12;
    this._emitNoise(p.cx, p.cy, 0.45);
  }

  _doSkill() {
    const p = this.player;
    p.skillTimer = p.skull.skillCd;
    p.skillActive = 0.32;
    this._emitNoise(p.cx, p.cy, 0.7);
    const mul = this.atkMul;
    switch (p.skull.skill) {
      case 'spin': {
        this.shake = max(this.shake, 0.2);
        this._fx('ring', p.cx, p.cy, 0.42, p.skull.eye, { size: 115 });
        const radius = 100.0;
        for (const e of this._targets()) {
          if (e.center.sub(p.center).distance < radius + e.w / 2) {
            e.damage(16 * mul);
            const dir = e.cx >= p.cx ? 1 : -1;
            if (e instanceof Enemy && e.kind !== EnemyKind.bat) { e.vx = dir * 320.0; e.vy = -160; }
            this._hitSpark(e.cx, e.cy, dir);
          }
        }
        for (let i = 0; i < 26; i++) {
          const a = (i / 26) * pi * 2;
          this.particles.add(new Particle(p.cx, p.cy, cos(a) * 260, sin(a) * 260, 0.4, 5, p.skull.eye, 0));
        }
        break;
      }
      case 'magicburst': {
        this._fx('runes', p.cx, p.cy, 0.5, p.skull.eye, { dir: p.facing, size: 48 });
        for (let i = 0; i < 5; i++) {
          const a = -pi / 2 + (i - 2) * 0.5;
          this.projectiles.add(new Projectile(p.cx, p.cy, cos(a) * 420, sin(a) * 420, 10, 1.4, 14 * mul, false, p.skull.eye));
        }
        for (let i = -1; i <= 1; i++) {
          this.projectiles.add(new Projectile(p.cx, p.cy, p.facing * 460.0, i * 80.0, 11, 1.6, 16 * mul, false, p.skull.eye));
        }
        break;
      }
      case 'slam': {
        if (p.onGround) {
          this._slamShockwave(p, mul);
        } else {
          p.vy = max(p.vy, 1050);
          p.slamPending = true;
          this.shake = max(this.shake, 0.12);
          this._fx('ring', p.cx, p.cy, 0.22, new Color(0xFFFFB300), { size: 38 });
        }
        break;
      }
      case 'blink': {
        const oldX = p.cx;
        p.x = (p.x + p.facing * 230).clamp(20.0, this.roomWidth - p.w - 20);
        p.invuln = max(p.invuln, 0.3);
        const lo = min(oldX, p.cx), hi = max(oldX, p.cx);
        for (const e of this._targets()) {
          if (e.cx >= lo - 20 && e.cx <= hi + 20 && (e.cy - p.cy).abs() < 80) {
            e.damage(20 * mul);
            this._hitSpark(e.cx, e.cy, p.facing);
          }
        }
        for (let t = 0; t <= 1; t += 0.1) {
          this.particles.add(new Particle(lo + (hi - lo) * t, p.cy, 0, 0, 0.3, 6, p.skull.eye.withOpacity(0.7), 0));
        }
        this._fx('ghost', lo, p.cy, 0.4, p.skull.eye, { dir: p.facing, size: hi - lo });
        break;
      }
      case 'pounce': {
        const oldX = p.cx;
        p.x = (p.x + p.facing * 200).clamp(20.0, this.roomWidth - p.w - 20);
        p.vy = -180;
        p.invuln = max(p.invuln, 0.25);
        const lo = min(oldX, p.cx), hi = max(oldX, p.cx);
        for (const e of this._targets()) {
          if (e.cx >= lo - 30 && e.cx <= hi + 30 && (e.cy - p.cy).abs() < 90) {
            e.damage(15 * mul);
            const dir = e.cx >= p.cx ? 1 : -1;
            if (e instanceof Enemy && e.kind !== EnemyKind.bat) { e.vx = dir * 240.0; e.vy = -150; }
            this._hitSpark(e.cx, e.cy, dir);
          }
        }
        for (let i = 0; i < 14; i++) {
          this.particles.add(new Particle(p.cx, p.cy, p.facing * (120 + this.rng.nextDouble() * 200), (this.rng.nextDouble() - 0.5) * 160, 0.3, 4, p.skull.eye, 200));
        }
        this._fx('claw', p.cx, p.cy, 0.32, new Color(0xFFE53935), { dir: p.facing, size: 80 });
        this.shake = max(this.shake, 0.1);
        break;
      }
      case 'guard': {
        p.invuln = max(p.invuln, 1.0);
        p.vx = 0;
        this.shake = max(this.shake, 0.18);
        this._fx('ring', p.cx, p.cy, 0.45, new Color(0xFF64B5F6), { size: 150 });
        for (const e of this._targets()) {
          if (e.center.sub(p.center).distance < 150 + e.w / 2) {
            e.damage(14 * mul);
            const dir = e.cx >= p.cx ? 1 : -1;
            if (e instanceof Enemy) { e.vx = dir * 360.0; e.vy = -180; }
            this._hitSpark(e.cx, e.cy, dir);
          }
        }
        for (let i = 0; i < 28; i++) {
          const a = (i / 28) * pi * 2;
          this.particles.add(new Particle(p.cx, p.cy, cos(a) * 240, sin(a) * 240, 0.45, 5, p.skull.eye, 0));
        }
        break;
      }
      case 'explode': {
        this.shake = max(this.shake, 0.42);
        this._fx('dualring', p.cx, p.cy, 0.5, new Color(0xFFFF7043), { size: 175 });
        const radius = 175.0;
        for (const e of this._targets()) {
          if (e.center.sub(p.center).distance < radius + e.w / 2) {
            e.damage(30 * mul);
            e.addStatus(StatusKind.burn, 2.5, 8 * mul);
            const dir = e.cx >= p.cx ? 1 : -1;
            if (e instanceof Enemy) { e.vx = dir * 420.0; e.vy = -300; }
            this._hitSpark(e.cx, e.cy, dir);
          }
        }
        for (let i = 0; i < 40; i++) {
          const a = this.rng.nextDouble() * pi * 2;
          const sp = 180 + this.rng.nextDouble() * 300;
          this.particles.add(new Particle(p.cx, p.cy, cos(a) * sp, sin(a) * sp - 60, 0.5 + this.rng.nextDouble() * 0.4, 5 + this.rng.nextDouble() * 5, (i % 2 === 0) ? new Color(0xFFFF7043) : new Color(0xFFFFD166), 500));
        }
        if (p.skull.type === SkullType.bomber) {
          for (let i = 0; i < 9; i++) {
            const ang = this.rng.nextDouble() * pi * 2;
            const sp = 150 + this.rng.nextDouble() * 380;
            this.projectiles.add(new Projectile(p.cx, p.cy - 8, cos(ang) * sp, sin(ang) * sp - 60, 7, 2.6, 14 * mul, false, new Color(0xFF263238), { shape: 'bomb', grav: 760 }));
          }
        }
        break;
      }
      case 'ghostride': {
        p.rideTimer = 10.0;
        p.rammed.clear();
        p.invuln = max(p.invuln, 0.4);
        p.vy = min(p.vy, -260);
        this.shake = max(this.shake, 0.2);
        this._fx('ring', p.cx, p.cy, 0.5, new Color(0xFFB388FF), { size: 140 });
        this._fx('ghost', p.cx, p.cy, 0.5, p.skull.eye, { dir: p.facing, size: 70 });
        for (let i = 0; i < 26; i++) {
          const a = (i / 26) * pi * 2;
          this.particles.add(new Particle(p.cx, p.cy, cos(a) * 200, sin(a) * 200, 0.5, 5, (i % 2 === 0) ? new Color(0xFFB388FF) : new Color(0xFFE1BEE7), 0));
        }
        this._banner('유령마 강림 — 10초간 질주!', 1.8);
        break;
      }
      case 'shadowveil': {
        if (p.stealthTimer > 0) {
          const huntR = 440.0;
          const marks = [];
          for (const e of this.enemies) if (!e.dead && e.center.sub(p.center).distance <= huntR) marks.add(e);
          if (this.boss !== null && !this.boss.dead && this.boss.center.sub(p.center).distance <= huntR) marks.add(this.boss);
          if (marks.isEmpty) {
            p.skillTimer = 0.4;
            this._banner('감지된 적이 없다', 1.2);
            break;
          }
          marks.sort((a, b) => a.center.sub(p.center).distance - b.center.sub(p.center).distance);
          const hitDmg = 30.0 * mul;
          for (const e of marks) {
