    this._pixelRect(canvas, Rect.fromLTWH(-8, top - 2, 4, 5), Colors.white);
    this._pixelRect(canvas, Rect.fromLTWH(4, top - 2, 4, 5), Colors.white);
    this._pixelRect(canvas, Rect.fromLTWH(24 + lean, top + 4, 6, 30), new Color(0xFF5D4037));
    this._pixelRect(canvas, Rect.fromLTWH(20 + lean, top - 8, 18, 18), new Color(0xFF6D4C41));
    this._pixelRect(canvas, Rect.fromLTWH(34 + lean, top - 6, 5, 5), skinDk);
  }

  _bossBeast(canvas, b, col, dark, eyeC) {
    const h = b.h;
    this._pixelRect(canvas, Rect.fromLTWH(-38, h - 20, 9, 20), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-16, h - 20, 9, 20), dark);
    this._pixelRect(canvas, Rect.fromLTWH(14, h - 20, 9, 20), dark);
    this._pixelRect(canvas, Rect.fromLTWH(34, h - 20, 9, 20), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-46, 24, 78, h - 40), col);
    const ridge = Color.lerp(col, Colors.black, 0.35);
    for (let i = 0; i < 5; i++) {
      const bx = -34 + i * 14.0;
      this._pixelRect(canvas, Rect.fromLTWH(bx, 16, 10, 12), ridge);
    }
    this._pixelRect(canvas, Rect.fromLTWH(40, 36, 24, 20), Color.lerp(col, dark, 0.2));
    this._pixelRect(canvas, Rect.fromLTWH(54, 36, 16, 16), dark);
    this._pixelRect(canvas, Rect.fromLTWH(64, 40, 4, 4), Colors.black);
    this._pixelRect(canvas, Rect.fromLTWH(64, 46, 4, 4), Colors.black);
    this._pixelRect(canvas, Rect.fromLTWH(50, 40, 6, 10), new Color(0xFFE0E0E0));
    this._pixelRect(canvas, Rect.fromLTWH(62, 42, 6, 10), new Color(0xFFE0E0E0));
    this._pixelRect(canvas, Rect.fromLTWH(34, 28, 6, 6), eyeC);
  }

  _bossGolem(canvas, b, col, dark, eyeC) {
    const h = b.h;
    this._pixelRect(canvas, Rect.fromLTWH(-34, h - 30, 26, 30), dark);
    this._pixelRect(canvas, Rect.fromLTWH(10, h - 30, 26, 30), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-46, 18, 92, h - 38), col);
    this._pixelRect(canvas, Rect.fromLTWH(-66, 24, 22, 44), dark);
    this._pixelRect(canvas, Rect.fromLTWH(44, 24, 22, 44), dark);
    const crack = _PS(Colors.black.withOpacity(0.35), 2);
    canvas.drawLine(new Offset(-20, 22), new Offset(-8, h - 30), crack);
    canvas.drawLine(new Offset(18, 30), new Offset(8, 70), crack);
    this._pixelRect(canvas, Rect.fromLTWH(-16, 2, 32, 22), Color.lerp(col, Colors.white, 0.12));
    this._pixelRect(canvas, Rect.fromLTWH(-16, 10, 8, 8), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(8, 10, 8, 8), eyeC);
    canvas.drawCircle(new Offset(0, 40), 7, _PB(eyeC.withOpacity(0.9), 4));
  }

  _bossBird(canvas, b, col, dark, eyeC) {
    const h = b.h;
    const flap = sin(b.animTime * (b.airborne ? 14 : 6)) * 6;
    const wingCol = Color.lerp(col, Colors.black, 0.25);
    this._pixelRect(canvas, Rect.fromLTWH(-46, 30 - flap, 22, 14), wingCol);
    this._pixelRect(canvas, Rect.fromLTWH(24, 30 - flap, 22, 14), wingCol);
    this._pixelRect(canvas, Rect.fromLTWH(-22, 24, 44, h - 40), col);
    this._pixelRect(canvas, Rect.fromLTWH(-10, h - 12, 4, 16), new Color(0xFFFFC107));
    this._pixelRect(canvas, Rect.fromLTWH(10, h - 12, 4, 16), new Color(0xFFFFC107));
    this._pixelRect(canvas, Rect.fromLTWH(14, 2, 16, 16), Color.lerp(col, dark, 0.15));
    this._pixelRect(canvas, Rect.fromLTWH(26, 12, 18, 8), new Color(0xFFFFB300));
    this._pixelRect(canvas, Rect.fromLTWH(18, 12, 4, 4), eyeC);
  }

  _roomMeta(t) {
    switch (t) {
      case RoomType.combat: return ['전투', new Color(0xFFFF8A65)];
      case RoomType.shop: return ['상점', new Color(0xFFFFD166)];
      case RoomType.boss: return ['보스', new Color(0xFFE63946)];
      case RoomType.start: return ['시작', new Color(0xFF80DEEA)];
    }
  }

  _itemColor(kind) {
    switch (kind) {
      case 'heal': return new Color(0xFF06D6A0);
      case 'maxhp': return new Color(0xFFEF476F);
      case 'atk': return new Color(0xFFFFD166);
      case 'shieldbuff': return new Color(0xFF4FC3F7);
      case 'regenbuff': return new Color(0xFF66BB6A);
      case 'hastebuff': return new Color(0xFFFFD54F);
      case 'atkupbuff': return new Color(0xFFEF5350);
      case 'lifesteal': return new Color(0xFFAB47BC);
    }
    return Colors.white;
  }

  _skullColor(t) { return skull(t).eye; }

  _text(canvas, s, center, size, color) {
    drawText(canvas, s, center.dx, center.dy, { size: size, weight: FontWeight.bold, color: color, align: 'center', baseline: 'middle', shadow: true, shadowColor: Colors.black, shadowDx: 0, shadowDy: 1 });
  }

  //@@PAINTER@@
}
GamePainter._crimson = new Color(0xFF5A0A0A);
GamePainter._tintPriority = [
  StatusKind.stun, StatusKind.bind, StatusKind.burn, StatusKind.infect,
  StatusKind.poison, StatusKind.bleed, StatusKind.slow, StatusKind.weaken,
];

// =====================================================================
//  main.dart  (GameApp — loop, input, HUD, overlays, town<->run)
// =====================================================================
function statusLabel(k) {
  switch (k) {
    case StatusKind.poison: return '중독';
    case StatusKind.burn: return '화상';
    case StatusKind.slow: return '둔화';
    case StatusKind.weaken: return '약화';
    case StatusKind.regen: return '재생';
    case StatusKind.shield: return '보호막';
    case StatusKind.haste: return '신속';
    case StatusKind.atkUp: return '공격력↑';
    case StatusKind.bleed: return '출혈';
    case StatusKind.stun: return '기절';
    case StatusKind.infect: return '전염';
    case StatusKind.bind: return '속박';
  }
}

let APP = null;
function startGame() { APP = new GameApp(); APP.start(); }

class GameApp {
  constructor() {
    this.meta = new MetaState();
    this.meta.load();
    this.el = document.getElementById('game');
    this.ctx = this.el.getContext('2d');
    this.ctx.imageSmoothingEnabled = false;
    this.cv = new Canvas(this.ctx);
    this.inRun = false;
    this.world = new GameWorld(this.meta, { town: true });
    this.painter = new GamePainter(this.world);
    this.statsOpen = false;
    this.devOpen = false;
    this.jobSelect = false;
    this.godMode = false;
    this.jobScroll = 0;
    this.last = -1;
    this.buttons = [];
    this.activeHold = null;
    this.held = new Set();
    this._setupInput();
    this._resize();
    window.addEventListener('resize', () => this._resize());
    const hint = document.getElementById('hint');
    if (hint) hint.textContent = '←/→ 이동 · ↑/Space 점프 · A 공격 · Shift 회피 · S 스킬 · Q 교체 · E 입장/구매 · 1/2 슬롯 · ` 개발자';
  }

  get devPaused() { return this.devOpen || this.jobSelect; }

  start() { requestAnimationFrame(t => this._frame(t)); }

  _resize() {
    // cap DPR at 2 so very high-density screens stay crisp without a huge,
    // frame-dropping backing store.
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const ww = window.innerWidth, wh = window.innerHeight;
    const scale = Math.min(ww / kViewW, wh / kViewH);
    const cssW = kViewW * scale, cssH = kViewH * scale;
    // displayed (CSS) size fits the window keeping 16:9
    this.el.style.width = cssW + 'px';
    this.el.style.height = cssH + 'px';
    // backing store = physical device pixels, so the scene renders crisply at
    // the monitor's true resolution instead of upscaling a 1280x720 bitmap.
    this.el.width = Math.max(1, Math.round(cssW * dpr));
    this.el.height = Math.max(1, Math.round(cssH * dpr));
    this.ctx.imageSmoothingEnabled = false; // resizing the canvas resets the ctx
    // device-pixels per logical (1280x720) unit
    this._sx = this.el.width / kViewW;
    this._sy = this.el.height / kViewH;
  }

  _newWorld(town) {
    this.world = new GameWorld(this.meta, { town: town });
    this.painter = new GamePainter(this.world);
  }
  startRun() { this.inRun = true; this._newWorld(false); }
  runEnd(souls) {
    this.meta.souls += Math.round(souls * this.meta.soulGainMul);
    this.meta.save();
    this.inRun = false;
    this._newWorld(true);
  }

  _frame(ts) {
    if (this.last < 0) this.last = ts;
    let dt = (ts - this.last) / 1000;
    this.last = ts;
    if (dt <= 0 || dt > 0.1) dt = 1 / 60;
    if (!this.devPaused) {
      this.world.update(dt);
      if (this.godMode && !this.world.town) {
        this.world.player.invuln = 1.0;
        this.world.player.hp = this.world.player.maxHp;
        this.world.curHp = this.world.player.hp;
      }
    }
    this._render();
    requestAnimationFrame(t => this._frame(t));
  }

  // ---------------- input ----------------
  _setupInput() {
    window.addEventListener('keydown', e => this._onKey(e, true));
    window.addEventListener('keyup', e => this._onKey(e, false));
    const toLogical = (cx, cy) => {
      const r = this.el.getBoundingClientRect();
      return new Offset((cx - r.left) / r.width * kViewW, (cy - r.top) / r.height * kViewH);
    };
    this.el.addEventListener('pointerdown', e => {
      e.preventDefault();
      this.el.focus();
      const p = toLogical(e.clientX, e.clientY);
      this._pointerDown(p);
    });
    window.addEventListener('pointerup', e => { this._pointerUp(); });
    window.addEventListener('pointercancel', e => { this._pointerUp(); });
    // mouse wheel scrolls the job-select grid
    this.el.addEventListener('wheel', e => {
      if (this.jobSelect) { e.preventDefault(); this.jobScroll = Math.max(0, this.jobScroll + (e.deltaY > 0 ? 60 : -60)); }
    }, { passive: false });
  }

  _pointerDown(p) {
    for (let i = this.buttons.length - 1; i >= 0; i--) {
      const b = this.buttons[i];
      if (b.rect.contains(p)) {
        if (b.swallow) return;
        if (b.onDown) { b.onDown(); this.activeHold = b; return; }
        if (b.onTap && b.enabled !== false) { b.onTap(); return; }
        return;
      }
    }
  }
  _pointerUp() {
    if (this.activeHold) { if (this.activeHold.onUp) this.activeHold.onUp(); this.activeHold = null; }
  }

  _onKey(e, isDown) {
    const code = e.code;
    const w = this.world;
    if (code === 'Backquote') { if (isDown) this._toggleDev(); e.preventDefault(); return; }
    if (code === 'Escape' && this.devPaused) {
      if (isDown) { if (this.jobSelect) this.jobSelect = false; else this.devOpen = false; }
      e.preventDefault(); return;
    }
    if (this.devPaused) return;
    let down;
    if (isDown) { down = !this.held.has(code); this.held.add(code); }
    else { this.held.delete(code); down = false; }
    const up = !isDown;
    switch (code) {
      case 'ArrowLeft': w.moveLeft = !up; e.preventDefault(); break;
      case 'ArrowRight': w.moveRight = !up; e.preventDefault(); break;
      case 'ArrowUp': w.moveUp = !up; if (down) w.queueJump(); e.preventDefault(); break;
      case 'Space': if (down) w.queueJump(); e.preventDefault(); break;
      case 'KeyA': if (down) w.queueAttack(); break;
      case 'ShiftLeft': case 'ShiftRight': if (down) w.queueDodge(); break;
      case 'KeyS': if (down) w.queueSkill(); break;
      case 'KeyQ': if (down) w.queueSwap(); break;
      case 'Digit1': if (down) w.queueSlot1(); break;
      case 'Digit2': if (down) w.queueSlot2(); break;
      case 'KeyE': if (down) w.queueInteract(); break;
      case 'ArrowDown': w.moveDown = !up; if (down) w.queueInteract(); e.preventDefault(); break;
      default: return;
    }
  }

  _toggleDev() {
    this.devOpen = !this.devOpen;
    if (this.devOpen) { this.world.moveLeft = this.world.moveRight = false; this.world.moveUp = this.world.moveDown = false; }
    else this.jobSelect = false;
  }

  // ---------------- UI primitives ----------------
  _panel(rect, fill, border, radius, bw) {
    const rr = RRect.fromRectAndRadius(rect, Radius.circular(radius === undefined ? 10 : radius));
    this.cv.drawRRect(rr, _P(fill));
    if (border) this.cv.drawRRect(rr, _PS(border, bw || 1));
  }
  _txt(s, x, y, size, color, opts) {
    opts = opts || {};
    drawText(this.cv, s, x, y, {
      size: size, color: color || Colors.white, weight: opts.weight || FontWeight.bold,
      align: opts.align || 'left', baseline: opts.baseline || 'top',
      shadow: opts.shadow !== false, shadowColor: Colors.black, shadowDx: 0, shadowDy: 1,
    });
  }
  _button(rect, label, opts) {
    opts = opts || {};
    const enabled = opts.enabled !== false;
    const bg = opts.bg || new Color(0xFF64FFDA);
    const fg = enabled ? (opts.fg || Colors.black) : Colors.white38;
    this._panel(rect, enabled ? bg : new Color(0x1FFFFFFF), opts.border || null, opts.radius === undefined ? 8 : opts.radius);
    this._txt(label, rect.center.dx, rect.center.dy, opts.size || 14, fg, { align: 'center', baseline: 'middle' });
    this.buttons.add({ rect: rect, onTap: opts.onTap, enabled: enabled });
  }

  // ---------------- render ----------------
  _render() {
    const ctx = this.ctx;
    // map the logical 1280x720 space onto the high-res backing store
    ctx.setTransform(this._sx || 1, 0, 0, this._sy || 1, 0, 0);
    ctx.clearRect(0, 0, kViewW, kViewH);
    this.buttons = [];
    this.painter.paint(this.cv, { width: kViewW, height: kViewH });

    const w = this.world;
    const ended = !w.town && (w.phase === GamePhase.gameover || w.phase === GamePhase.victory);
    const modalOpen = ended ||
      (w.town && w.uiRequest !== TownUI.none) || this.devOpen || this.jobSelect;

    if (w.town) this._townHud(); else this._runHud();
    if (!w.town && w.activeDrop !== null) this._skullOffer();
    if (!modalOpen) this._touchControls();
    this._statsPanel();
    this._devButton();

    // overlays (with click-swallowing backdrop)
    if (w.town && w.uiRequest === TownUI.blacksmith) { this._backdrop(0.7); this._blacksmith(); }
    if (w.town && w.uiRequest === TownUI.traits) { this._backdrop(0.7); this._traits(); }
    if (w.town && w.uiRequest === TownUI.depart) { this._backdrop(0.7); this._depart(); }
    if (ended) { this._backdrop(0.74); this._endOverlay(); }
    if (this.devOpen) { this._backdrop(0.6); this._devPanel(); }
    if (this.jobSelect) { this._backdrop(0.78); this._jobSelectOverlay(); }
  }

  _backdrop(alpha) {
    const r = Rect.fromLTWH(0, 0, kViewW, kViewH);
    this.cv.drawRect(r, _P(Colors.black.withOpacity(alpha)));
    this.buttons.add({ rect: r, swallow: true });
  }

  // ---------------- HUD: town ----------------
  _townHud() {
    const w = this.world;
    this._txt('망자의 마을', 24, 18, 26, Colors.white);
    this._txt('🔥 ' + w.meta.souls, 200, 22, 22, new Color(0xFF9DFFF0));
    if (w.bannerTimer > 0) this._banner(w.bannerText);
    this._txt('←/→ 이동 · 중앙 문 = 모험 시작 · 왼쪽 대장장이 = 강화 · 오른쪽 제단 = 기도 · E 상호작용',
      kViewW / 2, kViewH - 30, 14, Colors.white70, { align: 'center', weight: FontWeight.w500 });
  }

  _banner(s) {
    const a = this.world.bannerTimer > 0.4 ? 1 : (this.world.bannerTimer / 0.4).clamp(0, 1);
    const tw = measureText(this.cv, s, 28, FontWeight.bold);
    const box = Rect.fromCenter(new Offset(kViewW / 2, 175), tw + 52, 52);
    this.cv.drawRRect(RRect.fromRectAndRadius(box, Radius.circular(10)), _P(Colors.black.withOpacity(0.55 * a)));
    this.cv.drawRRect(RRect.fromRectAndRadius(box, Radius.circular(10)), _PS(Colors.white24.withOpacity(a), 1));
    this._txt(s, kViewW / 2, 175, 28, Colors.white.withOpacity(a), { align: 'center', baseline: 'middle' });
  }

  // ---------------- HUD: run ----------------
  _bar(x, y, wd, ratio, color, label) {
    const box = Rect.fromLTWH(x, y, wd, 18);
    this.cv.drawRRect(RRect.fromRectAndRadius(box, Radius.circular(9)), _P(Colors.black.withOpacity(0.55)));
    const fw = wd * ratio.clamp(0, 1);
    if (fw > 0) this.cv.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(x, y, fw, 18), Radius.circular(9)), _P(color));
    this.cv.drawRRect(RRect.fromRectAndRadius(box, Radius.circular(9)), _PS(Colors.white24, 1));
    if (label) this._txt(label, x + wd / 2, y + 9, 12, Colors.white, { align: 'center', baseline: 'middle' });
  }

  _runHud() {
    const w = this.world;
    const p = w.player;
    let y = 18;
    this._txt('▦ ' + w.floor + '/' + w.totalFloors + '층 · ' + w.biome.name, 24, y, 20, Colors.white);
    this._txt('🪙 ' + w.gold, 320, y + 1, 20, new Color(0xFFFFD166));
    y += 30;
    this._bar(24, y, 280, p.hp / p.maxHp, new Color(0xFF06D6A0), 'HP  ' + Math.trunc(p.hp) + '/' + Math.trunc(p.maxHp));
    y += 26;
    // combo pips
    for (let i = 1; i <= 3; i++) {
      this.cv.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(24 + (i - 1) * 32, y, 26, 8), Radius.circular(4)),
        _P(i <= p.comboStep ? new Color(0xFFFFD166) : Colors.white.withOpacity(0.18)));
    }
    y += 18;
    // skull slots
    const slots = p.skulls;
    let sx = 24;
    for (let i = 0; i < 2; i++) {
      const has = i < slots.length;
      const active = has && i === p.active;
      const label = has ? slots[i].name : '— 빈 슬롯 —';
      const wWid = measureText(this.cv, label, 13, FontWeight.w600) + 40;
      const box = Rect.fromLTWH(sx, y, wWid, 26);
      this._panel(box, Colors.black.withOpacity(0.45), active ? slots[i].eye : Colors.white24, 8, active ? 2.5 : 1);
      this.cv.drawCircle(new Offset(sx + 14, y + 13), 6, _P(has ? slots[i].eye : Colors.white24));
      this._txt(label, sx + 26, y + 13, 13, has ? Colors.white : Colors.white38, { weight: FontWeight.w600, baseline: 'middle' });
      sx += wWid + 8;
    }
    y += 34;
    // ability row: skill + cd, dodge pips
    const skillReady = p.skillTimer <= 0;
    const skillRatio = skillReady ? 1.0 : 1 - (p.skillTimer / p.skull.skillCd);
    const slabel = p.skull.skillName + ' (S)';
    const sw = measureText(this.cv, slabel, 12, FontWeight.w600) + 80;
    const sbox = Rect.fromLTWH(24, y, sw, 24);
    this._panel(sbox, Colors.black.withOpacity(0.45), skillReady ? p.skull.eye : Colors.white24, 8);
    this._txt(slabel, 34, y + 12, 12, skillReady ? Colors.white : Colors.white54, { weight: FontWeight.w600, baseline: 'middle' });
    const barX = 24 + sw - 46;
    this.cv.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(barX, y + 9, 40, 6), Radius.circular(3)), _P(Colors.white10));
    this.cv.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(barX, y + 9, 40 * skillRatio.clamp(0, 1), 6), Radius.circular(3)), _P(p.skull.eye));
    const dx = 24 + sw + 10;
    const dlabel = '대시';
    const dlw = measureText(this.cv, dlabel, 12, FontWeight.w600);
    const dboxW = 12 + dlw + 12 + p.dodgeMax * 18 + 4;
    const dbox = Rect.fromLTWH(dx, y, dboxW, 24);
    this._panel(dbox, Colors.black.withOpacity(0.45), Colors.white24, 8);
    this._txt(dlabel, dx + 10, y + 12, 12, Colors.white70, { weight: FontWeight.w600, baseline: 'middle' });
    const pipX0 = dx + 10 + dlw + 14;
    for (let i = 0; i < p.dodgeMax; i++) {
      const px = pipX0 + i * 18;
      const ready = p.dodgeCharge >= i + 1;
      this.cv.drawCircle(new Offset(px, y + 12), 6, _P(ready ? new Color(0xFF64FFDA) : Colors.white10));
      this.cv.drawCircle(new Offset(px, y + 12), 6, _PS(ready ? new Color(0xFF64FFDA) : Colors.white24, 1.2));
    }
    y += 32;
    // passive row
    const pv = passiveOf(p.skull.type);
    const ptext = '패시브 · ' + pv.name + '  ' + passiveDesc(pv);
    const pw = measureText(this.cv, ptext, 12, FontWeight.w600) + 26;
    this._panel(Rect.fromLTWH(24, y, pw, 22), Colors.black.withOpacity(0.45), new Color(0xFFFFD166).withOpacity(0.5), 8);
    this._txt('⚡ ' + ptext, 32, y + 11, 12, Colors.white, { weight: FontWeight.w600, baseline: 'middle' });
    y += 30;
    // status row
    let stx = 24;
    for (const s of p.statuses) {
      const lab = statusLabel(s.kind) + ' ' + s.timer.toStringAsFixed(0);
      const ww2 = measureText(this.cv, lab, 12, FontWeight.bold) + 16;
      const sc = statusColor(s.kind);
      this._panel(Rect.fromLTWH(stx, y, ww2, 22), sc.withOpacity(0.22), sc, 6);
      this._txt(lab, stx + 8, y + 11, 12, sc, { baseline: 'middle' });
      stx += ww2 + 6;
    }

    // boss bar
    if (w.boss !== null) {
      const b = w.boss;
      this._txt(b.name, kViewW / 2, 24, 24, b.spec.color, { align: 'center' });
      this._bar(kViewW / 2 - 280, 56, 560, b.hp / b.maxHp, new Color(0xFFE63946), null);
    }

    // minimaps
    this._routeMap();
    this._roomRadar();

    if (w.roomType === RoomType.shop) {
      const t = '아이템 위에서 E 키로 구매';
      const tw = measureText(this.cv, t, 18, FontWeight.w600) + 36;
      this._panel(Rect.fromCenter(new Offset(kViewW / 2, kViewH - 150), tw, 38), Colors.black.withOpacity(0.5), null, 8);
      this._txt(t, kViewW / 2, kViewH - 150, 18, new Color(0xFFFFD166), { align: 'center', baseline: 'middle', weight: FontWeight.w600 });
    }
    if (w.bannerTimer > 0 && w.phase === GamePhase.playing) this._banner(w.bannerText);
    this._txt('←/→ 이동 · ↑/Space 점프 · A 공격 · Shift 회피 · S 스킬 · Q 교체 · E 입장/구매',
      kViewW - 24, kViewH - 28, 13, Colors.white60, { align: 'right', weight: FontWeight.w500 });
  }

  _routeMap() {
    const w = this.world;
    const g = w.graph;
    if (!g) return;
    const curDepth = w.node.depth;
    let x = kViewW - 24;
    // draw right-aligned: compute width
    const chipW = 30, gap = 14;
    const total = (g.maxDepth + 1) * chipW + g.maxDepth * gap;
    let bx = kViewW - 20 - total - 24;
    const by = 22;
    this._panel(Rect.fromLTWH(bx - 12, by - 8, total + 24, 46), Colors.black.withOpacity(0.45), Colors.white24, 10);
    for (let d = 0; d <= g.maxDepth; d++) {
      if (d > 0) {
        this.cv.drawRect(Rect.fromLTWH(bx - gap, by + 13, gap, 2), _P(d <= curDepth ? Colors.white54 : Colors.white24));
      }
      const rooms = g.atDepth(d);
      const r = rooms.first;
      let c, sym;
      switch (r.type) {
        case RoomType.start: c = new Color(0xFF80DEEA); sym = '⌂'; break;
        case RoomType.shop: c = new Color(0xFFFFD166); sym = '$'; break;
        case RoomType.boss: c = new Color(0xFFE63946); sym = '☠'; break;
        default: c = new Color(0xFFFF8A65); sym = '⚔';
      }
      if (rooms.length > 1 && d !== 0 && d !== g.maxDepth) { c = new Color(0xFFB0BEC5); sym = '⋔'; }
      const isCur = d === curDepth;
      const done = d < curDepth;
      const cc = new Offset(bx + chipW / 2, by + 14);
      this.cv.drawCircle(cc, 15, _P(isCur ? c.withOpacity(0.85) : Colors.black.withOpacity(0.4)));
      this.cv.drawCircle(cc, 15, _PS(isCur ? Colors.white : (done ? c : Colors.white30), isCur ? 2.5 : 1.5));
      this._txt(sym, cc.dx, cc.dy, 15, isCur ? Colors.black : (done ? c : Colors.white54), { align: 'center', baseline: 'middle' });
      bx += chipW + gap;
    }
  }

  _roomRadar() {
    const w = this.world;
    const bx = kViewW - 20 - 188, by = 78;
    this._panel(Rect.fromLTWH(bx, by, 188, 68), Colors.black.withOpacity(0.5), Colors.white24, 8);
    const ox = bx + 4, oy = by + 4, sw = 180, sh = 60;
    const rw = w.roomWidth <= 0 ? 1.0 : w.roomWidth;
    const top = (w.camMinY < 0 ? w.camMinY : 0.0) - 40;
    const bottom = kGroundY + 120;
    const hRange = bottom - top;
    const sx = (x) => ox + ((x / rw) * sw).clamp(0, sw);
    const sy = (y) => oy + (((y - top) / hRange) * sh).clamp(0, sh);
    this.cv.drawLine(new Offset(ox, sy(kGroundY)), new Offset(ox + sw, sy(kGroundY)), _PS(Colors.white24, 1));
    const plat = _PSC(new Color(0xFF9CCC65).withOpacity(0.7), 2, StrokeCap.round);
    for (const pf of w.platforms) {
      const yy = sy(pf.top);
      this.cv.drawLine(new Offset(sx(pf.left), yy), new Offset(sx(pf.right), yy), plat);
    }
    for (const d of w.doors) {
      this.cv.drawRect(Rect.fromCenter(new Offset(sx(d.rect.center.dx), sy(d.rect.center.dy)), 4, 6), _P(new Color(0xFFB0BEC5).withOpacity(0.8)));
    }
    if (w.exitPortal !== null) {
      const c = new Offset(sx(w.exitPortal.center.dx), sy(w.exitPortal.center.dy));
      this.cv.save(); this.cv.translate(c.dx, c.dy); this.cv.rotate(pi / 4);
      this.cv.drawRect(Rect.fromCenter(Offset.zero, 6, 6), _P(new Color(0xFF69F0AE)));
      this.cv.restore();
    }
    const foe = _P(new Color(0xFFFF5252));
    for (const e of w.enemies) {
      if (e.dead) continue;
      if (e.kind === EnemyKind.plant && e.t2 <= 0.06) continue;
      this.cv.drawCircle(new Offset(sx(e.cx), sy(e.cy)), 2.6, foe);
    }
    const b = w.boss;
    if (b !== null && !b.dead) this.cv.drawCircle(new Offset(sx(b.cx), sy(b.cy)), 4.5, _P(new Color(0xFFE63946)));
    const p = w.player;
    this.cv.drawCircle(new Offset(sx(p.cx), sy(p.cy)), 3.2, _P(new Color(0xFF18FFFF)));
  }

  // ---------------- stats panel ----------------
  _statsPanel() {
    const w = this.world;
    if (w.town || w.player === null) return;
    const sk = w.player.skull;
    const x = kViewW - 20 - 234, y = 154;
    const header = Rect.fromLTWH(x, y, 234, 28);
    const headerName = '스탯 · ' + sk.name;
    const rows = this.statsOpen ? 7 : 0;
    const h = 28 + (this.statsOpen ? rows * 18 + 12 : 0);
    this._panel(Rect.fromLTWH(x, y, 234, h), Colors.black.withOpacity(0.58), sk.eye.withOpacity(0.6), 10);
    this._txt('▤ ' + headerName, x + 10, y + 14, 13, Colors.white, { baseline: 'middle' });
    this._txt(this.statsOpen ? '▲' : '▼', x + 224, y + 14, 13, Colors.white70, { align: 'right', baseline: 'middle' });
    this.buttons.add({ rect: header, onTap: () => { this.statsOpen = !this.statsOpen; }, enabled: true });
    if (!this.statsOpen) return;
    const atk = w.atkMul;
    const defTrait = w.meta.defenseDrFor(sk.category);
    const pv = passiveOf(sk.type);
    const armor = pv.kind === PassiveKind.armor ? pv.value : 0.0;
    const totalDr = 1 - (1 - defTrait) * (1 - armor);
    let sm = sk.speedMul * w.meta.traitSpeedMul;
    if (w.player.hasStatus(StatusKind.haste)) sm *= 1.45;
    if (w.player.hasStatus(StatusKind.slow)) sm *= 0.55;
    const aps = sk.atkDur > 0 ? 1 / sk.atkDur : 0.0;
    const rowData = [
      ['공격력', Math.round(atk * 100) + '%', new Color(0xFFFF8A65)],
      ['스킬 위력', '×' + atk.toStringAsFixed(2), new Color(0xFF64FFDA)],
      ['방어력', Math.round(totalDr * 100) + '% 감소', new Color(0xFF64B5F6)],
      ['이동 속도', Math.round(sm * 100) + '%', new Color(0xFF81C784)],
      ['공격 속도', aps.toStringAsFixed(1) + '회/초', new Color(0xFFFFD166)],
      ['최대 체력', w.player.maxHp.toStringAsFixed(0), new Color(0xFF06D6A0)],
      ['스킬', sk.skillName + ' · 쿨 ' + sk.skillCd.toStringAsFixed(0) + 's', Colors.white70],
    ];
    let ry = y + 34;
    for (const rd of rowData) {
      this._txt(rd[0], x + 10, ry, 12, Colors.white60, { weight: FontWeight.w500 });
      this._txt(rd[1], x + 224, ry, 12, rd[2], { align: 'right' });
      ry += 18;
    }
  }

  _jobSelectOverlay() {
    const w = this.world;
    const box = Rect.fromCenter(new Offset(kViewW / 2, kViewH / 2), 1040, 640);
    this._panel(box, new Color(0xFF150F22), Colors.white24, 16);
    this._txt('직업 선택 — 개발자 모드', box.left + 24, box.top + 18, 22, Colors.white);
    this._txt('현재: ' + skull(w.player.skull.type).name, box.right - 120, box.top + 22, 14, Colors.white60, { align: 'right', weight: FontWeight.w500 });
    this._button(Rect.fromLTWH(box.right - 60, box.top + 14, 44, 28), '✕', { bg: Colors.white12, fg: Colors.white70, onTap: () => { this.jobSelect = false; } });
    // clip the scrollable card area
    const clip = Rect.fromLTWH(box.left + 16, box.top + 56, box.width - 32, box.height - 72);
    this.cv.save();
    this.cv.clipRect(clip);
    const tiers = [SkullTier.common, SkullTier.rare, SkullTier.epic, SkullTier.legendary];
    const current = w.player.skull.type;
    const cardW = 196, cardH = 46, gap = 8;
    const perRow = Math.floor((clip.width + gap) / (cardW + gap));
    let yy = clip.top - this.jobScroll;
    for (const tier of tiers) {
      const types = allSkullTypes().where(t => skull(t).tier === tier);
      if (types.isEmpty) continue;
      const tc = tierColor(tier);
      this._txt(tierLabel(tier) + '  ' + types.length + '종', clip.left + 6, yy, 15, tc);
      yy += 24;
      let col = 0, rowY = yy;
      for (const t of types) {
        const s = skull(t);
        const cx = clip.left + 4 + col * (cardW + gap);
        const cardRect = Rect.fromLTWH(cx, rowY, cardW, cardH);
        const selected = t === current;
        if (rowY + cardH > clip.top - cardH && rowY < clip.bottom + cardH) {
          this._panel(cardRect, selected ? s.eye.withOpacity(0.22) : new Color(0xFF1E1830), selected ? s.eye : Colors.white12, 10, selected ? 2 : 1);
          this.cv.drawCircle(new Offset(cx + 16, rowY + 23), 8, _P(s.eye));
          this._txt(s.name, cx + 30, rowY + 12, 13, Colors.white);
          this._txt(s.category + ' · 공격 ' + Math.round(s.atkMul * 100) + '%', cx + 30, rowY + 28, 11, Colors.white54, { weight: FontWeight.w500 });
          this.buttons.add({ rect: cardRect, onTap: () => this._pickJob(t), enabled: true });
        }
        col++;
        if (col >= perRow) { col = 0; rowY += cardH + gap; }
      }
      yy = (col === 0 ? rowY : rowY + cardH + gap) + 14;
    }
    this.cv.restore();
    this._txt('스크롤: 마우스 휠', box.center.dx, box.bottom - 14, 12, Colors.white38, { align: 'center', baseline: 'middle', weight: FontWeight.w500 });
  }

      ['utility', '범용 특화', new Color(0xFF81C784), '영혼 획득 +12%/Lv, 이동 속도 +3%/Lv'],

      const label = maxed ? 'MAX' : (!unlocked ? '잠김' : (cost + ' 영혼'));
      this._button(Rect.fromLTWH(r.right - 128, r.top + 16, 114, 28), label, { bg: color, enabled: can, onTap: () => { if (m.buyTrait(k)) m.save(); } });

  _endOverlay() {
    const w = this.world;
    const victory = w.phase === GamePhase.victory;
    const color = victory ? new Color(0xFF64FFDA) : new Color(0xFFFF5252);
    this._txt(victory ? '승리!' : 'GAME OVER', kViewW / 2, kViewH / 2 - 120, 70, color, { align: 'center', baseline: 'middle' });
    this._txt(victory ? ('모든 층을 정복했다 🏆 · 처치 ' + w.kills) : (w.floor + '층에서 쓰러졌다 · 처치 ' + w.kills),
      kViewW / 2, kViewH / 2 - 50, 22, Colors.white70, { align: 'center', baseline: 'middle', weight: FontWeight.w500 });
    this._txt('🔥 영혼 +' + w.runSouls, kViewW / 2, kViewH / 2 + 6, 28, new Color(0xFF9DFFF0), { align: 'center', baseline: 'middle' });
    this._button(Rect.fromCenter(new Offset(kViewW / 2, kViewH / 2 + 80), 280, 56), '⌂ 마을로 돌아가기',
      { bg: color, size: 22, onTap: () => this.runEnd(w.runSouls) });
  }
}

window.addEventListener('load', function () {
  try {
    if (typeof startGame === 'function') startGame();
  } catch (e) {
    console.error(e);
    const c = document.getElementById('game').getContext('2d');
    c.fillStyle = '#200'; c.fillRect(0, 0, 1280, 720);
    c.fillStyle = '#f88'; c.font = '16px monospace';
    c.fillText('Error: ' + e.message, 20, 40);
  }
});

})();
</script>
