        for (let i = 0; i < 64; i++) {
          this.particles.add(new Particle(p.cx + p.facing * 60, p.cy - 10 + (this.rng.nextDouble() - 0.5) * 200, p.facing * (80 + this.rng.nextDouble() * 760), (this.rng.nextDouble() - 0.5) * 240 - 20, 0.8 + this.rng.nextDouble() * 0.6, 7 + this.rng.nextDouble() * 5, (i % 2 === 0) ? new Color(0xFF9CCC65) : new Color(0xFF7CB342), -30));
        }
        break;
      }
      case 'swordwave': {
        // 검기: a giant piercing crescent — damage coefficient DOUBLED (48 vs 24)
        this.projectiles.add(new Projectile(p.cx + p.facing * 24, p.cy - 4, p.facing * 520.0, 0, 72, 1.5, 48 * mul, false, p.skull.eye, { shape: 'swordwave', pierce: true }));
        this._fx('slashArc', p.cx + p.facing * 40, p.cy, 0.34, p.skull.eye, { dir: p.facing, size: 150 });
        // 기방출: a big-explosion-grade radial sword-energy burst — pure blue ki,
        // no orange explosion tint. Layered blue shock rings + a white core flash.
        this.shake = max(this.shake, 0.42);
        this._fx('ring', p.cx, p.cy, 0.5, p.skull.eye, { size: 185 });
        this._fx('ring', p.cx, p.cy, 0.42, Color.lerp(p.skull.eye, Colors.white, 0.45), { size: 132 });
        this._fx('ring', p.cx, p.cy, 0.3, new Color(0xFFFFFFFF), { size: 72 });
        const radius = 185.0;
        for (const e of this._targets()) {
          if (e.center.sub(p.center).distance < radius + e.w / 2) {
            e.damage(32 * mul);
            const dir = e.cx >= p.cx ? 1 : -1;
            if (e instanceof Enemy && e.kind !== EnemyKind.bat) { e.vx = dir * 420.0; e.vy = -280; }
            this._hitSpark(e.cx, e.cy, dir);
          }
        }
        for (let i = 0; i < 40; i++) {
          const a = this.rng.nextDouble() * pi * 2;
          const sp = 180 + this.rng.nextDouble() * 320;
          this.particles.add(new Particle(p.cx, p.cy, cos(a) * sp, sin(a) * sp - 60, 0.5 + this.rng.nextDouble() * 0.4, 5 + this.rng.nextDouble() * 5, (i % 2 === 0) ? p.skull.eye : new Color(0xFFFFFFFF), 500));
        }
        break;
      }
      case 'swordfall': {
        const tx = (p.cx + p.facing * 150).clamp(40.0, this.roomWidth - 40);
        this.projectiles.add(new Projectile(tx, p.cy - 340, 0, 640, 22, 1.6, 26 * mul, false, p.skull.eye, { shape: 'swordfall', pierce: true }));
        break;
      }
      case 'trap': {
        const mx = (p.cx + p.facing * 26).clamp(30.0, this.roomWidth - 30);
        this.mines.add(new Mine(mx, p.y + p.h - 4, { dmg: 26 * mul }));
        for (let i = 0; i < 8; i++) {
          this.particles.add(new Particle(mx, p.y + p.h - 6, (this.rng.nextDouble() - 0.5) * 70, -this.rng.nextDouble() * 70, 0.35, 3, new Color(0xFFAED581), 160));
        }
        if (this.mines.length > 4) this.mines.removeAt(0);
        break;
      }
      case 'net': {
        this.projectiles.add(new Projectile(p.cx + p.facing * 14, p.cy - 6, p.facing * 340.0, -150, 15, 2.0, 12 * mul, false, new Color(0xFFB0BEC5), { shape: 'net', grav: 420 }));
        break;
      }
      case 'rockthrow': {
        for (let i = -1; i <= 1; i++) {
          this.projectiles.add(new Projectile(p.cx + p.facing * 14, p.cy - 8, p.facing * (300 + i * 30.0), -300 + i * 50.0, 9, 1.9, 16 * mul, false, new Color(0xFF9E8576), { shape: 'rock', grav: 720 }));
        }
        this.shake = max(this.shake, 0.12);
        break;
      }
      case 'valkyrie': {
        const reach = 290.0;
        const lo = p.facing >= 0 ? p.cx : p.cx - reach;
        const area = Rect.fromLTWH(lo, p.cy - 60, reach, 120);
        for (const e of this._targets()) {
          if (area.overlaps(e.rect)) {
            if (e instanceof Boss) this._damageBoss(e, 22 * mul);
            else e.damage(22 * mul);
            const dir = e.cx >= p.cx ? 1 : -1;
            if (e instanceof Enemy && e.kind !== EnemyKind.bat) { e.vx = dir * 340.0; e.vy = -200; }
            this._hitSpark(e.cx, e.cy, dir);
          }
        }
        this._fx('ghost', lo, p.cy, 0.42, new Color(0xFFFFF59D), { dir: p.facing, size: reach });
        this._fx('slashArc', p.cx + p.facing * reach * 0.66, p.cy, 0.34, new Color(0xFFFFF59D), { dir: p.facing, size: 120 });
        this.shake = max(this.shake, 0.2);
        break;
      }
      case 'frost': {
        for (let i = -1; i <= 1; i++) {
          this.projectiles.add(new Projectile(p.cx, p.cy - 4, p.facing * 380.0, i * 90.0, 9, 1.8, 10 * mul, false, new Color(0xFF80DEEA), { shape: 'icicle' }));
        }
        for (let i = 0; i < 8; i++) {
          this.particles.add(new Particle(p.cx + p.facing * 14, p.cy - 4, p.facing * (60 + this.rng.nextDouble() * 160), (this.rng.nextDouble() - 0.5) * 120, 0.3, 3, new Color(0xFFB3E5FC), 80));
        }
        break;
      }
      case 'railgun': {
        p.railgunTimer = 5.0;
        p.railgunCd = 0;
        this._railBeam(p);
        this._banner('레일건 — 5초 연속 사격!', 1.6);
        break;
      }
    }
  }

  _railBeam(p) {
    const mul = this.atkMul;
    const reach = 820.0;
    const lo = p.facing >= 0 ? p.cx : p.cx - reach;
    const beam = Rect.fromLTWH(lo, p.cy - 22, reach, 44);
    for (const e of this._targets()) {
      if (beam.overlaps(e.rect)) {
        if (e instanceof Boss) this._damageBoss(e, 48 * mul);
        else e.damage(48 * mul);
        this._hitSpark(e.cx, e.cy, p.facing);
      }
    }
    const endX = (p.cx + p.facing * reach).clamp(0.0, this.roomWidth);
    this.skillFx.add(new SkillFx('lightning', p.cx, p.cy, 0.3, new Color(0xFF18FFFF), { x2: endX, y2: p.cy }));
    for (let t = 0; t <= 1; t += 0.04) {
      this.particles.add(new Particle(p.cx + (endX - p.cx) * t, p.cy + (this.rng.nextDouble() - 0.5) * 12, 0, 0, 0.26, 4, new Color(0xFFB2EBF2), 0));
    }
    p.vx -= p.facing * 150.0;
    this.shake = max(this.shake, 0.24);
    this._emitNoise(p.cx, p.cy, 0.6);
  }

  _slamShockwave(p, mul) {
    this.shake = max(this.shake, 0.38);
    this._fx('crack', p.cx, p.y + p.h, 0.5, new Color(0xFFFFB300), { size: 300 });
    this._fx('ring', p.cx, p.y + p.h, 0.32, new Color(0xFFFFD166), { size: 95 });
    for (const e of this._targets()) {
      if ((e.cx - p.cx).abs() < 290 && (e.cy - p.cy).abs() < 130) {
        if (e instanceof Boss) this._damageBoss(e, 26 * mul);
        else e.damage(26 * mul);
        const dir = e.cx >= p.cx ? 1 : -1;
        if (e instanceof Enemy) { e.vx = dir * 260.0; e.vy = -300; }
        this._hitSpark(e.cx, e.cy, dir);
      }
    }
    for (let i = 0; i < 22; i++) {
      const a = (i / 22) * pi;
      this.particles.add(new Particle(p.cx, p.y + p.h, cos(a) * 300, -sin(a) * 220, 0.5, 7, new Color(0xFFFFB300), 700));
    }
  }

  _finisher(p, mul) {
    const sk = p.skull;
    let tb;
    switch (sk.tier) {
      case SkullTier.common: tb = 1.0; break;
      case SkullTier.rare: tb = 1.2; break;
      case SkullTier.epic: tb = 1.45; break;
      case SkullTier.legendary: tb = 1.8; break;
    }
    const facing = p.facing;
    const col = sk.eye;
    const cat = sk.category;
    let fxKind, reach, half, dmg;
    if (cat === '짐승형') { fxKind = 'claw'; reach = 130; half = 72; dmg = 14; }
    else if (cat === '기사') { fxKind = 'crack'; reach = 175; half = 74; dmg = 16; }
    else if (cat === '마법형') { fxKind = 'ring'; reach = 120; half = 110; dmg = 14; }
    else if (cat === '권사') { fxKind = 'claw'; reach = 110; half = 52; dmg = 15; }
    else if (cat === '창병') { fxKind = 'slashArc'; reach = 165; half = 46; dmg = 14; }
    else if (cat === '궁수형') { fxKind = 'slashArc'; reach = 120; half = 42; dmg = 11; }
    else if (sk.weapon === 'scythe') { fxKind = 'slashArc'; reach = 165; half = 88; dmg = 17; }
    else { fxKind = 'slashArc'; reach = 145; half = 70; dmg = 15; }
    dmg = dmg * tb * mul;
    const left = facing >= 0 ? p.cx : p.cx - reach;
    const area = Rect.fromLTWH(left, p.cy - half, reach, half * 2);
    for (const e of this._targets()) {
      if (area.overlaps(e.rect)) {
        if (e instanceof Boss) this._damageBoss(e, dmg);
        else e.damage(dmg);
        const dir = e.cx >= p.cx ? 1 : -1;
        if (e instanceof Enemy && e.kind !== EnemyKind.bat) { e.vx = dir * 360.0; e.vy = -180; }
        this._hitSpark(e.cx, e.cy, dir);
      }
    }
    this.shake = max(this.shake, 0.2);
    if (fxKind === 'crack') {
      this._fx('crack', p.cx, p.y + p.h, 0.45, col, { size: reach });
      this._fx('ring', p.cx, p.y + p.h, 0.3, col, { size: 72 });
    } else if (fxKind === 'ring') {
      this._fx('ring', p.cx, p.cy, 0.4, col, { size: 115 });
    } else {
      this._fx(fxKind, p.cx, p.cy, 0.34, col, { dir: facing, size: reach * 0.8 });
    }
    if (sk.tier === SkullTier.epic || sk.tier === SkullTier.legendary) {
      this._fx('ring', p.cx, p.cy, 0.45, col, { size: reach * 0.9 });
    }
    if (sk.tier === SkullTier.legendary) {
      this._fx('dualring', p.cx, p.cy, 0.5, new Color(0xFFFFFFFF), { size: reach });
    }
    if (sk.type === SkullType.lich) {
      this.projectiles.add(new Projectile(p.cx + facing * 18, p.cy - 4, facing * 520.0, 0, 22, 1.4, dmg * 0.9, false, new Color(0xFF1A0A24), { shape: 'swordwave', pierce: true }));
      this._fx('slashArc', p.cx + facing * 30, p.cy, 0.3, new Color(0xFF7E1FA0), { dir: facing, size: 96 });
    }
    if (sk.type === SkullType.dragoon && p.flyTimer > 0) {
      const fromX = p.cx;
      p.x = (p.x + facing * 300).clamp(20.0, this.roomWidth - p.w - 20);
      p.invuln = max(p.invuln, 0.3);
      const lo = min(fromX, p.cx) - 30, hi = max(fromX, p.cx) + 30;
      for (const e of this._targets()) {
        if (e.cx >= lo && e.cx <= hi && (e.cy - p.cy).abs() < 120) {
          if (e instanceof Boss) this._damageBoss(e, 30 * mul);
          else {
            e.damage(30 * mul);
            const dir = e.cx >= fromX ? 1 : -1;
            if (e instanceof Enemy && e.kind !== EnemyKind.bat) { e.vx = dir * 360.0; e.vy = -180; }
          }
          this._hitSpark(e.cx, e.cy, p.facing);
        }
      }
      this._fx('dragon', p.cx, p.cy - 2, 0.34, col, { dir: facing, size: 120 });
      for (let t = 0; t <= 1; t += 0.08) {
        this.particles.add(new Particle(lo + (hi - lo) * t, p.cy, 0, 0, 0.3, 6, col.withOpacity(0.7), 0));
      }
      this.shake = max(this.shake, 0.18);
    }
  }

  _emitNoise(x, y, dur) {
    if (dur > this.combatNoise) this.combatNoise = dur;
    this.noiseX = x;
    this.noiseY = y;
  }

  _lineOfSight(a, b) {
    const steps = 14;
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const x = a.cx + (b.cx - a.cx) * t;
      const y = a.cy + (b.cy - a.cy) * t;
      for (const s of this.solids) {
        if (s.contains(new Offset(x, y))) return false;
      }
    }
    return true;
  }

  _updateEnemyAggro(e, dt) {
    const p = this.player;
    if (e.aggroTimer > 0) e.aggroTimer -= dt;
    if (e.jumpCd > 0) e.jumpCd -= dt;
    if (e.dropTimer > 0) e.dropTimer -= dt;
    if (p.ghostTimer > 0 || p.stealthTimer > 0) {
      e.aggro = false;
      e.aggroTimer = 0;
      return;
    }
    const dx = (p.cx - e.cx).abs();
    const dy = (p.cy - e.cy).abs();
    let sees = false;
    if (!p.hidden && dx < 460 && dy < 90 && this._lineOfSight(e, p)) sees = true;
    if (this.combatNoise > 0 && (e.cx - this.noiseX).abs() < 380 && (e.cy - this.noiseY).abs() < 170) sees = true;
    if (sees) {
      e.aggro = true;
      e.aggroTimer = 3.5;
    } else {
      if (p.hidden) e.aggroTimer = min(e.aggroTimer, 0.3);
      if (e.aggroTimer <= 0) e.aggro = false;
    }
  }

  _groundNav(e, dt, chaseSpeed, patrolSpeed) {
    const p = this.player;
    const dx = p.cx - e.cx;
    if (e.aggro) {
      e.facing = dx > 0 ? 1 : -1;
      e.vx = e.facing * chaseSpeed;
      const blocked = !this._groundAhead(e) || this._wallAhead(e);
      if (e.onGround && e.jumpCd <= 0) {
        const wantUp = p.cy < e.cy - 50 && dx.abs() < 280;
        if (wantUp || blocked) {
          e.vy = -820;
          e.jumpCd = 0.9;
        }
      }
      if (e.onGround && p.cy > e.cy + 60 && dx.abs() < 200) e.dropTimer = 0.25;
    } else {
      e.vx = e.facing * patrolSpeed;
      if (!this._groundAhead(e) || this._wallAhead(e)) {
        e.facing = -e.facing;
        e.vx = e.facing * patrolSpeed;
      }
    }
  }

  _updateEnemy(e, dt) {
    e.animTime += dt;
    this._updateStatuses(e, dt);
    if (e.hitFlash > 0) e.hitFlash -= dt;
    if (e.hurtTimer > 0) e.hurtTimer -= dt;
    if (e.attackAnim > 0) e.attackAnim -= dt;
    if (e.windup > 0) e.windup -= dt;
    if (e.hasStatus(StatusKind.stun) || e.hasStatus(StatusKind.bind)) {
      e.vy += kGravity * dt;
      e.vx *= 0.8;
      this._moveAndCollide(e, dt);
      return;
    }
    const p = this.player;
    const dx = p.cx - e.cx;
    const dist = dx.abs();

    switch (e.kind) {
      case EnemyKind.grunt: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = e.facing * 280;
        } else if (e.aggro && dist < 80 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.18;
          e.atkCd = 1.3;
          e.attackAnim = 0.28;
          e.vx = e.facing * 280;
        } else {
          this._groundNav(e, dt, 150, 70);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.bat: {
        e.facing = dx > 0 ? 1 : -1;
        const ceil = this._flyerCeiling(e);
        if (e.aggro) {
          const ang = atan2((p.cy - 30) - e.cy, p.cx - e.cx);
          e.vx = cos(ang) * 175;
          e.vy = sin(ang) * 175 + sin(e.animTime * 6 + e.phase) * 45;
        } else {
          // hover toward a reachable height: its spawn level, but never above
          // a single jump of nearby terrain
          const hover = max(e.homeY, ceil + 30);
          e.vx = sin(e.animTime * 0.8 + e.phase) * 40;
          e.vy = (hover - e.cy) * 1.6 + sin(e.animTime * 4 + e.phase) * 28;
        }
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.x = e.x.clamp(20.0, this.roomWidth - e.w - 20);
        e.y = e.y.clamp(40.0, kGroundY - e.h);
        // hard cap: never rise above what a single jump can reach
        if (e.y < ceil) { e.y = ceil; if (e.vy < 0) e.vy = 0; }
        break;
      }
      case EnemyKind.gargoyle: {
        e.atkCd -= dt;
        e.t2 -= dt;
        const ceil = this._flyerCeiling(e);
        if (e.t2 > 0) {
          // mid dive — coast
        } else if (e.aggro && dist < 400 && e.atkCd <= 0) {
          e.atkCd = 2.2 + this.rng.nextDouble();
          e.t2 = 0.45;
          const ang = atan2(p.cy - e.cy, p.cx - e.cx);
          e.vx = cos(ang) * 500;
          e.vy = sin(ang) * 500;
          e.facing = e.vx >= 0 ? 1 : -1;
        } else if (e.aggro) {
          const ang = atan2((p.cy - 70) - e.cy, p.cx - e.cx);
          e.vx = cos(ang) * 120;
          e.vy = sin(ang) * 120 + sin(e.animTime * 5 + e.phase) * 30;
          e.facing = dx > 0 ? 1 : -1;
        } else {
          const hover = max(e.homeY, ceil + 36);
          e.vx = sin(e.animTime * 0.7 + e.phase) * 30;
          e.vy = (hover - e.cy) * 1.4;
        }
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.x = e.x.clamp(20.0, this.roomWidth - e.w - 20);
        e.y = e.y.clamp(30.0, kGroundY - e.h);
        // hard cap unless mid dive-bomb (which intentionally drops downward)
        if (e.t2 <= 0 && e.y < ceil) { e.y = ceil; if (e.vy < 0) e.vy = 0; }
        break;
      }
      case EnemyKind.ghoul: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = e.facing * 300;
        } else if (e.aggro && dist < 110 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.28;
          e.atkCd = 1.4 + this.rng.nextDouble() * 0.5;
          e.attackAnim = 0.3;
          e.vx = e.facing * 300;
          e.vy = -120;
        } else {
          this._groundNav(e, dt, 110, 55);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.mage: {
        e.vy += kGravity * dt;
        e.vx = 0;
        e.facing = dx > 0 ? 1 : -1;
        e.atkCd -= dt;
        if (e.aggro && dist < 580 && e.atkCd <= 0) {
          e.atkCd = 2.2 + this.rng.nextDouble();
          e.attackAnim = 0.3;
          const ang = atan2(p.cy - e.cy, p.cx - e.cx);
          this.projectiles.add(new Projectile(e.cx, e.cy - 6, cos(ang) * 320, sin(ang) * 320, 9, 3.0, 11, true, new Color(0xFFB388FF)));
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.fireMage: {
        e.vy += kGravity * dt;
        e.vx = 0;
        e.facing = dx > 0 ? 1 : -1;
        e.atkCd -= dt;
        if (e.aggro && dist < 560 && e.atkCd <= 0) {
          e.atkCd = 2.4 + this.rng.nextDouble();
          e.attackAnim = 0.3;
          const ang = atan2(p.cy - e.cy, p.cx - e.cx);
          this.projectiles.add(new Projectile(e.cx, e.cy - 6, cos(ang) * 300, sin(ang) * 300, 10, 3.0, 11, true, new Color(0xFFFF7043), { shape: 'orb', onHit: StatusKind.burn, onHitDur: 3.0, onHitPow: this._foePow(5) }));
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.slime: {
        e.vy += kGravity * dt;
        if (e.aggro) e.facing = dx > 0 ? 1 : -1;
        e.atkCd -= dt;
        if (e.onGround) {
          if (e.aggro && e.atkCd <= 0) {
            e.vy = -540;
            e.vx = e.facing * 170;
            e.atkCd = 0.8 + this.rng.nextDouble() * 0.7;
            e.attackAnim = 0.35;
          } else {
            e.vx *= 0.8;
          }
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.archer: {
        e.vy += kGravity * dt;
        e.facing = dx > 0 ? 1 : -1;
        e.atkCd -= dt;
        if (e.aggro && dist < 180 && e.onGround) {
          e.vx = -e.facing * 90;
          if (!this._groundAhead(e) || this._wallAhead(e)) e.vx = 0;
        } else {
          e.vx = 0;
        }
        if (e.aggro && dist < 640 && dist > 120 && e.atkCd <= 0) {
          e.atkCd = 1.7 + this.rng.nextDouble();
          e.attackAnim = 0.3;
          const ang = atan2(p.cy - e.cy, p.cx - e.cx);
          this.projectiles.add(new Projectile(e.cx, e.cy - 6, cos(ang) * 470, sin(ang) * 470, 6, 2.6, 10, true, new Color(0xFFFFCC80)));
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.brute: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = e.facing * 430;
        } else if (e.aggro && dist < 360 && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.4;
          e.atkCd = 2.4;
          e.vx = e.facing * 430;
          e.attackAnim = 0.4;
        } else {
          this._groundNav(e, dt, 110, 45);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.goblin: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = e.facing * 360;
        } else if (e.aggro && dist < 90 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.16;
          e.atkCd = 0.9;
          e.attackAnim = 0.24;
          e.vx = e.facing * 360;
        } else {
          this._groundNav(e, dt, 210, 95);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.assassin: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = e.facing * 460;
        } else if (e.aggro && dist < 230 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.22;
          e.atkCd = 1.2 + this.rng.nextDouble() * 0.5;
          e.attackAnim = 0.28;
          e.vx = e.facing * 460;
          e.vy = -170;
        } else {
          this._groundNav(e, dt, 235, 115);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.heretic: {
        e.vy += kGravity * dt;
        e.vx = 0;
        e.facing = dx > 0 ? 1 : -1;
        e.atkCd -= dt;
        if (e.aggro && dist < 600 && e.atkCd <= 0) {
          e.atkCd = 2.0 + this.rng.nextDouble();
          e.attackAnim = 0.3;
          const ang = atan2(p.cy - e.cy, p.cx - e.cx);
          this.projectiles.add(new Projectile(e.cx, e.cy - 8, cos(ang) * 280, sin(ang) * 280, 9, 3.2, 10, true, new Color(0xFFCE93D8), { shape: 'orb', onHit: StatusKind.weaken, onHitDur: 4.0, onHitPow: 1 }));
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.thief: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = -e.facing * 300;
        } else if (e.aggro && dist < 130 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.5;
          e.atkCd = 1.8;
          e.attackAnim = 0.24;
          e.vx = e.facing * 380;
        } else {
          this._groundNav(e, dt, 220, 100);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.knightSoldier: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.windup > 0) {
          e.vx = 0;
          e.windup -= dt;
          if (e.windup <= 0) e.t2 = 0.2;
        } else if (e.t2 > 0) {
          e.vx = e.facing * 320;
        } else if (e.aggro && dist < 120 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.windup = 0.4;
          e.atkCd = 2.0;
          e.attackAnim = 0.6;
          e.vx = 0;
        } else {
          this._groundNav(e, dt, 130, 70);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.brawler: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = e.facing * 210;
        } else if (e.aggro && dist < 80 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.3;
          e.atkCd = 0.8;
          e.attackAnim = 0.3;
          e.vx = e.facing * 210;
        } else {
          this._groundNav(e, dt, 185, 95);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.dwarf: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        e.t2 -= dt;
        if (e.t2 > 0) {
          e.vx = e.facing * 220;
        } else if (e.aggro && dist < 100 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.t2 = 0.3;
          e.atkCd = 1.8;
          e.attackAnim = 0.34;
          e.vx = e.facing * 220;
        } else {
          this._groundNav(e, dt, 95, 40);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.darkElf: {
        e.vy += kGravity * dt;
        e.facing = dx > 0 ? 1 : -1;
        e.atkCd -= dt;
        if (e.aggro && dist < 200 && e.onGround) {
          e.vx = -e.facing * 110;
          if (!this._groundAhead(e) || this._wallAhead(e)) e.vx = 0;
        } else {
          e.vx = 0;
        }
        if (e.aggro && dist < 620 && dist > 120 && e.atkCd <= 0) {
          e.atkCd = 1.9 + this.rng.nextDouble();
          e.attackAnim = 0.3;
          const ang = atan2(p.cy - e.cy, p.cx - e.cx);
          this.projectiles.add(new Projectile(e.cx, e.cy - 6, cos(ang) * 430, sin(ang) * 430, 7, 2.8, 9, true, new Color(0xFFCE93D8), { onHit: StatusKind.bleed, onHitDur: 3.5, onHitPow: 5 }));
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.plant: {
        this._updatePlant(e, dt, dist);
        break;
      }
      case EnemyKind.hammer: {
        e.vy += kGravity * dt;
        e.atkCd -= dt;
        if (e.windup > 0) {
          e.vx = 0;
          if (e.windup <= dt && e.onGround) this._hammerSlam(e);
        } else if (e.aggro && dist < 120 && e.onGround && e.atkCd <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.windup = 0.55;
          e.atkCd = 2.6;
          e.attackAnim = 0.55;
          e.vx = 0;
        } else {
          this._groundNav(e, dt, 85, 35);
        }
        this._moveAndCollide(e, dt);
        break;
      }
      case EnemyKind.shield: {
        e.vy += kGravity * dt;
        if (this.shieldCrystal !== null) e.t2 = 1.0;
        e.atkCd -= dt;
        if (e.t2 > 0) e.t2 -= dt;
        if (e.aggro && dist < 96 && e.onGround && e.atkCd <= 0 && e.t2 <= 0) {
          e.facing = dx > 0 ? 1 : -1;
          e.atkCd = 1.6;
          e.attackAnim = 0.3;
          e.vx = e.facing * 170;
        } else if (e.aggro && e.t2 <= 0 && e.atkCd <= 0.9 && this.rng.nextDouble() < 0.02) {
          e.t2 = 1.6;
        } else if (e.t2 <= 0) {
          this._groundNav(e, dt, 95, 40);
        } else {
          e.facing = dx > 0 ? 1 : -1;
          e.vx = e.facing * 45;
        }
        this._moveAndCollide(e, dt);
        break;
      }
    }
  }

  _groundTopAt(x) {
    for (const g of this.groundSegments) {
      if (x >= g.left && x <= g.right) return g.top;
    }
    return kGroundY;
  }

  // Highest altitude (smallest y / world-top) a flying enemy may reach, so it
  // always stays within a single jump of some nearby standable surface — that
  // way flyers can never park unreachable in open air. Uses the highest terrain
  // step / one-way platform within a small horizontal window of the flyer.
  _flyerCeiling(e) {
    const reachH = 180; // a single jump's vertical reach above a surface top
    const win = 60;     // horizontal window the player could stand within
    const lo = e.cx - win, hi = e.cx + win;
    let bestTop = this._groundTopAt(e.cx); // the terrain directly below it
    for (const g of this.groundSegments) {
      if (g.right > lo && g.left < hi && g.top < bestTop) bestTop = g.top;
    }
    for (const pf of this.platforms) {
      if (pf.right > lo && pf.left < hi && pf.top < bestTop) bestTop = pf.top;
    }
    return bestTop - reachH;
  }

  _updatePlant(e, dt, dist) {
    const p = this.player;
    e.vx = 0;
    e.vy += kGravity * dt;

    if (e.plantVariant === 3) {
      const above = (p.cx - e.cx).abs() < 60 && p.cy < e.cy - 20 && p.cy > e.cy - 220;
      if (above) {
        e.aggro = true;
        if (e.t2 < 1) e.t2 = min(1, e.t2 + dt * 6);
        e.atkCd -= dt;
        if (e.t2 >= 1 && e.atkCd <= 0) {
          e.atkCd = 2.0;
          e.attackAnim = 0.3;
          if (p.invuln <= 0 && (p.cx - e.cx).abs() < 52) {
            this._hurtPlayer(8, e.cx);
            p.addStatus(StatusKind.bind, 1.2, 1);
          }
          this._fx('handrise', e.cx, e.cy - 6, 0.4, new Color(0xFF66BB6A), { size: 64 });
        }
      } else {
        e.aggro = false;
        if (e.t2 > 0) e.t2 = max(0, e.t2 - dt * 2);
      }
      this._moveAndCollide(e, dt);
      return;
    }

    const near = dist < 190 && (p.cy - e.cy).abs() < 90;
    if (near) {
      e.aggro = true;
      if (e.t2 < 1) e.t2 = min(1, e.t2 + dt * 4);
      e.atkCd -= dt;
      if (e.t2 >= 1 && e.atkCd <= 0) {
        e.attackAnim = 0.3;
        const ang = atan2(p.cy - e.cy, p.cx - e.cx);
        if (e.plantVariant === 2) {
          e.atkCd = 1.8 + this.rng.nextDouble();
          this.projectiles.add(new Projectile(e.cx, e.cy - 8, cos(ang) * 320, sin(ang) * 320, 9, 2.6, 9, true, new Color(0xFFFF7043), { shape: 'ball', onHit: StatusKind.burn, onHitDur: 2.5, onHitPow: this._foePow(5) }));
        } else {
          e.atkCd = 1.6 + this.rng.nextDouble();
          this.projectiles.add(new Projectile(e.cx, e.cy - 8, cos(ang) * 300, sin(ang) * 300, 8, 2.6, 8, true, new Color(0xFF9CCC65), { onHit: StatusKind.poison, onHitDur: 3.5, onHitPow: this._foePow(5) }));
        }
        if (e.plantVariant === 1) this._plantBlink(e);
      }
    } else {
      e.aggro = false;
      if (e.t2 > 0) e.t2 = max(0, e.t2 - dt * 2);
    }
    this._moveAndCollide(e, dt);
  }

  _plantBlink(e) {
    for (let i = 0; i < 10; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      this.particles.add(new Particle(e.cx, e.cy, cos(a) * 120, sin(a) * 120 - 30, 0.4, 4, new Color(0xFFB388FF), 60));
    }
    const side = this.rng.nextBool() ? 1 : -1;
    const nx = (this.player.cx + side * (150 + this.rng.nextDouble() * 160)).clamp(40.0, this.roomWidth - 40 - e.w);
    e.x = nx;
    e.y = this._groundTopAt(e.cx) - e.h;
    e.t2 = 0;
    e.atkCd = 0.7;
    for (let i = 0; i < 10; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      this.particles.add(new Particle(e.cx, e.cy, cos(a) * 120, sin(a) * 120 - 30, 0.4, 4, new Color(0xFFB388FF), 60));
    }
  }

  _updateBoss(b, dt) {
    b.animTime += dt;
    if (b.hitFlash > 0) b.hitFlash -= dt;
    if (b.hurtTimer > 0) b.hurtTimer -= dt;
    if (b.subTimer > 0) b.subTimer -= dt;
    if (b.guard > 0) b.guard -= dt;
    if (!b.enraged && b.hp < b.maxHp * 0.5) {
      b.enraged = true;
      this._banner(`${b.name}이(가) 분노한다!`, 1.4);
      this.shake = max(this.shake, 0.3);
    }
    const p = this.player;
    const lockFacing = b.state === BossState.active &&
      (b.pattern === 'charge' || b.pattern === 'smash' || b.pattern === 'wideslash' ||
        b.pattern === 'triplesmash' || b.pattern === 'divebomb' || b.pattern === 'swoop' || b.pattern === 'approach');
    if (!lockFacing) b.facing = p.cx >= b.cx ? 1 : -1;
    if (this._isFlying(b) && b.pattern !== 'rest') {
      const aerial = b.state === BossState.windup ||
        (b.state !== BossState.idle && b.pattern !== 'divebomb' && b.pattern !== 'teleslam' && b.pattern !== 'swoop');
      if (aerial) {
        b.hover = max(b.hover, 0.1);
        if (b.hoverTargetY === 0) b.hoverTargetY = kGroundY - 250;
      }
    }
    if (b.hover > 0) {
      b.hover -= dt;
      const dy = b.hoverTargetY - b.y;
      b.vy = dy.clamp(-150.0, 150.0);
      b.airborne = true;
    } else {
      b.vy += kGravity * dt;
    }
    b.stateTimer -= dt;

    switch (b.state) {
      case BossState.idle: {
        b.atkCd -= dt;
        const dxx = p.cx - b.cx;
        if (this._isFlying(b)) {
          this._hoverIdle(b, dxx);
        } else {
          b.vx = dxx.abs() > 120 ? b.facing * b.spec.walkSpeed * 0.5 : 0;
        }
        if (b.atkCd <= 0 && dxx.abs() < 920) {
          if (b.queue.isEmpty) b.queue.addAll(this._bossPlaybook(b));
          let step = b.queue.removeAt(0);
          if (step === 'rand') step = this._pickBossSkill(b);
          b.pattern = step;
          b.state = BossState.windup;
          b.stateTimer = this._bossWindup(b);
          b.vx = 0;
          if (b.pattern === 'beam') b.guard = b.stateTimer;
        }
        this._moveAndCollide(b, dt, false);
        break;
      }
      case BossState.windup: {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) this._bossStartAttack(b);
        break;
      }
      case BossState.active: {
        this._bossActive(b, dt);
        break;
      }
      case BossState.recover: {
        b.vx *= 0.8;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) {
          b.state = BossState.idle;
          const base = b.enraged ? 0.3 : 0.55;
          b.atkCd = base + this.rng.nextDouble() * 0.35;
        }
        break;
      }
    }
  }

  _isFlying(b) { return b.spec.visual === 'witch' || b.spec.visual === 'eagle'; }

  _hoverIdle(b, dxx) {
    b.hover = 0.2;
    b.hoverTargetY = (kGroundY - 250) + sin(b.animTime * 2) * 18;
    b.vx = dxx.abs() > 220 ? b.facing * b.spec.walkSpeed * 0.8 : b.vx * 0.9;
  }

  _bossPlaybook(b) {
    switch (b.spec.visual) {
      case 'boar':
      case 'redBear':
      case 'wolfKing':
        return ['basic', 'basic', 'charge', 'basic', 'rand', 'approach', 'basic', 'rand', 'guard', 'rand', 'charge', 'rand'];
      case 'goblin':
        return ['basic', 'guard', 'basic', 'approach', 'rand', 'basic', 'rand', 'guard', 'rand', 'approach', 'rand'];
      case 'golem':
      case 'rockBrute':
        return ['basic', 'basic', 'approach', 'rand', 'basic', 'rand', 'guard', 'rand', 'approach', 'rand'];
      case 'knight':
      case 'doppel':
        return ['basic', 'basic', 'approach', 'basic', 'rand', 'guard', 'rand', 'approach', 'basic', 'rand', 'rand'];
      case 'mercenary':
        return ['basic', 'basic', 'approach', 'rand', 'basic', 'rand', 'guard', 'approach', 'rand', 'rand'];
      case 'bandit':
        return ['basic', 'approach', 'basic', 'rand', 'reposition', 'rand', 'basic', 'rand', 'reposition', 'rand'];
      case 'dragonkin':
        return ['basic', 'approach', 'basic', 'rand', 'basic', 'rand', 'guard', 'rand', 'approach', 'rand'];
      case 'witch':
        return ['rand', 'reposition', 'rand', 'rand', 'reposition', 'rand', 'rest'];
      case 'demonKing':
        return ['rand', 'reposition', 'rand', 'basic', 'rand', 'guard', 'rand', 'reposition', 'rand', 'rand'];
      case 'mummy':
        return ['rand', 'approach', 'basic', 'rand', 'reposition', 'rand', 'guard', 'rand', 'rand'];
      case 'spider':
        return ['rand', 'reposition', 'rand', 'basic', 'rand', 'rand', 'reposition', 'rand'];
      case 'eagle':
        return ['feathers', 'swoop', 'feathers', 'divebomb', 'swoop', 'rest'];
      case 'appleTree':
        return ['appleScatter', 'basic', 'roots', 'guard', 'appleScatter', 'roots', 'rand', 'guard'];
      case 'worm':
        return ['leap', 'smash', 'basic', 'triplesmash', 'approach', 'smash', 'rand'];
      case 'dragon':
        return ['firebreath', 'basic', 'approach', 'divebomb', 'rand', 'charge', 'rand'];
    }
    const legacy = (() => {
      switch (b.spec.archetype) {
        case BossArchetype.charger: return 'charge';
        case BossArchetype.caster: return 'cast';
        case BossArchetype.jumper: return 'leap';
        case BossArchetype.boarSmash: return 'smash';
        case BossArchetype.iaido: return 'iaido';
        case BossArchetype.flurry: return 'flurry';
        case BossArchetype.guardian: return 'guard';
      }
    })();
    return ['basic', 'basic', 'approach', legacy, 'guard', legacy];
  }

  _bossSkillPool(b) {
    switch (b.spec.visual) {
      case 'knight': return ['teleslam', 'beam', 'iaido', 'swordbeam'];
      case 'mercenary': return ['flurry', 'wideslash', 'swordbeam'];
      case 'bandit': return ['knives', 'flurry', 'wideslash'];
      case 'doppel': return ['iaido', 'flurry', 'knives', 'swordbeam'];
      case 'dragonkin': return ['wideslash', 'swordbeam', 'divebomb', 'firebreath'];
      case 'witch': return ['cast', 'vortex', 'teleslam'];
      case 'demonKing': return ['cast', 'teleslam', 'vortex', 'beam', 'wideslash'];
      case 'mummy': return ['flurry', 'wideslash', 'vortex'];
      case 'spider': return ['webshot', 'vortex', 'teleslam', 'wideslash'];
      case 'goblin': return ['smash', 'wideslash'];
      case 'boar': return ['smash', 'wideslash', 'charge'];
      case 'redBear':
      case 'golem':
      case 'rockBrute': return ['smash', 'triplesmash', 'wideslash', 'leap'];
      case 'wolfKing': return ['charge', 'smash', 'flurry'];
      case 'eagle': return ['feathers', 'swoop', 'divebomb'];
      case 'appleTree': return ['appleScatter', 'roots'];
      case 'worm': return ['smash', 'leap', 'triplesmash'];
      case 'dragon': return ['firebreath', 'divebomb', 'charge', 'wideslash'];
    }
    return ['wideslash'];
  }

  _pickBossSkill(b) {
    const pool = this._bossSkillPool(b);
    if (pool.length === 1) return pool.first;
    let pick = pool.first;
    for (let i = 0; i < 5; i++) {
      pick = pool[this.rng.nextInt(pool.length)];
      if (pick !== b.pattern) break;
    }
    return pick;
  }

  _bossWindup(b) {
    switch (b.pattern) {
      case 'basic': return 0.4;
      case 'iaido': return 1.0;
      case 'beam': return b.enraged ? 0.9 : 1.3;
      case 'teleslam': return 0.5;
      case 'guard': return 0.3;
      case 'smash': return 0.5;
      case 'triplesmash': return 0.5;
      case 'swordbeam': return 0.7;
      case 'divebomb': return 0.4;
      case 'vortex': return 0.7;
      case 'approach': return 0.12;
      case 'reposition': return 0.12;
      case 'rest': return 0.15;
      case 'appleScatter': return 0.6;
      case 'roots': return 0.7;
      case 'feathers': return 0.4;
      case 'swoop': return 0.5;
      case 'firebreath': return 0.6;
      case 'knives': return 0.35;
      case 'webshot': return 0.5;
      default: return 0.55;
    }
  }

  _bossStartAttack(b) {
    b.state = BossState.active;
    const p = this.player;
    switch (b.pattern) {
      case 'basic': {
        b.stateTimer = 0.28;
        b.vx = b.facing * 130;
        this._bossSlash(b, 150, b.enraged ? 16 : 11, 260);
        this.shake = max(this.shake, 0.14);
        break;
      }
      case 'charge': {
        b.stateTimer = 0.6;
        b.vx = b.facing * b.spec.walkSpeed * 3.4;
        this.shake = 0.2;
        break;
      }
      case 'cast': {
        b.stateTimer = 0.45;
        const base = atan2(p.cy - b.cy, p.cx - b.cx);
        for (let i = -1; i <= 1; i++) {
          const ang = base + i * 0.26;
          this.projectiles.add(new Projectile(b.cx, b.cy - 10, cos(ang) * 360, sin(ang) * 360, 12, 3.5, 16, true, b.spec.color, { shape: 'orb' }));
        }
        break;
      }
      case 'leap': {
        b.stateTimer = 1.8;
        b.vy = -1250;
        b.vx = b.facing * 260;
        b.airborne = true;
        break;
      }
      case 'smash': {
        b.stateTimer = 0.7;
        b.vx = b.facing * b.spec.walkSpeed * 3.6;
        this.shake = 0.2;
        break;
      }
      case 'iaido': {
        b.stateTimer = 0.35;
        b.vx = b.facing * 200;
        this._bossSlash(b, 380, b.enraged ? 34 : 26, 460);
        this.shake = 0.25;
        break;
      }
      case 'flurry': {
        b.stateTimer = 1.0;
        b.subTimer = 0;
        b.hits = 0;
        break;
      }
      case 'guard': {
        b.stateTimer = 1.4;
        b.guard = 1.4;
        b.vx = 0;
        break;
      }
      case 'teleslam': {
        b.guard = 0;
        b.x = (p.cx - b.w / 2).clamp(40.0, this.roomWidth - b.w - 40);
        b.y = kGroundY - 360;
        b.vx = 0;
        b.vy = 60;
        b.airborne = true;
        b.stateTimer = 2.2;
        for (let i = 0; i < 18; i++) {
          const a = this.rng.nextDouble() * pi * 2;
          this.particles.add(new Particle(b.cx, b.cy, cos(a) * 160, sin(a) * 160, 0.4, 6, b.spec.color, 0));
        }
        break;
      }
      case 'beam': {
        b.guard = 0;
        b.stateTimer = 0.6;
        b.vx = 0;
        const n = b.enraged ? 12 : 9;
        for (let i = 0; i < n; i++) {
          const ang = i / n * pi * 2;
          this.projectiles.add(new Projectile(b.cx, b.cy - 6, cos(ang) * 560, sin(ang) * 560, 9, 2.6, b.enraged ? 20 : 15, true, new Color(0xFFE3F2FD), { shape: 'bolt' }));
        }
        this.shake = max(this.shake, 0.3);
        break;
      }
      case 'wideslash': {
        b.stateTimer = 0.7;
        b.vx = b.facing * b.spec.walkSpeed * 2.6;
        b.subTimer = 0.18;
        this._bossSlash(b, 220, b.enraged ? 30 : 22, 420);
        this.shake = 0.22;
        break;
      }
      case 'triplesmash': {
        b.hits = 0;
        b.airborne = true;
        b.vy = -820;
        b.vx = (p.cx - b.cx).sign * b.spec.walkSpeed * 1.6;
        b.stateTimer = 3.2;
        this.shake = max(this.shake, 0.15);
        break;
      }
      case 'swordbeam': {
        b.vx = 0;
        b.stateTimer = 0.5;
        const bd = b.enraged ? 26.0 : 20.0;
        this.projectiles.add(new Projectile(b.cx + b.facing * 30, b.cy - 4, b.facing * 620, 0, 14, 1.6, bd, true, new Color(0xFFE3F2FD), { shape: 'bolt', pierce: true }));
        this.projectiles.add(new Projectile(b.cx + b.facing * 30, b.cy - 18, b.facing * 620, 0, 9, 1.6, bd * 0.6, true, new Color(0xFFB3E5FC), { shape: 'bolt', pierce: true }));
        this.projectiles.add(new Projectile(b.cx + b.facing * 30, b.cy + 12, b.facing * 620, 0, 9, 1.6, bd * 0.6, true, new Color(0xFFB3E5FC), { shape: 'bolt', pierce: true }));
        this.shake = max(this.shake, 0.25);
        break;
      }
      case 'divebomb': {
        b.aimX = p.cx;
        b.subTimer = 0;
        b.airborne = true;
        b.vy = -1000;
        b.vx = 0;
        b.stateTimer = 2.6;
        this.shake = max(this.shake, 0.12);
        break;
      }
      case 'vortex': {
        b.vx = 0;
        b.stateTimer = 1.1;
        this._fx('ring', b.cx, b.cy, 1.1, new Color(0xFFE040FB), { size: 150 });
        break;
      }
      case 'approach': {
        b.stateTimer = 0.4;
        b.vx = b.facing * b.spec.walkSpeed * (this._isFlying(b) ? 2.4 : 1.8);
        break;
      }
      case 'reposition': {
        b.stateTimer = 0.35;
        b.facing = p.cx >= b.cx ? 1 : -1;
        b.vx = -b.facing * b.spec.walkSpeed * 2.2;
        if (!this._isFlying(b) && b.onGround) b.vy = -360;
        break;
      }
      case 'rest': {
        b.hover = 0;
        b.airborne = false;
        b.guard = 0;
        b.stateTimer = b.enraged ? 1.4 : 2.0;
        b.vx = 0;
        break;
      }
      case 'appleScatter': {
        b.stateTimer = 0.7;
        b.vx = 0;
        const n = b.enraged ? 6 : 4;
        for (let i = 0; i < n; i++) {
          const spread = (i / (n - 1) - 0.5) * 2;
          const tx = (p.cx + spread * 260).clamp(60.0, this.roomWidth - 60.0);
          const dx = tx - b.cx;
          const vx0 = dx / 0.85;
          this.projectiles.add(new Projectile(b.cx, b.cy - 30, vx0, -520, 11, 1.2, b.enraged ? 18 : 13, true, new Color(0xFFE53935), { shape: 'apple', grav: 1300 }));
        }
        break;
      }
      case 'roots': {
        b.vx = 0;
        b.hits = 0;
        b.subTimer = 0;
        b.aimX = (p.cx >= b.cx ? 1 : -1);
        b.stateTimer = 1.3;
        this.shake = max(this.shake, 0.15);
        break;
      }
      case 'feathers': {
        b.stateTimer = 0.5;
        const base = atan2((p.cy - b.cy).abs() + 40, (p.cx - b.cx));
        const n = b.enraged ? 7 : 5;
        for (let i = 0; i < n; i++) {
          const ang = base + (i - (n - 1) / 2) * 0.16;
          this.projectiles.add(new Projectile(b.cx, b.cy + 10, cos(ang) * 420, sin(ang) * 420 + 60, 9, 2.4, b.enraged ? 16 : 12, true, b.spec.color, { shape: 'feather' }));
        }
        break;
      }
      case 'swoop': {
        b.hover = 0.55;
        b.hoverTargetY = kGroundY - b.h - 6;
        b.vx = b.facing * b.spec.walkSpeed * 3.4;
        b.stateTimer = 0.7;
        this.shake = max(this.shake, 0.12);
        break;
      }
      case 'firebreath': {
        b.vx = 0;
        b.stateTimer = 0.6;
        for (let i = 0; i < 3; i++) {
          const ang = (i - 1) * 0.22;
          this.projectiles.add(new Projectile(b.cx + b.facing * 40, b.cy - 6, b.facing * cos(ang) * 420, sin(ang) * 420, 13, 1.8, b.enraged ? 20 : 15, true, new Color(0xFFFF7043), { shape: 'fireball' }));
        }
        this.shake = max(this.shake, 0.2);
        break;
      }
      case 'knives': {
        b.vx = 0;
        b.stateTimer = 0.4;
        const base = atan2(p.cy - b.cy, p.cx - b.cx);
        for (let i = -1; i <= 1; i++) {
          const ang = base + i * 0.2;
          this.projectiles.add(new Projectile(b.cx + b.facing * 20, b.cy - 6, cos(ang) * 520, sin(ang) * 520, 7, 2.0, b.enraged ? 14 : 10, true, new Color(0xFFCFD8DC), { shape: 'arrow' }));
        }
        break;
      }
      case 'webshot': {
        b.vx = 0;
        b.stateTimer = 0.45;
        const ang = atan2(p.cy - b.cy, p.cx - b.cx);
        this.projectiles.add(new Projectile(b.cx, b.cy, cos(ang) * 340, sin(ang) * 340, 12, 2.4, b.enraged ? 12 : 8, true, new Color(0xFFE0E0E0), { shape: 'net', onHit: StatusKind.slow, onHitDur: 2.5, onHitPow: 1 }));
        break;
      }
    }
  }

  _bossActive(b, dt) {
    switch (b.pattern) {
      case 'basic': {
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.4; }
        break;
      }
      case 'charge': {
        this._moveAndCollide(b, dt, false);
        if (this.rng.nextDouble() < 0.6) {
          this.particles.add(new Particle(b.cx, b.cy + 20, (this.rng.nextDouble() - 0.5) * 60, -this.rng.nextDouble() * 60, 0.4, 6, b.spec.color.withOpacity(0.7), 0));
        }
        if (b.stateTimer <= 0 || b.vx === 0) { b.state = BossState.recover; b.stateTimer = 0.6; }
        break;
      }
      case 'cast': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.5; }
        break;
      }
      case 'beam': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.5; }
        break;
      }
      case 'leap': {
        this._moveAndCollide(b, dt, false);
        if (b.airborne && b.onGround) {
          b.airborne = false;
          this._shockwave(b);
          b.state = BossState.recover;
          b.stateTimer = 0.7;
        } else if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.6; }
        break;
      }
      case 'teleslam': {
        this._moveAndCollide(b, dt, false);
        if (b.airborne && b.onGround) {
          b.airborne = false;
          this._bossErupt(b);
          b.state = BossState.recover;
          b.stateTimer = 0.9;
        } else if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.6; }
        break;
      }
      case 'smash': {
        this._moveAndCollide(b, dt, false);
        if (this.rng.nextDouble() < 0.6) {
          this.particles.add(new Particle(b.cx, b.cy + 20, (this.rng.nextDouble() - 0.5) * 60, -this.rng.nextDouble() * 60, 0.4, 6, b.spec.color.withOpacity(0.7), 0));
        }
        if (b.stateTimer <= 0 || b.vx === 0) {
          this._bossSmash(b);
          b.state = BossState.recover;
          b.stateTimer = 0.9;
        }
        break;
      }
      case 'iaido': {
        b.vx *= 0.85;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.6; }
        break;
      }
      case 'wideslash': {
        b.vx *= 0.9;
        this._moveAndCollide(b, dt, false);
        if (b.subTimer > 0 && b.subTimer - dt <= 0) this._bossSlash(b, 230, b.enraged ? 24 : 18, 380);
        b.subTimer -= dt;
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.6; }
        break;
      }
      case 'flurry': {
        b.vx = b.facing * 80;
        this._moveAndCollide(b, dt, false);
        if (b.subTimer <= 0 && b.hits < (b.enraged ? 6 : 4)) {
          b.subTimer = 0.16;
          b.hits++;
          this._bossSlash(b, 150, 10, 160);
          this.shake = max(this.shake, 0.1);
        }
        b.subTimer -= dt;
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.5; }
        break;
      }
      case 'guard': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (this.rng.nextDouble() < 0.4) {
          const a = this.rng.nextDouble() * pi * 2;
          this.particles.add(new Particle(b.cx + cos(a) * 50, b.cy + sin(a) * 50, 0, 0, 0.3, 4, new Color(0xFF64B5F6), 0));
        }
        if (b.stateTimer <= 0) {
          this._bossSmash(b);
          b.guard = 0;
          b.state = BossState.recover;
          b.stateTimer = 0.6;
        }
        break;
      }
      case 'triplesmash': {
        this._moveAndCollide(b, dt, false);
        if (b.airborne && b.onGround) {
          b.airborne = false;
          this._bossSmash(b);
          b.hits++;
          if (b.hits < 3) {
            b.airborne = true;
            b.vy = -820;
            b.vx = (this.player.cx - b.cx).sign * b.spec.walkSpeed * 1.6;
          } else { b.state = BossState.recover; b.stateTimer = 0.8; }
        } else if (b.stateTimer <= 0) {
          b.airborne = false;
          b.state = BossState.recover;
          b.stateTimer = 0.6;
        }
        break;
      }
      case 'swordbeam': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.5; }
        break;
      }
      case 'divebomb': {
        this._moveAndCollide(b, dt, false);
        if (b.subTimer < 0.5 && b.vy >= -40) {
          b.subTimer = 1;
          b.vx = (b.aimX - b.cx).sign * 520;
          b.vy = 900;
        }
        if (b.subTimer >= 0.5 && b.airborne && b.onGround) {
          b.airborne = false;
          this._bossErupt(b);
          b.state = BossState.recover;
          b.stateTimer = 0.9;
        } else if (b.stateTimer <= 0) {
          b.airborne = false;
          b.state = BossState.recover;
          b.stateTimer = 0.6;
        }
        break;
      }
      case 'vortex': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        const pv = this.player;
        pv.x = (pv.x + (b.cx - pv.cx).sign * 240 * dt).clamp(20.0, this.roomWidth - pv.w - 20);
        if (this.rng.nextDouble() < 0.7) {
          const a = this.rng.nextDouble() * pi * 2;
          const rad = 70 + this.rng.nextDouble() * 40;
          this.particles.add(new Particle(b.cx + cos(a) * rad, b.cy + sin(a) * rad, -cos(a) * 220, -sin(a) * 220, 0.3, 4, b.spec.color, 0));
        }
        if (b.stateTimer <= 0) {
          this.shake = max(this.shake, 0.4);
          this._fx('dualring', b.cx, b.cy, 0.45, new Color(0xFFE040FB), { size: 150 });
          if (pv.invuln <= 0 && pv.center.sub(b.center).distance < 140) {
            this._hurtPlayer(b.enraged ? 30 : 24, b.cx, { kb: 1.6 });
          }
          for (let i = 0; i < 30; i++) {
            const a = this.rng.nextDouble() * pi * 2;
            const sp = 200 + this.rng.nextDouble() * 260;
            this.particles.add(new Particle(b.cx, b.cy, cos(a) * sp, sin(a) * sp, 0.5, 6, (i % 2 === 0) ? new Color(0xFFE040FB) : new Color(0xFFFFFFFF), 0));
          }
          b.state = BossState.recover;
          b.stateTimer = 0.7;
        }
        break;
      }
      case 'approach': {
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0 || b.vx === 0) { b.state = BossState.recover; b.stateTimer = 0.15; }
        break;
      }
      case 'reposition': {
        b.vx *= 0.9;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.2; }
        break;
      }
      case 'rest': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (this.rng.nextDouble() < 0.25) {
          this.particles.add(new Particle(b.cx + (this.rng.nextDouble() - 0.5) * 40, b.cy - 30, (this.rng.nextDouble() - 0.5) * 30, -30 - this.rng.nextDouble() * 30, 0.5, 4, new Color(0xFF90A4AE), -40));
        }
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.4; }
        break;
      }
      case 'appleScatter': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.5; }
        break;
      }
      case 'roots': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        b.subTimer -= dt;
        if (b.subTimer <= 0 && b.hits < 7) {
          b.subTimer = 0.12;
          b.hits++;
          const rx = (b.cx + b.aimX * b.hits * 64).clamp(20.0, this.roomWidth - 20.0);
          this._rootErupt(b, rx, b.enraged ? 14 : 10);
        }
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.6; }
        break;
      }
      case 'feathers': {
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.4; }
        break;
      }
      case 'swoop': {
        this._moveAndCollide(b, dt, false);
        if (this.rng.nextDouble() < 0.5) {
          this.particles.add(new Particle(b.cx, b.cy, -b.facing * 80, 0, 0.3, 5, b.spec.color.withOpacity(0.7), 0));
        }
        if (b.stateTimer <= 0 || b.vx === 0) {
          b.hover = 0;
          b.state = BossState.recover;
          b.stateTimer = 0.45;
        }
        break;
      }
      case 'firebreath': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.5; }
        break;
      }
      case 'knives': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.35; }
        break;
      }
      case 'webshot': {
        b.vx = 0;
        this._moveAndCollide(b, dt, false);
        if (b.stateTimer <= 0) { b.state = BossState.recover; b.stateTimer = 0.4; }
        break;
      }
    }
  }

  _rootErupt(b, rx, dmg) {
    for (let i = 0; i < 5; i++) {
      this.particles.add(new Particle(rx + (this.rng.nextDouble() - 0.5) * 16, kGroundY, (this.rng.nextDouble() - 0.5) * 30, -200 - this.rng.nextDouble() * 160, 0.6, 7, new Color(0xFF5D4037), 700));
    }
    this.particles.add(new Particle(rx, kGroundY - 30, 0, -40, 0.5, 9, new Color(0xFF33691E), -30));
    const p = this.player;
    if (p.invuln <= 0 && p.onGround && (p.cx - rx).abs() < 36 && (p.cy - kGroundY).abs() < 120) {
      this._hurtPlayer(dmg, rx, { kb: 0.2 });
      p.addStatus(StatusKind.bind, 1.2, 1);
    }
  }

  _appleExplode(pr) {
    this.shake = max(this.shake, 0.2);
    this._fx('ring', pr.x, pr.y, 0.35, new Color(0xFFFF7043), { size: 84 });
    for (let i = 0; i < 18; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 120 + this.rng.nextDouble() * 200;
      this.particles.add(new Particle(pr.x, pr.y, cos(a) * sp, sin(a) * sp - 30, 0.5, 6, (i % 2 === 0) ? new Color(0xFFFF7043) : new Color(0xFFE53935), 500));
    }
    const p = this.player;
    if (p.invuln <= 0 && p.center.sub(new Offset(pr.x, pr.y)).distance < 78) {
      this._hurtPlayer(pr.dmg, pr.x, { kb: 1.2 });
      p.addStatus(StatusKind.burn, 2.5, this._foePow(5));
    }
  }

  _bossErupt(b) {
    this.shake = max(this.shake, 0.5);
    this._fx('crack', b.cx, b.y + b.h, 0.55, new Color(0xFFFFB300), { size: 340 });
    for (let i = 0; i < 36; i++) {
      const a = (i / 36) * pi * 2;
      this.particles.add(new Particle(b.cx, b.y + b.h, cos(a) * 340, -sin(a).abs() * 220, 0.6, 9, b.spec.color, 700));
    }
    for (let s = -1; s <= 1; s += 2) {
      for (let i = 1; i <= 6; i++) {
        this.particles.add(new Particle(b.cx + s * i * 36.0, kGroundY, (this.rng.nextDouble() - 0.5) * 40, -260 - this.rng.nextDouble() * 160, 0.7, 8, new Color(0xFF6D4C41), 800));
      }
    }
    const p = this.player;
    if (p.onGround && (p.cx - b.cx).abs() < 320 && p.invuln <= 0) this._launchPlayer(620, b.cx);
  }

  _bossSmash(b) {
    this.shake = max(this.shake, 0.45);
    for (let i = 0; i < 30; i++) {
      const a = (i / 30) * pi * 2;
      this.particles.add(new Particle(b.cx, b.y + b.h, cos(a) * 300, -sin(a).abs() * 180, 0.6, 9, b.spec.color, 700));
    }
    for (let i = 0; i < 8; i++) {
      this.particles.add(new Particle(b.cx + (this.rng.nextDouble() - 0.5) * 200, b.y + b.h, (this.rng.nextDouble() - 0.5) * 200, -200 - this.rng.nextDouble() * 200, 0.8, 6, new Color(0xFF6D4C41), 800));
    }
    const p = this.player;
    if (p.onGround && (p.cx - b.cx).abs() < 280 && p.invuln <= 0) this._launchPlayer(560, b.cx);
  }

  _bossSlash(b, reach, dmg, kb) {
    const p = this.player;
    const hb = Rect.fromLTWH(b.facing === 1 ? b.x + b.w - 10 : b.cx - reach, b.cy - 50, reach, 100);
    for (let i = 0; i < 10; i++) {
      this.particles.add(new Particle(b.cx + b.facing * (40 + i * reach / 12), b.cy - 30 + (this.rng.nextDouble() - 0.5) * 60, b.facing * 120, 0, 0.25, 5, b.spec.color, 0));
    }
    if (p.invuln <= 0 && hb.overlaps(p.rect)) {
      this._hurtPlayer(dmg, b.cx);
      p.vx += b.facing * kb;
    }
  }

  _hammerSlam(e) {
    this.shake = max(this.shake, 0.3);
    this._fx('crack', e.cx, e.y + e.h, 0.45, new Color(0xFFBCAAA4), { size: 200 });
    for (let i = 0; i < 18; i++) {
      const a = (i / 18) * pi * 2;
      this.particles.add(new Particle(e.cx, e.y + e.h, cos(a) * 220, -sin(a).abs() * 160, 0.5, 6, new Color(0xFF8D6E63), 700));
    }
    const p = this.player;
    if (p.onGround && (p.cx - e.cx).abs() < 150 && p.invuln <= 0) {
      this._hurtPlayer(16, e.cx, { stun: 0.7, kb: 1.5 });
    }
  }

  _launchPlayer(up, fromX) {
    const p = this.player;
    if (p.invuln > 0) return;
    p.damage(18 * this._floorAtkMul);
    p.invuln = 0.9;
    p.vy = -up;
    p.vx = (p.cx < fromX ? -1 : 1) * 160;
    this.shake = max(this.shake, 0.3);
    for (let i = 0; i < 12; i++) {
      this.particles.add(new Particle(p.cx, p.cy, (this.rng.nextDouble() - 0.5) * 260, -this.rng.nextDouble() * 300, 0.5, 5, new Color(0xFFFFF176)));
    }
    if (p.dead && this.phase === GamePhase.playing) {
      this.phase = GamePhase.gameover;
      this._banner('GAME OVER', 999);
    }
  }

  _damageBoss(b, dmg) {
    if (b.guard > 0) dmg *= 0.3;
    if (b.pattern === 'rest') dmg *= 1.6;
    b.damage(dmg);
  }

  _shockwave(b) {
    this.shake = 0.35;
    for (let i = 0; i < 24; i++) {
      const a = (i / 24) * pi * 2;
      this.particles.add(new Particle(b.cx, b.y + b.h, cos(a) * 260, -sin(a).abs() * 130, 0.5, 8, b.spec.color, 600));
    }
    const p = this.player;
    if (p.onGround && (p.cx - b.cx).abs() < 230 && p.invuln <= 0) this._hurtPlayer(22, b.cx);
  }

  _updateTraps(dt) {
    if (this.roomCleared) return;
    const p = this.player;
    for (const tr of this.traps) {
      switch (tr.kind) {
        case 'spike': {
          if (p.invuln <= 0 && p.rect.overlaps(tr.rect)) this._hurtPlayer(12, p.cx);
          break;
        }
        case 'saw': {
          tr.x += tr.dir * 110 * dt;
          if (tr.x <= tr.minX) { tr.x = tr.minX; tr.dir = 1; }
          else if (tr.x >= tr.maxX) { tr.x = tr.maxX; tr.dir = -1; }
          tr.t += dt;
          if (p.invuln <= 0 && p.rect.overlaps(tr.rect)) this._hurtPlayer(10, tr.rect.center.dx);
          break;
        }
        case 'arrow': {
          tr.t -= dt;
          if (tr.t <= 0 && (p.cx - tr.x).abs() < 700) {
            tr.t = 2.0;
            const d = (p.cx >= tr.x) ? 1 : -1;
            this.projectiles.add(new Projectile(tr.rect.center.dx, tr.rect.center.dy, d * 360.0, 0, 6, 3.0, 9, true, new Color(0xFFCFD8DC)));
          }
          break;
        }
        case 'flame': {
          tr.t += dt;
          const cycle = tr.t % 2.4;
          if (cycle > 1.4) {
            const flame = Rect.fromLTWH(tr.x, tr.y - 96, tr.w, 96 + tr.h);
            if (p.invuln <= 0 && p.rect.overlaps(flame)) {
              this._hurtPlayer(10, p.cx);
              p.addStatus(StatusKind.burn, 2.5, this._foePow(6));
            }
            if (this.rng.nextDouble() < 0.5) {
              this.particles.add(new Particle(tr.x + this.rng.nextDouble() * tr.w, tr.y, (this.rng.nextDouble() - 0.5) * 60, -160 - this.rng.nextDouble() * 160, 0.5, 4, this.rng.nextBool() ? new Color(0xFFFF7043) : new Color(0xFFFFCA28), -60));
            }
          }
          break;
        }
      }
    }
  }

  _updateMines(dt) {
    if (this.mines.isEmpty) return;
    for (const m of this.mines) {
      if (m.triggered) {
        m.fuse -= dt;
        if (m.fuse <= 0) { this._mineExplode(m); m.life = 0; }
        continue;
      }
      if (m.arm > 0) { m.arm -= dt; continue; }
      m.life -= dt;
      const foe = this._targets().any(e => !e.dead && e.rect.overlaps(m.rect.inflate(6)));
      if (foe) {
        m.triggered = true;
        m.fuse = 0.12;
      } else if (m.life <= 0) {
        for (let i = 0; i < 6; i++) {
          this.particles.add(new Particle(m.x, m.y, (this.rng.nextDouble() - 0.5) * 60, -this.rng.nextDouble() * 60, 0.4, 3, new Color(0xFF90A4AE), 120));
        }
      }
    }
    this.mines.removeWhere(m => m.life <= 0 && !m.triggered);
    this.mines.removeWhere(m => m.triggered && m.fuse <= 0);
  }

  _updateStorms(dt) {
    if (this.storms.isEmpty) return;
    for (const c of this.storms) {
      c.t += dt;
      if (c.boltFlash > 0) c.boltFlash -= dt;
      const tgt = c.target;
      const gone = tgt.dead || (tgt instanceof Enemy && !this.enemies.contains(tgt)) || (tgt instanceof Boss && this.boss === null);
      if (gone) { c.life = 0; continue; }
      c.x = tgt.cx;
      c.y = tgt.cy - 130;
      c.life -= dt;
      if (c.strikesLeft > 0) {
        c.strikeCd -= dt;
        if (c.strikeCd <= 0) {
          c.strikeCd = 2.0;
          c.strikesLeft -= 1;
          c.boltFlash = 0.22;
          this._stormStrike(c, tgt);
        }
      }
    }
    this.storms.removeWhere(c => c.life <= 0);
  }

  _stormStrike(c, tgt) {
    if (tgt instanceof Boss) {
      this._damageBoss(tgt, c.dmg);
    } else {
      tgt.damage(c.dmg);
      if (this.rng.nextDouble() < 0.35) tgt.addStatus(StatusKind.stun, 1.0, 1);
    }
    this.skillFx.add(new SkillFx('lightning', c.x, c.y, 0.26, new Color(0xFF80DEEA), { x2: tgt.cx, y2: tgt.cy }));
    this._hitSpark(tgt.cx, tgt.cy, 1);
    this.shake = max(this.shake, 0.12);
    for (let s = 0; s < 10; s++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 90 + this.rng.nextDouble() * 180;
      this.particles.add(new Particle(tgt.cx, tgt.cy, cos(a) * sp, sin(a) * sp, 0.25, 3, (s % 2 === 0) ? new Color(0xFF80DEEA) : new Color(0xFFFFFFFF), 0));
    }
  }

  _arcs(pr) { return pr.grav !== 0; }

  _arcSplash(pr, x, y) {
    this._thrownBurst(pr);
    this.shake = max(this.shake, 0.14);
    const c = new Offset(x, y);
    const radius = 74.0;
    for (const e of this._targets()) {
      if (e.dead) continue;
      if (e.center.sub(c).distance < radius + e.w / 2) {
        if (e instanceof Boss) this._damageBoss(e, pr.dmg);
        else { e.damage(pr.dmg); this._playerOnHit(e); }
        if (pr.onHit !== null) e.addStatus(pr.onHit, pr.onHitDur, pr.onHitPow);
        switch (pr.shape) {
          case 'potion': e.addStatus(StatusKind.poison, 3.5, 6); break;
          case 'bomb': e.addStatus(StatusKind.burn, 3, 8); break;
          case 'net': e.addStatus(StatusKind.slow, 3, 1); break;
        }
        this._hitSpark(e.cx, e.cy, e.cx >= x ? 1 : -1);
      }
    }
  }

  _magicSplash(x, y, dmg, color) {
    this._fx('ring', x, y, 0.28, color, { size: 60 });
    const c = new Offset(x, y);
    const radius = 56.0;
    for (const e of this._targets()) {
      if (e.dead) continue;
      if (e.center.sub(c).distance < radius + e.w / 2) {
        if (e instanceof Boss) this._damageBoss(e, dmg * 0.6);
        else e.damage(dmg * 0.6);
        this._hitSpark(e.cx, e.cy, e.cx >= x ? 1 : -1);
      }
    }
    for (let i = 0; i < 12; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 70 + this.rng.nextDouble() * 130;
      this.particles.add(new Particle(x, y, cos(a) * sp, sin(a) * sp, 0.32, 4, color.withOpacity(0.9), 0));
    }
  }

  _mineExplode(m) {
    this.shake = max(this.shake, 0.26);
    this._fx('dualring', m.x, m.y, 0.4, new Color(0xFFFFB300), { size: 120 });
    this._emitNoise(m.x, m.y, 0.8);
    const radius = 120.0;
    const center = new Offset(m.x, m.y);
    for (const e of this._targets()) {
      if (e.dead) continue;
      if (e.center.sub(center).distance < radius + e.w / 2) {
        if (e instanceof Boss) this._damageBoss(e, m.dmg);
        else e.damage(m.dmg);
        e.addStatus(StatusKind.burn, 2, 6);
        const dir = e.cx >= m.x ? 1 : -1;
        if (e instanceof Enemy) { e.vx = dir * 300.0; e.vy = -240; }
        this._hitSpark(e.cx, e.cy, dir);
      }
    }
    for (let i = 0; i < 26; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 130 + this.rng.nextDouble() * 240;
      this.particles.add(new Particle(m.x, m.y, cos(a) * sp, sin(a) * sp - 50, 0.4 + this.rng.nextDouble() * 0.4, 4 + this.rng.nextDouble() * 5, (i % 2 === 0) ? new Color(0xFFFF7043) : new Color(0xFFFFD166), 360));
    }
  }

  _fireballExplode(pr) {
    this.shake = max(this.shake, 0.3);
    this._fx('dualring', pr.x, pr.y, 0.45, new Color(0xFFFF7043), { size: 135 });
    const dmg = pr.dmg * 1.5;
    const center = new Offset(pr.x, pr.y);
    const radius = 135.0;
    for (const e of this._targets()) {
      if (e.dead) continue;
      if (e.center.sub(center).distance < radius + e.w / 2) {
        if (e instanceof Boss) this._damageBoss(e, dmg);
        else e.damage(dmg);
        e.addStatus(StatusKind.burn, 3, 8);
        this._hitSpark(e.cx, e.cy, e.cx >= pr.x ? 1 : -1);
      }
    }
    for (let i = 0; i < 34; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 140 + this.rng.nextDouble() * 280;
      this.particles.add(new Particle(pr.x, pr.y, cos(a) * sp, sin(a) * sp - 40, 0.45 + this.rng.nextDouble() * 0.4, 5 + this.rng.nextDouble() * 5, (i % 2 === 0) ? new Color(0xFFFF7043) : new Color(0xFFFFD166), 360));
    }
  }

  _swordfallImpact(pr) {
    this.shake = max(this.shake, 0.38);
    this._fx('crack', pr.x, pr.y, 0.5, new Color(0xFFFFD166), { size: 150 });
    this._fx('dualring', pr.x, pr.y, 0.45, pr.color, { size: 150 });
    const dmg = pr.dmg * 2.0;
    const center = new Offset(pr.x, pr.y);
    const radius = 150.0;
    for (const e of this._targets()) {
      if (e.dead) continue;
      if (e.center.sub(center).distance < radius + e.w / 2) {
        if (e instanceof Boss) this._damageBoss(e, dmg);
        else e.damage(dmg);
        const dir = e.cx >= pr.x ? 1 : -1;
        if (e instanceof Enemy) { e.vx = dir * 320.0; e.vy = -240; }
        this._hitSpark(e.cx, e.cy, dir);
      }
    }
    for (let i = 0; i < 30; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 120 + this.rng.nextDouble() * 250;
      this.particles.add(new Particle(pr.x, pr.y, cos(a) * sp, sin(a) * sp - 50, 0.45 + this.rng.nextDouble() * 0.4, 4 + this.rng.nextDouble() * 5, (i % 2 === 0) ? pr.color : new Color(0xFFFFF59D), 380));
    }
    if (this.player.skull.type === SkullType.paladin) {
      this.paladinSwordTimer = 10.0;
      this.paladinSwordX = pr.x;
      this.paladinSwordY = pr.y;
      this._banner('천공의 대검이 꽂혔다 — 근처에서 공격력 대폭 증가!', 1.8);
    }
  }

  _plagueContagion(x, y) {
    this._fx('ring', x, y, 0.42, new Color(0xFF76FF03), { size: 120 });
    for (let i = 0; i < 18; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 50 + this.rng.nextDouble() * 140;
      this.particles.add(new Particle(x, y, cos(a) * sp, sin(a) * sp - 30, 0.6 + this.rng.nextDouble() * 0.4, 6 + this.rng.nextDouble() * 3, (i % 2 === 0) ? new Color(0xFF9CCC65) : new Color(0xFF558B2F), -20));
    }
    const radius = 180.0;
    for (const e of this.enemies) {
      if (e.dead || e.hasStatus(StatusKind.infect)) continue;
      if ((e.cx - x).abs() < radius && (e.cy - y).abs() < radius) e.addStatus(StatusKind.infect, 4.0, 7);
    }
    const b = this.boss;
    if (b !== null && !b.dead && (b.cx - x).abs() < radius && (b.cy - y).abs() < radius) b.addStatus(StatusKind.infect, 4.0, 7);
  }

  _spreadInfection(dt) {
    if (this.enemies.length < 2) return;
    const infected = [];
    for (const e of this.enemies) if (!e.dead && e.hasStatus(StatusKind.infect)) infected.add(e);
    if (infected.isEmpty) return;
    for (const src of infected) {
      if (this.rng.nextDouble() > 1.4 * dt) continue;
      for (const e of this.enemies) {
        if (e.dead || e === src || e.hasStatus(StatusKind.infect)) continue;
        if (e.center.sub(src.center).distance < 150) {
          e.addStatus(StatusKind.infect, 4.0, 7);
          this._fx('ring', e.cx, e.cy, 0.3, new Color(0xFF76FF03), { size: 36 });
          break;
        }
      }
    }
  }

  _updateProjectiles(dt) {
    for (const pr of this.projectiles) {
      if (pr.grav !== 0) pr.vy += pr.grav * dt;
      const oldY = pr.y;
      pr.x += pr.vx * dt;
      pr.y += pr.vy * dt;
      pr.life -= dt;
      let struck = false;
      for (const s of this.solids) {
        if (s.contains(new Offset(pr.x, pr.y))) { struck = true; break; }
      }
      if (!struck && pr.vy > 60) {
        for (const pf of this.platforms) {
          if (pr.x > pf.left && pr.x < pf.right && oldY <= pf.top && pr.y >= pf.top) {
            pr.y = pf.top;
            struck = true;
            break;
          }
        }
      }
      if (struck) {
        if (!pr.fromBoss && this._arcs(pr)) {
          this._arcSplash(pr, pr.x, pr.y);
        } else {
          if (!pr.fromBoss && this._shatters(pr.shape)) this._thrownBurst(pr);
          if (!pr.fromBoss && pr.splash > 0) this._magicSplash(pr.x, pr.y, pr.dmg, pr.color);
        }
        pr.life = 0;
      }
    }
    this.projectiles.removeWhere(pr => {
      const gone = pr.life <= 0 || pr.x < -60 || pr.x > this.roomWidth + 60;
      if (gone) {
        if (pr.shape === 'fireball') this._fireballExplode(pr);
        if (pr.shape === 'swordfall') this._swordfallImpact(pr);
        if (pr.shape === 'apple') this._appleExplode(pr);
      }
      return gone;
    });
  }

  _shatters(shape) { return shape === 'potion' || shape === 'bomb' || shape === 'net'; }

  _projectileOnHit(pr, e) {
    this._playerOnHit(e);
    if (pr.onHit !== null) e.addStatus(pr.onHit, pr.onHitDur, pr.onHitPow);
    if (!this._shatters(pr.shape)) return;
    this._thrownBurst(pr);
    switch (pr.shape) {
      case 'potion': e.addStatus(StatusKind.poison, 3.5, 6); break;
      case 'bomb': e.addStatus(StatusKind.burn, 3, 8); break;
      case 'net': e.addStatus(StatusKind.slow, 3, 1); break;
    }
  }

  _thrownBurst(pr) {
    const col = pr.color;
    for (let i = 0; i < 16; i++) {
      const a = this.rng.nextDouble() * pi * 2;
      const sp = 80 + this.rng.nextDouble() * 200;
      this.particles.add(new Particle(pr.x, pr.y, cos(a) * sp, sin(a) * sp - 40, 0.45, 4 + this.rng.nextDouble() * 4, col, 400));
    }
    if (pr.shape === 'bomb') {
      this.shake = max(this.shake, 0.2);
      this._fx('ring', pr.x, pr.y, 0.34, new Color(0xFFFF7043), { size: 70 });
    } else {
      this._fx('ring', pr.x, pr.y, 0.3, col, { size: 50 });
    }
  }

  _updateParticles(dt) {
    for (const pa of this.particles) {
      pa.vy += pa.grav * dt;
      pa.x += pa.vx * dt;
      pa.y += pa.vy * dt;
      pa.life -= dt;
    }
    this.particles.removeWhere(pa => pa.life <= 0);
    for (const fx of this.skillFx) fx.t += dt;
    this.skillFx.removeWhere(fx => fx.t >= fx.maxT);
  }

  _fx(kind, x, y, maxT, color, opts = {}) {
    const dir = opts.dir === undefined ? 1 : opts.dir;
    const size = opts.size === undefined ? 80 : opts.size;
    this.skillFx.add(new SkillFx(kind, x, y, maxT, color, { dir: dir, size: size }));
  }

  _resolveCombat() {
    const p = this.player;
    const mul = this.atkMul;
    if (!p.attacking) this._crystalHitSwing = false;
    if (p.attacking && !p.skull.rangedBasic) {
      const elapsed = p.attackDuration - p.attackTimer;
      if (elapsed > 0.04 && elapsed < p.attackDuration * 0.72) {
        if (p.comboStep >= 3 && !p.finisherFired) {
          p.finisherFired = true;
          this._finisher(p, mul);
        }
        const hb = p.attackHitbox();
        const baseDmg = p.comboStep >= 3 ? 20.0 : (p.comboStep === 2 ? 13.0 : 10.0);
        const dmg = baseDmg * mul;
        const kb = (p.comboStep >= 3 ? 380.0 : 190.0) * (p.skull.type === SkullType.knight ? 2.3 : 1.0);
        for (const e of this.enemies) {
          if (!p.hitThisSwing.contains(e) && hb.overlaps(e.rect)) {
            const front = (p.cx - e.cx) >= 0 ? 1 : -1;
            const blocked = e.kind === EnemyKind.shield && e.t2 > 0 && front === e.facing;
            const crit = this._critMul();
            let dmgE = (blocked ? dmg * 0.15 : dmg) * crit;
            if (e.kind === EnemyKind.shield && this.shieldCrystal !== null) dmgE *= 0.12;
            e.damage(dmgE);
            if (crit > 1.0) this._fx('ring', e.cx, e.cy, 0.22, new Color(0xFFFFD166), { size: 34 });
            if (!blocked) this._playerOnHit(e);
            const ls = this.lifesteal + (this._passive.kind === PassiveKind.lifesteal ? this._passive.value : 0);
            if (ls > 0) p.hp = min(p.maxHp, p.hp + dmgE * ls);
            p.hitThisSwing.add(e);
            if (blocked) {
              p.vx = -p.facing * 220;
              this._fx('ring', e.cx + e.facing * 18, e.cy, 0.2, new Color(0xFFB0BEC5), { size: 40 });
            } else if (e.kind !== EnemyKind.bat) {
              e.vx = p.facing * kb;
              e.vy = -130;
            }
            this._hitSpark(e.cx, e.cy, p.facing);
            this.shake = max(this.shake, p.comboStep >= 3 ? 0.18 : 0.08);
          }
        }
        if (this.shieldCrystal !== null && !this._crystalHitSwing && hb.overlaps(this.shieldCrystal)) {
          this._crystalHitSwing = true;
          this.shieldCrystalHp -= dmg;
          this._hitSpark(this.shieldCrystal.center.dx, this.shieldCrystal.center.dy, p.facing);
          if (this.shieldCrystalHp <= 0) this._breakShieldCrystal();
        }
        const b = this.boss;
        if (b !== null && !p.hitThisSwing.contains(b) && hb.overlaps(b.rect)) {
          const crit = this._critMul();
          const dmgB = dmg * crit;
          this._damageBoss(b, dmgB);
          if (crit > 1.0) this._fx('ring', b.cx, b.cy - 10, 0.22, new Color(0xFFFFD166), { size: 40 });
          this._playerOnHit(b);
          const ls = this.lifesteal + (this._passive.kind === PassiveKind.lifesteal ? this._passive.value : 0);
          if (ls > 0) p.hp = min(p.maxHp, p.hp + dmgB * ls);
          p.hitThisSwing.add(b);
          this._hitSpark(b.cx, b.cy - 10, p.facing);
          this.shake = max(this.shake, 0.12);
        }
      }
    }

    for (const pr of this.projectiles) {
      if (pr.fromBoss) continue;
      if (pr.pierce) {
        for (const e of this.enemies) {
          if (!pr.hits.contains(e) && e.rect.inflate(pr.r).contains(new Offset(pr.x, pr.y))) {
            e.damage(pr.dmg);
            this._projectileOnHit(pr, e);
            this._hitSpark(pr.x, pr.y, pr.vx >= 0 ? 1 : -1);
            pr.hits.add(e);
          }
        }
        const pb = this.boss;
        if (pb !== null && !pr.hits.contains(pb) && pb.rect.inflate(pr.r).contains(new Offset(pr.x, pr.y))) {
          this._damageBoss(pb, pr.dmg);
          this._projectileOnHit(pr, pb);
          this._hitSpark(pr.x, pr.y, pr.vx >= 0 ? 1 : -1);
          pr.hits.add(pb);
        }
        continue;
      }
      let hit = false;
      for (const e of this.enemies) {
        if (e.rect.inflate(pr.r).contains(new Offset(pr.x, pr.y))) {
          if (this._arcs(pr)) {
            this._arcSplash(pr, pr.x, pr.y);
          } else {
            e.damage(pr.dmg);
            this._projectileOnHit(pr, e);
            this._hitSpark(pr.x, pr.y, pr.vx >= 0 ? 1 : -1);
            if (pr.splash > 0) this._magicSplash(pr.x, pr.y, pr.dmg, pr.color);
          }
          hit = true;
          break;
        }
      }
      const b = this.boss;
      if (!hit && b !== null && b.rect.inflate(pr.r).contains(new Offset(pr.x, pr.y))) {
        if (this._arcs(pr)) {
          this._arcSplash(pr, pr.x, pr.y);
        } else {
          this._damageBoss(b, pr.dmg);
          this._projectileOnHit(pr, b);
          this._hitSpark(pr.x, pr.y, pr.vx >= 0 ? 1 : -1);
          if (pr.splash > 0) this._magicSplash(pr.x, pr.y, pr.dmg, pr.color);
        }
        hit = true;
      }
      if (!hit && this.shieldCrystal !== null && this.shieldCrystal.inflate(pr.r).contains(new Offset(pr.x, pr.y))) {
        this.shieldCrystalHp -= pr.dmg;
        this._hitSpark(pr.x, pr.y, pr.vx >= 0 ? 1 : -1);
        if (this.shieldCrystalHp <= 0) this._breakShieldCrystal();
        hit = true;
      }
      if (hit) pr.life = 0;
    }

    if (p.rideTimer > 0) {
      for (const e of this.enemies) {
        if (e.dead || p.rammed.contains(e) || !e.rect.overlaps(p.rect)) continue;
        p.rammed.add(e);
        e.damage(46 * mul);
        const dir = e.cx >= p.cx ? 1 : -1;
        if (e.kind !== EnemyKind.bat) { e.vx = dir * 460.0; e.vy = -240; }
        this._hitSpark(e.cx, e.cy, dir);
        this.shake = max(this.shake, 0.16);
      }
      const rb = this.boss;
      if (rb !== null && !rb.dead && !p.rammed.contains(rb) && rb.rect.overlaps(p.rect)) {
        p.rammed.add(rb);
        this._damageBoss(rb, 40 * mul);
        this._hitSpark(rb.cx, rb.cy, rb.cx >= p.cx ? 1 : -1);
      }
    }
    if (p.invuln <= 0) {
      for (const e of this.enemies) {
        if (e.rect.overlaps(p.rect)) {
          this._hurtPlayer(this._contactDmg(e.kind), e.cx, { source: e });
          this._contactProc(e.kind, e.cx);
          break;
        }
      }
    }
    const b = this.boss;
    if (b !== null && p.invuln <= 0 && b.rect.overlaps(p.rect)) {
      this._hurtPlayer(b.state === BossState.active ? 20 : 13, b.cx, { source: b });
    }
    if (p.invuln <= 0) {
      for (const pr of this.projectiles) {
        if (pr.fromBoss && new Offset(pr.x, pr.y).sub(p.center).distance < pr.r + 20) {
          this._hurtPlayer(pr.dmg, pr.x, { source: this.boss });
          if (pr.onHit !== null) p.addStatus(pr.onHit, pr.onHitDur, pr.onHitPow);
          pr.life = 0;
          break;
        }
      }
    }
  }

  _contactDmg(k) {
    switch (k) {
      case EnemyKind.bat: return 8;
      case EnemyKind.gargoyle: return 12;
      case EnemyKind.ghoul: return 11;
      case EnemyKind.mage:
      case EnemyKind.archer:
      case EnemyKind.fireMage: return 9;
      case EnemyKind.slime: return 8;
      case EnemyKind.brute: return 16;
      case EnemyKind.grunt: return 11;
      case EnemyKind.goblin: return 8;
      case EnemyKind.assassin: return 12;
      case EnemyKind.heretic: return 9;
      case EnemyKind.thief: return 6;
      case EnemyKind.knightSoldier: return 14;
      case EnemyKind.brawler: return 10;
      case EnemyKind.dwarf: return 13;
      case EnemyKind.darkElf: return 9;
      case EnemyKind.plant: return 10;
      case EnemyKind.hammer: return 16;
      case EnemyKind.shield: return 12;
    }
  }

  _foePow(base) { return base * (0.5 + this.floor * 0.09); }

  get _floorHpMul() { return 1 + 0.16 * this.floor; }
