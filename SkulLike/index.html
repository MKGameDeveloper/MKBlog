        canvas.drawRect(Rect.fromLTWH(head.center.dx - 4, head.bottom - 10, 8, 4), _P(Colors.black));
        break;
      }
      case 'mushroom': {
        const cap = Rect.fromLTWH(r.left, r.top, r.width, r.height * 0.6);
        const stem = Rect.fromLTWH(r.center.dx - 6, r.top + r.height * 0.4, 12, r.height * 0.55);
        this._pixelRect(canvas, stem, new Color(0xFFE0E0E0));
        this._pixelRect(canvas, cap, prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(cap.left + 6, cap.top + 4, 6, 4), Colors.white);
        this._pixelRect(canvas, Rect.fromLTWH(cap.right - 12, cap.top + 4, 6, 4), Colors.white);
        break;
      }
      case 'stone':
        this._pixelRect(canvas, Rect.fromLTWH(r.left, r.top + r.height * 0.2, r.width, r.height * 0.8), prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(r.left + 4, r.top + 10, 10, 10), Colors.black.withOpacity(0.2));
        this._pixelRect(canvas, Rect.fromLTWH(r.right - 14, r.top + 24, 8, 8), Colors.black.withOpacity(0.2));
        break;
      case 'banner': {
        const post = Rect.fromLTWH(r.center.dx - 2, r.top + 12, 4, r.height - 12);
        this._pixelRect(canvas, post, new Color(0xFF6D4C41));
        const board = Rect.fromLTWH(r.left, r.top, r.width, r.height * 0.36);
        this._pixelRect(canvas, board, prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(board.left + 4, board.top + 4, 6, 6), Colors.black.withOpacity(0.3));
        this._pixelRect(canvas, Rect.fromLTWH(board.right - 10, board.top + 4, 6, 6), Colors.black.withOpacity(0.3));
        break;
      }
      case 'pillar': {
        const col = this._pixelPaint(prop.color);
        for (let y = r.top; y < r.bottom; y += 12) canvas.drawRect(Rect.fromLTWH(r.left, y, r.width, 10), col);
        this._pixelRect(canvas, Rect.fromLTWH(r.left + 4, r.top + 4, 6, 6), Colors.black.withOpacity(0.18));
        break;
      }
      case 'root':
        this._pixelRect(canvas, Rect.fromLTWH(r.left + 6, r.top, 8, r.height), prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(r.left, r.top + r.height * 0.4, 8, 10), prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(r.left + r.width - 8, r.top + r.height * 0.55, 8, 10), prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(r.left + 10, r.top + r.height * 0.75, 12, 8), new Color(0xFF3E2723));
        break;
      case 'stalactite': {
        const stem = Rect.fromLTWH(r.center.dx - 4, r.top, 8, r.height * 0.6);
        this._pixelRect(canvas, stem, prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(r.left, r.top + r.height * 0.55, 10, 10), prop.color.withOpacity(0.9));
        this._pixelRect(canvas, Rect.fromLTWH(r.right - 10, r.top + r.height * 0.55, 10, 10), prop.color.withOpacity(0.9));
        break;
      }
      case 'rune':
        this._pixelRect(canvas, Rect.fromLTWH(r.left, r.top, r.width, r.height), prop.color.withOpacity(0.2));
        this._pixelRect(canvas, Rect.fromLTWH(r.center.dx - 6, r.center.dy - 14, 12, 28), prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(r.center.dx - 14, r.center.dy - 6, 28, 12), prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(r.center.dx - 4, r.center.dy - 4, 8, 8), Colors.white);
        break;
      case 'crystal': {
        const cx = r.center.dx;
        const top = r.top + 4;
        this._pixelRect(canvas, Rect.fromLTWH(cx - 6, top + 6, 12, r.height - 12), prop.color.withOpacity(0.9));
        this._pixelRect(canvas, Rect.fromLTWH(cx - 10, top + 18, 8, r.height - 28), prop.color.withOpacity(0.65));
        this._pixelRect(canvas, Rect.fromLTWH(cx + 2, top + 18, 8, r.height - 28), prop.color.withOpacity(0.65));
        this._pixelRect(canvas, Rect.fromLTWH(cx - 4, top + 8, 8, 6), Colors.white.withOpacity(0.9));
        break;
      }
      case 'sign':
      default: {
        const post = Rect.fromLTWH(r.center.dx - 4, r.center.dy - 4, 8, r.height);
        this._pixelRect(canvas, post, new Color(0xFF6D4C41));
        const board = Rect.fromLTWH(r.left, r.top, r.width, r.height * 0.5);
        this._pixelRect(canvas, board, prop.color);
        this._pixelRect(canvas, Rect.fromLTWH(board.left + 4, board.top + 4, 6, 6), Colors.black.withOpacity(0.3));
        this._pixelRect(canvas, Rect.fromLTWH(board.right - 10, board.top + 4, 6, 6), Colors.black.withOpacity(0.3));
        break;
      }
    }
  }

  _oneWay(canvas, r) {
    const b = this.world.biome;
    const top = b.platform.withOpacity(0.96);
    const body = b.platform.withOpacity(0.88);
    for (let x = r.left; x < r.right; x += 16) {
      this._pixelRect(canvas, Rect.fromLTWH(x, r.top, min(16, r.right - x), 20), body);
    }
    for (let x = r.left; x < r.right; x += 12) {
      this._pixelRect(canvas, Rect.fromLTWH(x, r.top, min(12, r.right - x), 5), top);
    }
    const post = b.ground.withOpacity(0.7);
    this._pixelRect(canvas, Rect.fromLTWH(r.left + 6, r.bottom, 6, 10), post);
    this._pixelRect(canvas, Rect.fromLTWH(r.right - 14, r.bottom, 6, 10), post);
  }

  _door(canvas, d, open) {
    const r = d.rect;
    const meta = this._roomMeta(d.targetType);
    const glow = open ? meta[1] : new Color(0xFF555555);
    canvas.drawRRect(RRect.fromRectAndRadius(r, Radius.circular(10)), _P(new Color(0xFF241B33)));
    const inner = r.deflate(8);
    if (open) {
      canvas.drawRRect(RRect.fromRectAndRadius(inner.inflate(6), Radius.circular(8)), _PB(glow.withOpacity(0.35), 12));
      const gp = new Paint();
      gp.shader = new LinearGradient({ begin: Alignment.topCenter, end: Alignment.bottomCenter, colors: [glow.withOpacity(0.85), new Color(0xFF0B0716)] }).createShader(inner);
      canvas.drawRRect(RRect.fromRectAndRadius(inner, Radius.circular(8)), gp);
    } else {
      canvas.drawRRect(RRect.fromRectAndRadius(inner, Radius.circular(8)), _P(new Color(0xFF0B0716)));
      const bar = _P(new Color(0xFF7A2E2E));
      for (let i = 0; i < 3; i++) {
        const y = inner.top + 14 + i * (inner.height - 24) / 2;
        canvas.drawRect(Rect.fromLTWH(inner.left, y - 4, inner.width, 8), bar);
      }
    }
    this._text(canvas, meta[0], new Offset(r.center.dx, r.top - 16), 17, open ? meta[1] : Colors.white54);
  }

  _shopItem(canvas, it, gold) {
    const r = it.pedestal;
    canvas.drawRRect(RRect.fromRectAndRadius(r, Radius.circular(6)), _P(new Color(0xFF4E342E)));
    canvas.drawRect(Rect.fromLTWH(r.left, r.top, r.width, 6), _P(new Color(0xFF6D4C41)));
    if (it.bought) {
      this._text(canvas, 'SOLD', new Offset(r.center.dx, r.top - 18), 18, Colors.white38);
      return;
    }
    const bob = sin(this.world.clock * 3 + r.left) * 4;
    const gem = new Offset(r.center.dx, r.top - 26 + bob);
    const col = this._itemColor(it.kind);
    canvas.drawCircle(gem, 14, _PB(col.withOpacity(0.4), 8));
    canvas.drawCircle(gem, 9, _P(col));
    canvas.drawCircle(gem.sub(new Offset(3, 3)), 3, _P(Colors.white.withOpacity(0.8)));
    this._text(canvas, it.name, new Offset(r.center.dx, r.top - 54), 15, Colors.white);
    const afford = gold >= it.cost;
    this._text(canvas, `${it.cost} G`, new Offset(r.center.dx, r.top - 38), 15, afford ? new Color(0xFFFFD166) : new Color(0xFFE57373));
  }

  _chest(canvas, c) {
    const r = c.rect;
    if (!c.opened) {
      canvas.drawRRect(RRect.fromRectAndRadius(r.inflate(6), Radius.circular(8)), _PB(new Color(0xFFFFD166).withOpacity(0.25), 10));
    }
    canvas.drawRRect(RRect.fromRectAndRadius(r, Radius.circular(6)), _P(new Color(0xFF6D4C2E)));
    canvas.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(r.left, r.center.dy, r.width, r.height / 2), Radius.circular(6)), _P(new Color(0xFF5A3D24)));
    const trim = _P(new Color(0xFFE6B33E));
    canvas.drawRect(Rect.fromLTWH(r.left, r.center.dy - 3, r.width, 6), trim);
    if (c.opened) {
      canvas.save();
      canvas.translate(r.left, r.top);
      canvas.rotate(-0.5);
      canvas.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(0, -14, r.width, 16), Radius.circular(6)), _P(new Color(0xFF7A552F)));
      canvas.restore();
      canvas.drawRect(Rect.fromLTWH(r.left + 6, r.top + 4, r.width - 12, 10), _P(Colors.black.withOpacity(0.5)));
    } else {
      canvas.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(r.left, r.top - 10, r.width, 18), Radius.circular(6)), _P(new Color(0xFF7A552F)));
      canvas.drawRect(Rect.fromLTWH(r.center.dx - 5, r.top - 2, 10, 10), trim);
      const sv = (sin(c.t * 5) * 0.5 + 0.5);
      canvas.drawCircle(new Offset(r.center.dx, r.top - 18), 2 + sv * 1.5, _P(new Color(0xFFFFF59D)));
    }
  }

  // A class WEAPON lying on the ground (dropped by a chest), gently bobbing
  // and glowing — picking it up equips that class. (Replaces the old skull.)
  _skullOffer(canvas, t, x, near) {
    const bob = sin(this.world.clock * 3) * 5;
    const sp = skull(t);
    const col = sp.eye;
    const c = new Offset(x, kGroundY - 64 + bob);
    canvas.drawCircle(c, near ? 26 : 20, _PB(col.withOpacity(0.4), 12));
    // the weapon, floating with a slow tilt
    canvas.save();
    canvas.translate(c.dx - 24, c.dy + 6);
    canvas.rotate(-0.5 + sin(this.world.clock * 2) * 0.08);
    this._drawWeapon(canvas, sp.weapon, col);
    canvas.restore();
    this._text(canvas, `[${tierLabel(sp.tier)}] ${sp.name}`, new Offset(x, kGroundY - 100), 15, tierColor(sp.tier));
    if (near) {
      this._text(canvas, '1: 슬롯1   2: 슬롯2', new Offset(x, kGroundY - 82), 13, Colors.white);
    }
  }

  _mine(canvas, m) {
    const cxp = m.x;
    const base = m.y - 4;
    const arming = m.arm > 0;
    const phase = m.triggered ? 1.0 : (arming ? (0.5 + 0.5 * sin(m.arm * 30)) : (0.5 + 0.5 * sin(m.life * 8)));
    this._pixelRect(canvas, Rect.fromCenter(new Offset(cxp, base), 34, 8), new Color(0xFF455A64));
    this._pixelRect(canvas, Rect.fromCenter(new Offset(cxp, base - 5), 22, 6), new Color(0xFF37474F));
    this._pixelRect(canvas, Rect.fromCenter(new Offset(cxp, base - 9), 12, 6), new Color(0xFF263238));
    for (const s of [-1, 1]) {
      this._pixelRect(canvas, Rect.fromLTWH(cxp + s * 13 - 2, base - 8, 3, 6), new Color(0xFF90A4AE));
    }
    const lightColor = Color.lerp(new Color(0xFF7E0000), new Color(0xFFFF5252), phase);
    canvas.drawCircle(new Offset(cxp, base - 11), 3.2 + phase * 1.4, _P(lightColor.withOpacity(0.5 + 0.5 * phase)));
    canvas.drawCircle(new Offset(cxp, base - 11), 1.6, _P(Colors.white));
  }

  _trap(canvas, tr) {
    const r = tr.rect;
    switch (tr.kind) {
      case 'spike': {
        canvas.drawRect(Rect.fromLTWH(r.left, r.bottom - 5, r.width, 5), _P(new Color(0xFF455A64)));
        const spike = _P(new Color(0xFFB0BEC5));
        const sw = 12.0;
        for (let sx = r.left; sx < r.right - 2; sx += sw) {
          const path = new Path();
          path.moveTo(sx, r.bottom - 4);
          path.lineTo(sx + sw / 2, r.top);
          path.lineTo(sx + sw, r.bottom - 4);
          path.close();
          canvas.drawPath(path, spike);
        }
        break;
      }
      case 'saw': {
        const c = r.center;
        const rad = r.width / 2;
        const blade = _P(new Color(0xFFB0BEC5));
        canvas.save();
        canvas.translate(c.dx, c.dy);
        canvas.rotate(tr.t * 14);
        for (let i = 0; i < 8; i++) {
          const a = i / 8 * pi * 2;
          const path = new Path();
          path.moveTo(cos(a) * rad, sin(a) * rad);
          path.lineTo(cos(a + 0.3) * (rad + 6), sin(a + 0.3) * (rad + 6));
          path.lineTo(cos(a + 0.6) * rad, sin(a + 0.6) * rad);
          path.close();
          canvas.drawPath(path, blade);
        }
        canvas.drawCircle(Offset.zero, rad * 0.6, blade);
        canvas.drawCircle(Offset.zero, rad * 0.25, _P(new Color(0xFF546E7A)));
        canvas.restore();
        break;
      }
      case 'arrow': {
        canvas.drawRRect(RRect.fromRectAndRadius(r, Radius.circular(4)), _P(new Color(0xFF4E342E)));
        const ready = tr.t < 0.5;
        canvas.drawCircle(new Offset(r.center.dx, r.center.dy), 5, _P(ready ? new Color(0xFFFF5252) : new Color(0xFF8D6E63)));
        break;
      }
      case 'flame': {
        this._pixelRect(canvas, r, new Color(0xFF455A64));
        this._pixelRect(canvas, Rect.fromLTWH(r.left, r.top, r.width, 4), new Color(0xFF263238));
        for (let gx = r.left + 4; gx < r.right - 2; gx += 8) {
          this._pixelRect(canvas, Rect.fromLTWH(gx, r.top + 1, 3, 3), new Color(0xFF1A1A1A));
        }
        const cycle = tr.t % 2.4;
        if (cycle > 1.4) {
          const f = ((cycle - 1.4) / 1.0).clamp(0.0, 1.0);
          const hgt = 96 * (f < 0.4 ? f / 0.4 : 1.0);
          const base = r.top;
          canvas.drawRect(Rect.fromLTWH(r.left + 2, base - hgt, r.width - 4, hgt), _PB(new Color(0xFFFF7043).withOpacity(0.9), 4));
          canvas.drawRect(Rect.fromLTWH(r.left + 6, base - hgt + 6, r.width - 12, hgt - 6), _P(new Color(0xFFFFCA28).withOpacity(0.95)));
          canvas.drawRect(Rect.fromLTWH(r.left + r.width / 2 - 3, base - hgt + 10, 6, (hgt - 12).clamp(0.0, hgt)), _P(new Color(0xFFFFF59D)));
        }
        break;
      }
    }
  }

  _bush(canvas, b, hiding) {
    const r = b.rect;
    const base = _P(hiding ? new Color(0xFF356B3C) : new Color(0xFF274D2C));
    for (let i = 0; i < 5; i++) {
      const cx = r.left + r.width * (0.14 + i * 0.18);
      const cy = r.bottom - 14 - (i % 2 === 1 ? 8 : 0);
      canvas.drawCircle(new Offset(cx, cy), 19, base);
    }
    const top = _P((hiding ? new Color(0xFF4C9A52) : new Color(0xFF3F7D44)).withOpacity(hiding ? 0.7 : 0.95));
    for (let i = 0; i < 4; i++) {
      const cx = r.left + r.width * (0.24 + i * 0.18);
      canvas.drawCircle(new Offset(cx, r.bottom - 24), 14, top);
    }
    if (hiding) {
      this._text(canvas, '숨는 중', new Offset(r.center.dx, r.top - 8), 12, Colors.white70);
    }
  }

  _blacksmith(canvas, r) {
    const ax = r.center.dx;
    const ay = r.bottom;
    canvas.drawRect(Rect.fromLTWH(ax - 22, ay - 18, 44, 14), _P(new Color(0xFF455A64)));
    canvas.drawRect(Rect.fromLTWH(ax - 10, ay - 30, 20, 14), _P(new Color(0xFF546E7A)));
    canvas.drawRect(Rect.fromLTWH(ax - 14, ay - 8, 28, 8), _P(new Color(0xFF37474F)));
    const nx = ax - 44;
    canvas.drawRRect(RRect.fromRectAndRadius(Rect.fromLTWH(nx - 12, ay - 40, 24, 32), Radius.circular(8)), _P(new Color(0xFF8D6E63)));
    canvas.drawCircle(new Offset(nx, ay - 46), 9, _P(new Color(0xFFE0B188)));
    const beard = new Path();
    beard.moveTo(nx - 8, ay - 44);
    beard.lineTo(nx, ay - 30);
    beard.lineTo(nx + 8, ay - 44);
    beard.close();
    canvas.drawPath(beard, _P(new Color(0xFFECEFF1)));
    this._text(canvas, '⚒ 대장장이', new Offset(ax, r.top - 14), 16, new Color(0xFFFFD166));
  }

  _traitShrine(canvas, r) {
    canvas.drawCircle(new Offset(r.center.dx, r.center.dy), 58, _PB(new Color(0xFFFFD166).withOpacity(0.16), 18));
    this._pixelRect(canvas, Rect.fromLTWH(r.left - 6, r.bottom - 14, r.width + 12, 14), new Color(0xFF4A4055));
    this._pixelRect(canvas, Rect.fromLTWH(r.left + 2, r.bottom - 24, r.width - 4, 12), new Color(0xFF5C5168));
    const cx = r.center.dx;
    for (let i = 0; i < 5; i++) {
      const wHalf = 22.0 - i * 3.0;
      const y = r.top + 6 + i * ((r.height - 30) / 5);
      this._pixelRect(canvas, Rect.fromLTWH(cx - wHalf, y, wHalf * 2, (r.height - 30) / 5 + 1), new Color(0xFF6A5B7A));
    }
    this._pixelRect(canvas, Rect.fromLTWH(cx - 6, r.top - 4, 12, 12), new Color(0xFF7A6A8A));
    for (let i = 0; i < 4; i++) {
      const pulse = 0.5 + 0.5 * sin(this.world.clock * 3 + i);
      this._pixelRect(canvas, Rect.fromLTWH(cx - 4, r.top + 14 + i * 22.0, 8, 8), new Color(0xFFFFD166).withOpacity(0.4 + 0.5 * pulse));
    }
    for (let i = 0; i < 3; i++) {
      const a = this.world.clock * 1.4 + i * 2.1;
      canvas.drawCircle(new Offset(cx + cos(a) * 30, r.center.dy + sin(a) * 24), 2.4, _P(new Color(0xFFFFE9A8)));
    }
    this._text(canvas, '✦ 영혼의 비석', new Offset(cx, r.top - 18), 16, new Color(0xFFFFD166));
  }

  // The prayer altar (replaces the graveyard): a stone shrine with candles and
  // a hovering soul-light. Praying here rolls a random one-time start weapon.
  _graveyard(canvas, r) {
    const cx = r.center.dx;
    const stone = new Color(0xFF6A5B7A), stoneLt = new Color(0xFF8C7CA0), stoneDk = new Color(0xFF4A4055);
    const pulse = 0.5 + 0.5 * sin(this.world.clock * 3);
    canvas.drawCircle(new Offset(cx, r.center.dy), 72, _PB(new Color(0xFFB388FF).withOpacity(0.18), 22));
    // base slab + pedestal + table
    this._pixelRect(canvas, Rect.fromLTWH(cx - 52, r.bottom - 16, 104, 16), stoneDk);
    this._pixelRect(canvas, Rect.fromLTWH(cx - 52, r.bottom - 16, 104, 4), stone);
    this._pixelRect(canvas, Rect.fromLTWH(cx - 26, r.bottom - 56, 52, 42), stone);
    this._pixelRect(canvas, Rect.fromLTWH(cx - 26, r.bottom - 56, 8, 42), stoneDk);
    this._pixelRect(canvas, Rect.fromLTWH(cx - 26, r.bottom - 56, 52, 4), stoneLt);
    this._pixelRect(canvas, Rect.fromLTWH(cx - 40, r.bottom - 66, 80, 12), stone);
    this._pixelRect(canvas, Rect.fromLTWH(cx - 40, r.bottom - 66, 80, 3), stoneLt);
    // glowing rune carved into the column
    this._pixelRect(canvas, Rect.fromLTWH(cx - 4, r.bottom - 46, 8, 18), new Color(0xFFB388FF).withOpacity(0.4 + 0.5 * pulse));
    // candles on the table
    for (const sgn of [-1, 1]) {
      const ccx = cx + sgn * 30;
      this._pixelRect(canvas, Rect.fromLTWH(ccx - 3, r.bottom - 80, 6, 16), new Color(0xFFECEFF1));
      const fl = 4 + Math.abs(sin(this.world.clock * 8 + sgn)) * 3;
      this._glow(canvas, new Offset(ccx, r.bottom - 82), 5, new Color(0xFFFFD54F).withOpacity(0.6), 4);
      this._pixelRect(canvas, Rect.fromLTWH(ccx - 2, r.bottom - 80 - fl, 4, fl), new Color(0xFFFFB300));
      this._pixelRect(canvas, Rect.fromLTWH(ccx - 1, r.bottom - 80 - fl, 2, fl * 0.6), new Color(0xFFFFF59D));
    }
    // hovering soul-light (the prayer focus)
    const orbY = r.bottom - 94 + sin(this.world.clock * 2) * 4;
    this._glow(canvas, new Offset(cx, orbY), 16 + pulse * 4, new Color(0xFFB388FF).withOpacity(0.5), 10);
    canvas.drawCircle(new Offset(cx, orbY), 6 + pulse * 1.5, _P(new Color(0xFFE1BEE7)));
    canvas.drawCircle(new Offset(cx - 2, orbY - 2), 2, _P(Colors.white.withOpacity(0.9)));
    // wisps
    for (let i = 0; i < 4; i++) {
      const a = this.world.clock * 1.5 + i * 1.6;
      canvas.drawCircle(new Offset(cx + cos(a) * 40, r.center.dy - 10 + sin(a) * 22), 2.5, _P(new Color(0xFFB388FF)));
    }
    this._text(canvas, '🛐 기도의 제단', new Offset(cx, r.top - 16), 16, new Color(0xFFB388FF));
  }

  // The prayed-for weapon: falls from the sky (altarFall 0->1) and plants itself
  // blade-down into the altar, hilt up, pulsing once embedded (E to acquire).
  _altarWeapon(canvas) {
    const w = this.world;
    const r = w.graveyardRect;
    const gx = r.center.dx;
    const sp = skull(w.altarWeapon);
    const fall = w.altarFall;
    const restY = r.bottom - 96;
    const startY = r.top - 170;
    const cury = lerpDouble(startY, restY, Curves.easeIn.transform(fall));
    if (fall < 1) {
      const beamTop = r.top - 200;
      canvas.drawRect(Rect.fromLTWH(gx - 5, beamTop, 10, cury - beamTop), _PB(sp.eye.withOpacity(0.22 * (1 - fall)), 9));
    }
    this._glow(canvas, new Offset(gx, cury + 18), 22, sp.eye.withOpacity(fall >= 1 ? 0.32 : 0.5), 14);
    canvas.save();
    canvas.translate(gx, cury);
    canvas.rotate(pi / 2);
    this._drawWeapon(canvas, sp.weapon, sp.eye);
    canvas.restore();
    if (fall >= 1) {
      const pulse = 0.5 + 0.5 * sin(w.clock * 4);
      canvas.drawCircle(new Offset(gx, restY + 18), 14 + pulse * 4, _PS(sp.eye.withOpacity(0.4 * pulse), 2));
    }
  }

  _label(canvas, s, pos) {
    const tw = measureText(canvas, s, 15, FontWeight.bold);
    const th = 18;

        this._pixelRect(canvas, Rect.fromLTWH(pr.x - pr.r * 0.2, pr.y, pr.r * 0.5, pr.r * 0.5), pr.color);
        break;
      }
      case 'net': {
        const mesh = _PS(pr.color, 1.5);
        const box = Rect.fromCenter(new Offset(pr.x, pr.y), pr.r * 2.4, pr.r * 2.4);
        canvas.drawRect(box, mesh);
        for (let i = 1; i < 3; i++) {
          const t = i / 3.0;
          canvas.drawLine(new Offset(box.left + box.width * t, box.top), new Offset(box.left + box.width * t, box.bottom), mesh);
          canvas.drawLine(new Offset(box.left, box.top + box.height * t), new Offset(box.right, box.top + box.height * t), mesh);

      case 'feather': {

  _skillFx(canvas, fx) {
    const pr = fx.prog;
    const fade = (1 - pr).clamp(0.0, 1.0);
    switch (fx.kind) {
      case 'seraphwings': {
        const span = fx.size * Curves.easeOut.transform((pr * 2).clamp(0.0, 1.0));
        for (let side = -1; side <= 1; side += 2) {
          for (let f = 0; f < 6; f++) {
            const ff = f / 5.0;
            const len = span * (0.5 + ff * 0.5);
            const yo = -44 + ff * 78;
            const root = new Offset(fx.x + side * 10.0, fx.y + yo);
            const tip = new Offset(fx.x + side * len, fx.y + yo - len * 0.12);
            canvas.drawLine(root, tip, _PSC(fx.color.withOpacity(0.5 * fade), 7, StrokeCap.round));
            canvas.drawLine(root, tip, _PSC(Colors.white.withOpacity(0.6 * fade), 2, StrokeCap.round));
          }
        }
        this._glow(canvas, new Offset(fx.x, fx.y), 40 * fade + 12, fx.color.withOpacity(0.22 * fade), 18);
        break;
      }
      case 'ring': {
        const r = fx.size * Curves.easeOut.transform(pr) + 6;
        canvas.drawCircle(new Offset(fx.x, fx.y), r, _PS(fx.color.withOpacity(0.7 * fade), 7 * fade + 1));
        canvas.drawCircle(new Offset(fx.x, fx.y), r * 0.7, _PS(Colors.white.withOpacity(0.4 * fade), 3 * fade + 1));
        break;
      }
      case 'dualring': {
        for (let k = 0; k < 2; k++) {
          const ph = (pr - k * 0.18).clamp(0.0, 1.0);
          if (ph <= 0) continue;
          const r = fx.size * Curves.easeOut.transform(ph) + 6;
          canvas.drawCircle(new Offset(fx.x, fx.y), r, _PS((k === 0 ? fx.color : new Color(0xFFFFD166)).withOpacity(0.7 * (1 - ph)), 8 * (1 - ph) + 1));
        }
        if (pr < 0.4) {
          canvas.drawCircle(new Offset(fx.x, fx.y), 26 * (1 - pr / 0.4), _P(Colors.white.withOpacity(0.8 * (1 - pr / 0.4))));
        }
        break;

      case 'runes': {
        const r = fx.size * (0.6 + 0.4 * pr);
        const a = fx.color.withOpacity(0.85 * fade);

        canvas.translate(fx.x, fx.y);
        canvas.drawCircle(Offset.zero, r, _PS(a, 2));
        canvas.drawCircle(Offset.zero, r * 0.7, _PS(a, 1.5));

        for (let i = 0; i < 8; i++) {
          const ang = i / 8 * pi * 2;

          const al = (0.5 * fade) * (1 - i / (n + 1.0));

        }
        break;
      }
      case 'crack': {
        const spread = fx.size * Curves.easeOut.transform(pr);
        const paint = _PSC(fx.color.withOpacity(0.85 * fade), 4 * fade + 1, StrokeCap.round);
        for (const s of [-1, 1]) {
          let x = fx.x;
          let y = fx.y;
          const steps = Math.floor(spread / 24);
          for (let i = 0; i < steps; i++) {
            const nx = x + s * 24;
            const ny = fx.y + (i % 2 === 0 ? -6 : 6);
            canvas.drawLine(new Offset(x, y), new Offset(nx, ny), paint);
            x = nx;
            y = ny;
          }

        for (let i = 0; i < 6; i++) {

        break;
      }
      case 'handrise': {
        const rise = Curves.easeOut.transform((pr / 0.6).clamp(0.0, 1.0));

        const claw = new Color(0xFFB388FF).withOpacity(0.95 * fade);
        const topY = fx.y - h;
        this._pixelRect(canvas, Rect.fromLTWH(fx.x - 4, topY + h * 0.45, 8, h * 0.55), new Color(0xFF311B92).withOpacity(0.85 * fade));
        this._pixelRect(canvas, Rect.fromLTWH(fx.x - 7, topY + h * 0.3, 14, h * 0.25), palm);
        for (let f = -2; f <= 1; f++) {
          const fx0 = fx.x + f * 4.0 + 2;
          this._pixelRect(canvas, Rect.fromLTWH(fx0 - 1.5, topY, 3, h * 0.42), claw);
        }
        break;
      }
      case 'claw': {
        const reach = fx.size * (0.5 + 0.5 * pr);
        for (let i = -1; i <= 1; i++) {
          const y = fx.y + i * 14.0;
          canvas.drawLine(new Offset(fx.x, y - i * 4), new Offset(fx.x + fx.dir * reach, y + i * 6), _PSC(fx.color.withOpacity(0.85 * fade), 5 * fade + 1, StrokeCap.round));
        }
        break;
      }
      case 'slashArc': {
        const r = fx.size * (0.7 + 0.3 * pr);
        const cx = fx.x + fx.dir * 12;
        const base = fx.dir >= 0 ? -pi / 2 : pi / 2;
        canvas.drawArc(Rect.fromCircle(new Offset(cx, fx.y), r), base - 0.9, 1.8, false, _PSC(fx.color.withOpacity(0.8 * fade), 9 * fade + 1, StrokeCap.round));
        canvas.drawArc(Rect.fromCircle(new Offset(cx, fx.y), r * 0.82), base - 0.7, 1.4, false, _PS(Colors.white.withOpacity(0.5 * fade), 3 * fade + 1));
        break;
      }
      case 'lightning': {
        const dx = fx.x2 - fx.x, dy = fx.y2 - fx.y;
        const len = sqrt(dx * dx + dy * dy);
        if (len < 1) break;
        const px = -dy / len, py = dx / len;
        const path = new Path();
        path.moveTo(fx.x, fx.y);
        const seg = 6;
        for (let i = 1; i < seg; i++) {

          const j = (i % 2 === 0 ? 1 : -1) * (8 + (i * 37 % 13)) * fade;

        canvas.drawCircle(new Offset(fx.x + fx.dir * reach, fx.y), 6 * fade + 2, _P(Colors.white.withOpacity(0.6 * fade)));
        break;
      }
      case 'bigfist': {
        const reach = fx.size * (0.25 + 0.75 * pr);
        const fxp = fx.x + fx.dir * reach;
        const streak = _PSC(fx.color.withOpacity(0.5 * fade), 6 * fade + 2, StrokeCap.round);
        for (let i = -1; i <= 1; i++) {
          canvas.drawLine(new Offset(fx.x, fx.y + i * 11.0), new Offset(fxp - fx.dir * 16, fx.y + i * 11.0), streak);
        }
        const sc = 2.6 * (1.0 - 0.18 * pr);
        canvas.save();
        canvas.translate(fxp, fx.y);
        canvas.scale(sc, sc);
        this._fistShape(canvas, 0, 0, fx.dir, fx.color.withOpacity(0.95 * fade));
        canvas.restore();
        canvas.drawCircle(new Offset(fxp + fx.dir * 16, fx.y), 30 * fade + 8, _P(fx.color.withOpacity(0.35 * fade)));
        canvas.drawCircle(new Offset(fxp + fx.dir * 16, fx.y), 16 * fade + 4, _P(Colors.white.withOpacity(0.55 * fade)));
        break;
      }
      case 'dragon': {
        const reach = fx.size * (0.35 + 0.65 * pr);
        const bodyC = fx.color.withOpacity(0.9 * fade);
        const bodyDk = Color.lerp(fx.color, new Color(0xFF0B0712), 0.45).withOpacity(0.9 * fade);
        const seg = 8;
        for (let i = 0; i <= seg; i++) {
          const tt = i / seg;
          const sx = fx.x + fx.dir * reach * tt;
          const sy = fx.y + sin(tt * pi * 1.6 + pr * 4) * 13 * (1 - tt * 0.35);
          const rr = (3.5 + (1 - tt) * 5) * fade;
          this._pixelRect(canvas, Rect.fromCenter(new Offset(sx, sy), rr * 2, rr * 2), (i % 2 === 0) ? bodyC : bodyDk);
        }
        const hx = fx.x + fx.dir * reach;
        this._dragonShape(canvas, hx, fx.y, fx.dir, 1.0 + 0.3 * pr, fx.color, fade);
        for (let i = 0; i < 3; i++) {
          const bx = hx + fx.dir * (10 + i * 7.0);
          canvas.drawCircle(new Offset(bx, fx.y - 2 + (i - 1) * 3.0), (4 - i) * fade + 1, _P((i % 2 === 0 ? new Color(0xFFFFD166) : fx.color).withOpacity(0.6 * fade)));
        }
        break;
      }
      case 'lichscythe': {
        this._lichScythe(canvas, fx, pr, fade);
        break;
      }
    }
  }

  _lichScythe(canvas, fx, pr, fade) {
    const w = fx.size;
    const cx = fx.x, cy = fx.y;
    const col = fx.color;
    const a = fade;
    this._glow(canvas, new Offset(cx, cy + w * 0.12), w * 0.5, new Color(0xFF1A0A24).withOpacity(0.5 * a), 60);
    const hoodW = w * 0.36, hoodH = w * 0.30;
    const hood = new Path();
    hood.moveTo(cx, cy - hoodH * 0.75);
    hood.lineTo(cx - hoodW * 0.5, cy + hoodH * 0.5);
    hood.lineTo(cx - hoodW * 0.26, cy + hoodH * 0.62);
    hood.lineTo(cx, cy + hoodH * 0.30);
    hood.lineTo(cx + hoodW * 0.26, cy + hoodH * 0.62);
    hood.lineTo(cx + hoodW * 0.5, cy + hoodH * 0.5);
    hood.close();
    canvas.drawPath(hood, _P(new Color(0xFF120A1A).withOpacity(0.94 * a)));
    canvas.drawPath(hood, _PS(col.withOpacity(0.35 * a), w * 0.006 + 2));
    canvas.drawCircle(new Offset(cx, cy + hoodH * 0.06), hoodW * 0.22, _P(Colors.black.withOpacity(0.85 * a)));
    const eyeY = cy + hoodH * 0.04;
    for (const ex of [-1.0, 1.0]) {
      const eo = new Offset(cx + ex * hoodW * 0.11, eyeY);
      this._glow(canvas, eo, w * 0.04, col.withOpacity(0.7 * a), 18);
      canvas.drawCircle(eo, w * 0.014 + 3, _P(col.withOpacity(0.95 * a)));
      canvas.drawCircle(eo, w * 0.006 + 1, _P(Colors.white.withOpacity(0.9 * a)));
    }
    const pivot = new Offset(cx + fx.dir * hoodW * 0.55, cy + hoodH * 0.55);
    const sweep = (-1.25 + 2.5 * pr) * fx.dir;
    const r = w * 0.52;
    canvas.drawLine(pivot, new Offset(pivot.dx + cos(sweep) * r * 0.7, pivot.dy + sin(sweep) * r * 0.7), _PSC(new Color(0xFF3A2A1A).withOpacity(0.9 * a), w * 0.012 + 2, StrokeCap.round));
    canvas.drawArc(Rect.fromCircle(pivot, r), sweep - 0.55, 1.5, false, _PSC(col.withOpacity(0.85 * a), w * 0.022 + 3, StrokeCap.round));
    canvas.drawArc(Rect.fromCircle(pivot, r * 0.93), sweep - 0.45, 1.2, false, _PSC(Colors.white.withOpacity(0.5 * a), w * 0.008 + 1, StrokeCap.round));
  }

  _dragonShape(canvas, x, y, dir, scale, color, fade) {
    const body = color.withOpacity(0.95 * fade);
    const dark = Color.lerp(color, new Color(0xFF0B0712), 0.5).withOpacity(0.95 * fade);
    const light = Color.lerp(color, new Color(0xFFFFFFFF), 0.45).withOpacity(0.95 * fade);
    canvas.save();
    canvas.translate(x, y);
    canvas.scale(dir * scale, scale);
    this._pixelRect(canvas, Rect.fromLTWH(-2, -8, 20, 7), body);
    this._pixelRect(canvas, Rect.fromLTWH(16, -7, 6, 4), body);
    this._pixelRect(canvas, Rect.fromLTWH(-2, -8, 20, 2), light);
    this._pixelRect(canvas, Rect.fromLTWH(0, 2, 16, 4), dark);
    this._pixelRect(canvas, Rect.fromLTWH(14, 1, 5, 3), dark);
    this._pixelRect(canvas, Rect.fromLTWH(12, -2, 2, 3), light);
    this._pixelRect(canvas, Rect.fromLTWH(8, -2, 2, 3), light);
    this._pixelRect(canvas, Rect.fromLTWH(12, 2, 2, 2), light);
    this._pixelRect(canvas, Rect.fromLTWH(2, -5, 3, 3), new Color(0xFFFFF59D).withOpacity(fade));
    this._pixelRect(canvas, Rect.fromLTWH(17, -6, 2, 2), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-2, -12, 4, 5), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-7, -14, 5, 4), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-6, -10, 4, 4), body);
    canvas.restore();
  }

  _fistShape(canvas, x, y, dir, color) {
    canvas.save();
    canvas.translate(x, y);
    canvas.scale(dir, 1);
    this._pixelRect(canvas, Rect.fromLTWH(-10, -9, 16, 18), color);
    for (let k = 0; k < 4; k++) {
      this._pixelRect(canvas, Rect.fromLTWH(6, -9 + k * 4.5, 4, 4), color);
    }
    this._pixelRect(canvas, Rect.fromLTWH(-14, -5, 5, 10), Color.lerp(color, new Color(0xFF000000), 0.25));
    this._pixelRect(canvas, Rect.fromLTWH(-9, -8, 14, 4), Color.lerp(color, new Color(0xFFFFFFFF), 0.3));
    canvas.restore();
  }

  _ghostSilhouette(canvas, x, y, dir, color, alpha) {
    if (alpha <= 0.02) return;
    const c = color.withOpacity(alpha);
    this._pixelRect(canvas, Rect.fromLTWH(x - 10, y - 4, 20, 22), c);
    this._pixelRect(canvas, Rect.fromLTWH(x - 10, y - 22, 20, 18), c);
    this._pixelRect(canvas, Rect.fromLTWH(x - 2 + dir * 4, y - 18, 4, 4), Colors.white.withOpacity(alpha));
  }

  _particle(canvas, pa) {
    const a = (pa.life / pa.maxLife).clamp(0.0, 1.0);
    const s = pa.size * a;
    this._pixelRect(canvas, Rect.fromLTWH(pa.x - s / 2, pa.y - s / 2, s, s), pa.color.withOpacity(a));
  }

  _player(canvas, p) {
    canvas.save();
    canvas.translate(p.cx, p.y);
    canvas.scale(p.facing, 1.0);
    const pHurt = (p.hurtTimer / 0.18).clamp(0.0, 1.0);
    if (pHurt > 0) {
      canvas.translate(-pHurt * 4, pHurt * 2);
      canvas.rotate(pHurt * 0.18);
    }

    const sk = p.skull;
    const ghost = p.ghostTimer > 0;
    const veil = p.stealthTimer > 0;
    if (ghost || veil) {
      canvas.saveLayer(Rect.fromLTWH(-90, -56, 180, 150), _P(Colors.white.withOpacity(veil ? 0.30 : 0.5)));
    }
    const flashing = !ghost && p.invuln > 0 && (Math.floor(p.invuln * 22) % 2 === 0);
    const body = flashing ? Colors.white : sk.body;
    const moving = p.vx.abs() > 10 && p.onGround && !p.dodging;
    const t = p.animTime;
    const legSwing = moving ? sin(t * 16) * 7 : 0.0;
    const bob = moving ? (Math.abs(sin(t * 16)) * -2) : 0.0;
    const cy = bob;

    if (p.skillActive > 0) {
      canvas.drawCircle(new Offset(0, p.h / 2), 70 * (1 - p.skillActive / 0.32) + 20, _PS(sk.eye.withOpacity(0.4 * (p.skillActive / 0.32)), 5));
    }

    this._pixelRect(canvas, Rect.fromLTWH(-18, p.h - 6, 36, 8), Colors.black.withOpacity(0.28));

    if (p.rideTimer > 0) this._ghostHorse(canvas, p, cy);
    if (p.reflectTimer > 0) {
      const gold = new Color(0xFFFFCA28);
      const rr = 30.0 + sin(t * 12) * 2;
      this._glow(canvas, new Offset(0, 22 + cy), 26, gold.withOpacity(0.16), 14);
      canvas.drawCircle(new Offset(0, 22 + cy), rr, _PS(gold.withOpacity(0.7), 2));
      for (let i = 0; i < 8; i++) {
        const a = t * 2 + i / 8 * pi * 2;
        canvas.drawCircle(new Offset(cos(a) * rr, 22 + cy + sin(a) * rr), 2.2, _P(gold.withOpacity(0.9)));
      }
    }

    this._glow(canvas, new Offset(0, 18 + cy), ghost ? 30 : 22, (ghost ? new Color(0xFFB388FF) : sk.eye).withOpacity(ghost ? 0.34 : 0.18), ghost ? 16 : 12);

    const capeDk = Color.lerp(sk.body, new Color(0xFF0B0712), 0.62);
    const capeMd = Color.lerp(sk.body, new Color(0xFF0B0712), 0.45);
    const capeSwing = moving ? sin(t * 16) * 2.5 : 0.0;
    this._pixelRect(canvas, Rect.fromLTWH(-11, -1 + cy, 22, 9), capeDk);
    this._pixelRect(canvas, Rect.fromLTWH(-13, 1 + cy, 5, 9), capeDk);
    this._pixelRect(canvas, Rect.fromLTWH(8, 1 + cy, 5, 9), capeDk);
    this._pixelRect(canvas, Rect.fromLTWH(-9 + capeSwing, 16 + cy, 7, 24), capeMd);
    this._pixelRect(canvas, Rect.fromLTWH(-2 + capeSwing, 16 + cy, 7, 26), capeDk);
    this._pixelRect(canvas, Rect.fromLTWH(-7 + capeSwing, 38 + cy, 5, 5), capeDk);
    this._pixelRect(canvas, Rect.fromLTWH(1 + capeSwing, 40 + cy, 5, 4), capeMd);

    if (p.flyTimer > 0) this._wings(canvas, p, cy);

    this._pixelRect(canvas, Rect.fromLTWH(-8, 34 + cy, 6, 13), new Color(0xFF2E2A36));
    this._pixelRect(canvas, Rect.fromLTWH(2, 34 + cy, 6, 13), new Color(0xFF2E2A36));
    this._pixelRect(canvas, Rect.fromLTWH(-9 + legSwing * 0.4, 46 + cy, 8, 4), new Color(0xFF1C1922));
    this._pixelRect(canvas, Rect.fromLTWH(2 - legSwing * 0.4, 46 + cy, 8, 4), new Color(0xFF1C1922));

    const _ramp1 = this._ramp(body);
    const bShadow = _ramp1[0], bMid = _ramp1[1], bLight = _ramp1[2];
    const lower = Color.lerp(body, new Color(0xFF17121F), 0.5);
    const _ramp2 = this._ramp(lower);
    const lShadow = _ramp2[0], lMid = _ramp2[1], lLight = _ramp2[2];

    this._pixelRect(canvas, Rect.fromLTWH(-11, 15 + cy, 22, 25), new Color(0xFF120E1C).withOpacity(0.9));

    this._pixelRect(canvas, Rect.fromLTWH(-6, 14 + cy, 12, 2), bLight);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 16 + cy, 20, 4), bMid);
    this._pixelRect(canvas, Rect.fromLTWH(-9, 20 + cy, 18, 6), bMid);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 16 + cy, 20, 2), bLight);
    this._pixelRect(canvas, Rect.fromLTWH(-9, 24 + cy, 18, 2), bShadow);
    this._pixelRect(canvas, Rect.fromLTWH(-1, 17 + cy, 2, 9), Color.lerp(body, Colors.black, 0.22));
    this._pixelRect(canvas, Rect.fromLTWH(7, 17 + cy, 2, 9), bLight.withOpacity(0.7));

    this._pixelRect(canvas, Rect.fromLTWH(-9, 26 + cy, 18, 3), Color.lerp(body, Colors.black, 0.55));
    this._pixelRect(canvas, Rect.fromLTWH(-2, 26 + cy, 4, 3), sk.eye.withOpacity(0.85));

    this._pixelRect(canvas, Rect.fromLTWH(-9, 29 + cy, 18, 5), lMid);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 33 + cy, 20, 3), lMid);
    this._pixelRect(canvas, Rect.fromLTWH(-9, 29 + cy, 18, 2), lLight);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 34 + cy, 20, 2), lShadow);
    this._pixelRect(canvas, Rect.fromLTWH(-1, 29 + cy, 2, 6), Color.lerp(lower, Colors.black, 0.35));

    this._drawPlayerSkull(canvas, cy, sk.eye, flashing);

    this._drawSkullGear(canvas, sk, cy, flashing, t);

    this._weapon(canvas, p, cy);
    if (ghost || veil) canvas.restore();
    canvas.restore();
    this._statusFx(canvas, p);
  }

  _ghostHorse(canvas, p, cy) {
    const ghostA = 0.55;
    const horse = new Color(0xFFB388FF);
    const horseDk = new Color(0xFF7E57C2);
    const eye = p.skull.eye;
    const t = p.animTime;
    const gallop = sin(t * 14) * 3;
    const gy = p.h - 2 + cy;
    this._glow(canvas, new Offset(2, gy - 12), 30, horse.withOpacity(0.22), 16);
    this._pixelRect(canvas, Rect.fromLTWH(-30, gy - 20, 10, 4), horseDk.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(-32, gy - 14, 12, 4), horse.withOpacity(ghostA * 0.8));
    this._pixelRect(canvas, Rect.fromLTWH(-24, gy - 24, 44, 14), horse.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(-24, gy - 24, 44, 3), horse.withOpacity(ghostA * 0.6));
    this._pixelRect(canvas, Rect.fromLTWH(12, gy - 34, 12, 16), horse.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(20, gy - 38, 14, 9), horse.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(30, gy - 34, 6, 5), horseDk.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(10, gy - 38, 6, 18), horseDk.withOpacity(ghostA));
    canvas.drawCircle(new Offset(26, gy - 33), 2.2, _P(eye));
    this._pixelRect(canvas, Rect.fromLTWH(-20 + gallop, gy - 12, 5, 14), horseDk.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(-10 - gallop, gy - 12, 5, 14), horseDk.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(6 + gallop, gy - 12, 5, 14), horseDk.withOpacity(ghostA));
    this._pixelRect(canvas, Rect.fromLTWH(15 - gallop, gy - 12, 5, 14), horseDk.withOpacity(ghostA));
  }

  _wings(canvas, p, cy) {
    const flap = sin(p.animTime * 11);
    const eye = p.skull.eye;
    const memb = Color.lerp(eye, new Color(0xFF140A1E), 0.34);
    const bone = Color.lerp(eye, Colors.white, 0.4);
    for (const side of [-1.0, 1.0]) {
      canvas.save();
      canvas.translate(0, 16 + cy);
      const open = 0.78 + 0.22 * (flap * 0.5 + 0.5);
      const lift = -0.5 - 0.5 * flap;
      const wrist = new Offset(side * 30 * open, lift * 22 - 14);
      const tips = [
        new Offset(side * 52 * open, lift * 16 - 6),
        new Offset(side * 50 * open, lift * 6 + 12),
        new Offset(side * 40 * open, lift * 2 + 26),
        new Offset(side * 24 * open, 34),
      ];
      const m = new Path();
      m.moveTo(0, 0);
      m.lineTo(wrist.dx, wrist.dy);
      let prev = wrist;
      for (const tp of tips) {
        const ctrl = new Offset((prev.dx + tp.dx) / 2 - side * 4, (prev.dy + tp.dy) / 2 + 9);
        m.quadraticBezierTo(ctrl.dx, ctrl.dy, tp.dx, tp.dy);
        prev = tp;
      }
      m.lineTo(side * 6, 30);
      m.close();
      canvas.drawPath(m, _P(memb.withOpacity(0.92)));
      const lead = new Path();
      lead.moveTo(0, 0);
      lead.lineTo(wrist.dx, wrist.dy);
      lead.lineTo(tips[0].dx, tips[0].dy);
      canvas.drawPath(lead, _PSC(eye.withOpacity(0.55), 3, StrokeCap.round));
      canvas.drawLine(Offset.zero, wrist, _PSC(bone, 2.6, StrokeCap.round));
      const bp = _PSC(bone, 2, StrokeCap.round);
      for (const tp of tips) {
        canvas.drawLine(wrist, tp, bp);
        canvas.drawCircle(tp, 1.8, _P(bone));
      }
      canvas.drawCircle(wrist, 2.4, _P(bone));
      canvas.restore();
    }
  }

  _stormCloud(canvas, c) {
    const fade = c.life < 1.0 ? c.life.clamp(0.0, 1.0) : 1.0;
    const flash = (c.boltFlash / 0.22).clamp(0.0, 1.0);
    const dark = Color.lerp(new Color(0xFF2A3340), new Color(0xFFE0F7FA), flash * 0.6);
    this._glow(canvas, new Offset(c.x, c.y + 6), 34, new Color(0xFF18FFFF).withOpacity((0.16 + 0.45 * flash) * fade), 16);
    this._pixelRect(canvas, Rect.fromCenter(new Offset(c.x, c.y + 8), 64, 10), Color.lerp(dark, new Color(0xFF0B0712), 0.4).withOpacity(0.9 * fade));
    const lumps = [
      new Offset(c.x - 22, c.y), new Offset(c.x + 22, c.y),
      new Offset(c.x - 10, c.y + 4), new Offset(c.x + 12, c.y + 4),
      new Offset(c.x, c.y - 6),
    ];
    for (const o of lumps) {
      this._pixelRect(canvas, Rect.fromCenter(o, 30, 18), dark.withOpacity(0.92 * fade));
    }
    if (flash > 0.05) {
      canvas.drawLine(new Offset(c.x, c.y + 8), new Offset(c.x + sin(c.t * 22) * 7, c.y + 22), _PSC(new Color(0xFFE0F7FA).withOpacity(0.85 * fade), 2, StrokeCap.round));
    }
  }

  // A single flickering soul-fire eye inside a socket (the Skul signature look):
  // a small upward flame in the class colour with a white-hot core.
  _eyeFlame(canvas, cx, baseY, core, hot, flick) {
    const h = 4 + flick * 3;
    this._pixelRect(canvas, Rect.fromLTWH(cx - 2, baseY - h, 4, h), core);        // flame body
    this._pixelRect(canvas, Rect.fromLTWH(cx - 1, baseY - h - 2, 2, 3), core);    // tapering tip
    this._pixelRect(canvas, Rect.fromLTWH(cx - 1, baseY - h + 1, 2, h - 1), hot); // hot core
    this._pixelRect(canvas, Rect.fromLTWH(cx, baseY - h - 1, 1, 2), Colors.white);// white spark
  }

  // The hero's head — a Skul-styled chibi rabbit: a big round furry head with
  // soft 3-tone shading, long rounded ears (pink inner), a dark hood framing the
  // face, and glowing soul-fire eyes that flicker. Centered on x=0; sized so the
  // per-class headgear in _drawSkullGear still lines up.
  _drawPlayerSkull(canvas, cy, eye, flashing) {
    const fur = new Color(0xFFF6F8FB);
    const furMid = new Color(0xFFDDE3EA);
    const furShade = new Color(0xFFB3BCC8);
    const pink = new Color(0xFFFBC2D2);
    const pinkDk = new Color(0xFFE890A8);
    const hood = new Color(0xFF191320);
    const outline = new Color(0xFF14101D);
    const y0 = cy;
    const t = this.world.clock;
    const flick = sin(t * 11) * 0.5 + 0.5;
    const flick2 = sin(t * 7 + 1.3) * 0.5 + 0.5;
    const r = (x, y, w, h, c) => this._pixelRect(canvas, Rect.fromLTWH(x, y + y0, w, h), c);

    // ---- long rounded ears (behind the head; hats overlay them) ----
    // left
    r(-10, -24, 7, 25, outline);
    r(-9, -23, 5, 23, fur);
    r(-9, -24, 5, 2, outline);     // rounded tip cap
    r(-8, -22, 3, 2, Colors.white);// tip sheen
    r(-8, -19, 2, 14, pink);       // inner canal
    r(-4, -20, 1, 16, furShade);   // inner edge shade
    // right
    r(3, -24, 7, 25, outline);
    r(4, -23, 5, 23, fur);
    r(4, -24, 5, 2, outline);
    r(5, -22, 3, 2, Colors.white);
    r(6, -19, 2, 14, pink);
    r(3, -20, 1, 16, furShade);

    // ---- dark hood crescent framing the face (Skul cowl) ----
    r(-13, 2, 26, 12, hood);
    r(-13, 2, 26, 2, Color.lerp(hood, eye, 0.22));

    // ---- soul-fire glow behind the eyes (signature) ----
    this._glow(canvas, new Offset(-4, 6 + y0), 6, eye.withOpacity(0.55), 5);
    this._glow(canvas, new Offset(4, 6 + y0), 6, eye.withOpacity(0.55), 5);

    // ---- round furry face (3-tone, tapered rows = round silhouette) ----
    r(-10, -1, 20, 3, outline);    // forehead
    r(-12, 2, 24, 9, outline);     // widest cheeks
    r(-9, 11, 18, 4, outline);     // jaw
    r(-9, 0, 18, 3, fur);
    r(-11, 3, 22, 8, fur);
    r(-8, 11, 16, 3, fur);
    r(-9, 0, 14, 2, Colors.white);                  // top sheen
    r(-9, 0, 5, 3, Colors.white);                   // bright forehead
    r(8, 3, 3, 8, furShade);                        // right-side shade
    r(-11, 10, 22, 1, furMid);                      // under-cheek line
    r(-8, 13, 16, 1, furShade);                     // chin shade

    // ---- flickering soul-fire eyes in dark sockets ----
    r(-8, 3, 6, 7, new Color(0xFF0D0914));
    r(2, 3, 6, 7, new Color(0xFF0D0914));
    const core = flashing ? Colors.white : eye;
    const hot = flashing ? Colors.white : Color.lerp(eye, Colors.white, 0.6);
    this._eyeFlame(canvas, -5, 10 + y0, core, hot, flick);
    this._eyeFlame(canvas, 5, 10 + y0, core, hot, flick2);

    // ---- small pink nose + tiny buck teeth ----
    r(-1, 10, 3, 2, pinkDk);
    r(0, 10, 1, 1, pink);
    r(-1, 13, 1, 1, furMid);
    r(1, 13, 1, 1, furMid);

    // ---- faint whiskers ----
    const wp = _PS(furShade.withOpacity(0.5), 1);
    canvas.drawLine(new Offset(-2, 11 + y0), new Offset(-13, 9 + y0), wp);
    canvas.drawLine(new Offset(3, 11 + y0), new Offset(14, 9 + y0), wp);
  }

  _skullLook(sk) {
    switch (sk.type) {
      case SkullType.farmhand: return 'farmer';
      case SkullType.miner: return 'miner';
      case SkullType.fisher: return 'fisher';
      case SkullType.militia:
      case SkullType.footman: return 'militia';
      default: break;
    }
    switch (sk.category) {
      case '기사': return 'knight';
      case '마법형': return 'mage';
      case '궁수형': return 'archer';
      case '짐승형': return 'beast';
      case '권사': return 'fist';
      case '창병': return 'spear';
      default:
        if (sk.weapon === 'scythe') return 'reaper';
        if (sk.weapon === 'daggers') return 'rogue';
        if (sk.weapon === 'axe' || sk.weapon === 'greatsword') return 'warrior';
        return 'sword';
    }
  }

  _skullElement(sk) {
    switch (sk.type) {
      case SkullType.voidlord: return 'void';
      case SkullType.plagueDoctor: return 'poison';
      case SkullType.seraph:
      case SkullType.paladin:
      case SkullType.shaman: return 'holy';
      case SkullType.frostmage: return 'frost';
      case SkullType.pyromancer:
      case SkullType.torchbearer:
      case SkullType.imp: return 'fire';
      case SkullType.stormcaller: return 'lightning';
      default: break;
    }
    switch (sk.skill) {
      case 'flames':
      case 'firestorm': return 'fire';
      case 'plague': return 'arcane';
      case 'frost': return 'frost';
      case 'chain': return 'lightning';
      case 'heal': return 'holy';
      case 'meteor':
      case 'summon': return 'arcane';
      default: return 'none';
    }
  }

  _drawSkullGear(canvas, sk, cy, flashing, t) {
    const y0 = cy;
    const look = this._skullLook(sk);
    const eye = sk.eye;
    const steel = sk.body;
    const steelLt = Color.lerp(sk.body, Colors.white, 0.42);
    const steelDk = Color.lerp(sk.body, Colors.black, 0.5);

        r(-9, -9, 14, 5, cloth);
        r(-9, -14, 10, 5, cloth);

    this._drawSkullAura(canvas, this._skullElement(sk), cy, eye, t);

  _drawSkullAura(canvas, element, cy, eye, t) {
    const y0 = cy;
    const r = (x, y, w, h, c) => this._pixelRect(canvas, Rect.fromLTWH(x, y + y0, w, h), c);
    switch (element) {
      case 'fire':
        this._glow(canvas, new Offset(0, -4 + y0), 12, new Color(0xFFFF6D00).withOpacity(0.25), 7);
        for (let i = 0; i < 3; i++) {
          const dx = (i - 1) * 6.0;
          const fl = 4 + Math.abs(sin(t * 18 + i * 2)) * 5;
          r(dx - 2, -8 - fl, 4, fl, new Color(0xFFFF7043));
          r(dx - 1, -8 - fl, 2, fl * 0.5, new Color(0xFFFFD54F));
        }
        break;
      case 'frost':
        this._glow(canvas, new Offset(0, 6 + y0), 13, new Color(0xFF80DEEA).withOpacity(0.22), 8);
        r(-13, 12, 3, 6, new Color(0xFFB3E5FC));
        r(-12, 11, 1, 3, Colors.white);
        r(10, 12, 3, 6, new Color(0xFFB3E5FC));
        r(8, -10 + sin(t * 3) * 2, 2, 4, new Color(0xFFE1F5FE));
        break;
      case 'lightning': {
        const on = Math.floor(t * 12) % 2 === 0;
        this._glow(canvas, new Offset(0, 4 + y0), 13, new Color(0xFF18FFFF).withOpacity(on ? 0.3 : 0.12), 8);
        if (on) {
          r(-14, 8, 2, 3, new Color(0xFF84FFFF));
          r(-16, 11, 2, 3, new Color(0xFFE0F7FA));
          r(12, 6, 2, 3, new Color(0xFF84FFFF));
          r(14, 9, 2, 3, new Color(0xFFE0F7FA));
        }
        break;
      }
      case 'holy':
        this._glow(canvas, new Offset(0, 4 + y0), 16, new Color(0xFFFFF59D).withOpacity(0.3), 9);
        canvas.drawCircle(new Offset(0, -11 + y0), 7, _PS(new Color(0xFFFFF176).withOpacity(0.9), 2));
        break;
      case 'void':
        this._glow(canvas, new Offset(0, 6 + y0), 16, new Color(0xFF7C4DFF).withOpacity(0.3), 10);
        for (let i = 0; i < 3; i++) {
          const a = t * 3 + i * 2.1;
          r(cos(a) * 12 - 1, 6 + sin(a) * 10 - 1, 2, 2, new Color(0xFFE040FB));
        }
        break;
      case 'poison':
        this._glow(canvas, new Offset(0, 6 + y0), 14, new Color(0xFF8BC34A).withOpacity(0.24), 8);
        for (let i = 0; i < 3; i++) {
          const yy = (t * 8 + i * 3) % 16;
          r((i - 1) * 6.0 - 1, 12 - yy, 2, 2, new Color(0xFFAEEA00));
        }
        break;
      case 'arcane':
        this._glow(canvas, new Offset(0, 2 + y0), 12, eye.withOpacity(0.2), 7);
        for (let i = 0; i < 3; i++) {
          const a = t * 2 + i * 2.1;
          r(cos(a) * 11 - 1, 2 + sin(a * 1.3) * 9 - 1, 2, 2, eye);
        }
        break;
      default:
        break;
    }
  }

  _weapon(canvas, p, cy) {
    const sk = p.skull;
    let angle;
    if (sk.rangedBasic) {
      const recoil = p.attacking ? (p.attackTimer / p.attackDuration).clamp(0.0, 1.0) * 0.45 : 0.0;
      angle = -0.1 - recoil;
      canvas.save();
      canvas.translate(6, 22 + cy);
      canvas.rotate(angle);
      this._pixelRect(canvas, Rect.fromLTWH(-3, -3, 14, 6), new Color(0xFFCFD8DC));
      this._pixelRect(canvas, Rect.fromLTWH(-3, -3, 14, 2), new Color(0xFFECEFF1));
      this._drawWeapon(canvas, sk.weapon, sk.eye);
      canvas.restore();
      return;
    }
    if (sk.category === '권사') {
      this._punch(canvas, p, cy, sk);
      return;
    }
    if (p.attacking) {
      const e = ((p.attackDuration - p.attackTimer) / p.attackDuration).clamp(0.0, 1.0);
      const eased = Curves.easeOutCubic.transform(e);
      switch (p.comboStep) {
        case 2: angle = 1.1 - 2.6 * eased; break;
        case 3: angle = -2.6 + 5.4 * eased; break;
        default: angle = -2.2 + 3.0 * eased;
      }
      const arcPaint = _PSC(sk.eye.withOpacity(0.30 * (1 - e)), 8 * (1 - e) + 2, StrokeCap.round);
      const reach = (p.comboStep >= 3 ? 52.0 : 40.0) * sk.reachMul;
      canvas.drawArc(Rect.fromCircle(new Offset(6, 22 + cy), reach), angle - 0.6, 1.2, false, arcPaint);
    } else {
      angle = -0.5;
    }

    canvas.save();
    canvas.translate(6, 22 + cy);
    canvas.rotate(angle);
    this._pixelRect(canvas, Rect.fromLTWH(-3, -3, 14, 6), new Color(0xFFCFD8DC));
    this._pixelRect(canvas, Rect.fromLTWH(-3, -3, 14, 2), new Color(0xFFECEFF1));
    this._drawWeapon(canvas, sk.weapon, sk.eye);
    // 검성 창천의 검기: a long blue blade-aura EXTENDING the weapon — drawn in the
    // weapon's rotated frame so it tracks the blade as it swings.
    if (p.auraTimer > 0) {
      const blue = new Color(0xFF18FFFF);
      this._glow(canvas, new Offset(108, 0), 16, blue.withOpacity(0.4), 14);
      const blade = new Path();
      blade.moveTo(8, -4);
      blade.lineTo(140, -6);
      blade.lineTo(158, 0);
      blade.lineTo(140, 6);
      blade.lineTo(8, 4);
      blade.close();
      canvas.drawPath(blade, _P(blue.withOpacity(0.45)));
      canvas.drawPath(blade, _PS(Colors.white.withOpacity(0.55), 1.5));
    }
    canvas.restore();
  }

  _punch(canvas, p, cy, sk) {
    let ext = 4;
    let thrust = 0;
    let vy = 0;
    if (p.attacking) {
      const e = ((p.attackDuration - p.attackTimer) / p.attackDuration).clamp(0.0, 1.0);
      thrust = sin(e * pi);
      ext = (4 + 30 * thrust) * sk.reachMul;
      vy = (p.comboStep === 2 ? -7.0 : (p.comboStep >= 3 ? 7.0 : 0.0)) * thrust;
    }
    canvas.save();
    canvas.translate(6, 22 + cy + vy);
    this._pixelRect(canvas, Rect.fromLTWH(-3, -3, ext, 6), new Color(0xFFCFD8DC));
    this._pixelRect(canvas, Rect.fromLTWH(-3, -3, ext, 2), new Color(0xFFECEFF1));
    this._pixelRect(canvas, Rect.fromLTWH(ext - 2, -5, 4, 10), sk.eye.withOpacity(0.9));
    this._fistShape(canvas, ext + 4, 0, 1, sk.body);
    if (thrust > 0.55) {
      canvas.drawCircle(new Offset(ext + 12, 0), 6 * thrust + 2, _P(sk.eye.withOpacity(0.5 * thrust)));
      canvas.drawCircle(new Offset(ext + 12, 0), 3 * thrust + 1, _P(Colors.white.withOpacity(0.7 * thrust)));
    }
    canvas.restore();
  }

  _enemy(canvas, e) {
    canvas.save();
    canvas.translate(e.cx, e.y);
    canvas.scale(e.facing, 1.0);
    const eHurt = (e.hurtTimer / 0.18).clamp(0.0, 1.0);
    if (eHurt > 0) {
      canvas.translate(-eHurt * 4, eHurt * 2);
      canvas.rotate(eHurt * 0.16);
    }
    const flash = e.hitFlash > 0;
    if (e.aggro) {
      this._glow(canvas, new Offset(0, e.h * 0.5), e.w * 0.55, new Color(0xFFFF5252).withOpacity(0.12), 10);
    }
    const tint = this._reinforce;
    const tinted = tint > 0.02;
    if (tinted) {
      const tp = new Paint();
      tp.colorFilter = ColorFilter.mode(GamePainter._crimson.withOpacity((tint * 0.9).clamp(0.0, 0.85)), BlendMode.srcATop);
      canvas.saveLayer(Rect.fromLTWH(-e.w, -e.h * 0.5, e.w * 3, e.h * 2.2), tp);
    }
    switch (e.kind) {
      case EnemyKind.grunt: this._grunt(canvas, e, flash); break;
      case EnemyKind.bat: this._bat(canvas, e, flash); break;

    this._pixelRect(canvas, Rect.fromLTWH(-11, -2 + float, 22, 12), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 0 + float, 20, 10), Color.lerp(body, Colors.black, 0.25));
    this._pixelRect(canvas, Rect.fromLTWH(-4, -8 + float, 8, 8), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-3, -7 + float, 5, 7), Color.lerp(body, Colors.black, 0.25));
    for (let i = 0; i < 3; i++) {
      const dx = (i - 1) * 6.0;
      const fl = 4 + Math.abs(sin(e.animTime * 16 + i * 2)) * 4;
      this._pixelRect(canvas, Rect.fromLTWH(dx - 2, -8 + float - fl, 4, fl), fire);
      this._pixelRect(canvas, Rect.fromLTWH(dx - 1, -8 + float - fl, 2, fl * 0.5), fireL);
    }
    this._glow(canvas, new Offset(-4, 8 + float), 4, fire.withOpacity(0.6), 3);
    this._glow(canvas, new Offset(4, 8 + float), 4, fire.withOpacity(0.6), 3);
    this._pixelRect(canvas, Rect.fromLTWH(-6, 6 + float, 4, 4), fireL);
    this._pixelRect(canvas, Rect.fromLTWH(2, 6 + float, 4, 4), fireL);
    this._pixelRect(canvas, Rect.fromLTWH(12, 4 + float, 3, 34), new Color(0xFF5D4037));
    this._glow(canvas, new Offset(13, 2 + float), charge ? 10 : 6, fire.withOpacity(0.7), charge ? 7 : 5);
    this._pixelRect(canvas, Rect.fromLTWH(10, -2 + float, charge ? 7 : 5, charge ? 7 : 5), fire);
    this._pixelRect(canvas, Rect.fromLTWH(11, -1 + float, 3, 3), fireL);
  }

  _mage(canvas, e, flash) {
    const body = flash ? Colors.white : new Color(0xFF5A189A);
    const [s, m, l] = this._ramp(body);
    const float = sin(e.animTime * 3 + e.phase) * 2;
    const outline = new Color(0xFF1A0B2E);
    const charge = e.atkCd < 0.8;
    const eyeC = charge ? new Color(0xFFFF006E) : new Color(0xFF00F5D4);
    this._pixelRect(canvas, Rect.fromLTWH(-15, 7 + float, 30, 40), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-14, 8 + float, 28, 38), m);
    this._pixelRect(canvas, Rect.fromLTWH(-14, 8 + float, 28, 5), l);
    this._pixelRect(canvas, Rect.fromLTWH(-14, 40 + float, 28, 6), s);
    this._pixelRect(canvas, Rect.fromLTWH(11, 8 + float, 3, 38), s);
    this._pixelRect(canvas, Rect.fromLTWH(-11, -2 + float, 22, 12), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 0 + float, 20, 10), Color.lerp(body, Colors.black, 0.25));
    this._pixelRect(canvas, Rect.fromLTWH(-4, -8 + float, 8, 8), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-3, -7 + float, 5, 7), Color.lerp(body, Colors.black, 0.25));
    this._glow(canvas, new Offset(-4, 8 + float), 4, eyeC.withOpacity(0.6), 3);
    this._glow(canvas, new Offset(4, 8 + float), 4, eyeC.withOpacity(0.6), 3);
    this._pixelRect(canvas, Rect.fromLTWH(-6, 6 + float, 4, 4), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(2, 6 + float, 4, 4), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(12, 4 + float, 3, 34), new Color(0xFF5D4037));
    this._glow(canvas, new Offset(13, 2 + float), charge ? 9 : 5, eyeC.withOpacity(0.7), charge ? 6 : 4);
    this._pixelRect(canvas, Rect.fromLTWH(10, -2 + float, charge ? 7 : 5, charge ? 7 : 5), eyeC.withOpacity(0.95));
  }

  _slime(canvas, e, flash) {
    const body = flash ? Colors.white : new Color(0xFF52B788);
    const [s, m, l] = this._ramp(body);
    const float = !e.onGround ? -2.0 : sin(e.animTime * 10) * 1.5;
    const outline = new Color(0xFF14321F);
    const top = e.h - 24 + float;
    this._pixelRect(canvas, Rect.fromLTWH(-17, top, 34, 24), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-16, top + 1, 32, 22), m.withOpacity(0.95));
    this._pixelRect(canvas, Rect.fromLTWH(-16, top + 1, 32, 5), l.withOpacity(0.9));
    this._pixelRect(canvas, Rect.fromLTWH(-16, top + 17, 32, 5), s.withOpacity(0.9));
    this._pixelRect(canvas, Rect.fromLTWH(-12, top + 3, 6, 3), Colors.white.withOpacity(0.7));
    this._pixelRect(canvas, Rect.fromLTWH(-7, top + 8, 6, 6), Colors.white);
    this._pixelRect(canvas, Rect.fromLTWH(3, top + 8, 6, 6), Colors.white);
    this._pixelRect(canvas, Rect.fromLTWH(-5, top + 11, 4, 3), Colors.black);
    this._pixelRect(canvas, Rect.fromLTWH(5, top + 11, 4, 3), Colors.black);
  }

  _archer(canvas, e, flash) {
    const body = flash ? Colors.white : new Color(0xFF457B9D);
    const [s, m, l] = this._ramp(body);
    const bob = e.vx.abs() > 5 ? Math.abs(sin(e.animTime * 16)) * -1.5 : 0.0;
    const outline = new Color(0xFF12202B);
    const aiming = e.atkCd < 0.7;
    this._pixelRect(canvas, Rect.fromLTWH(-7, 30 + bob, 6, 12), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-6, 30 + bob, 4, 11), new Color(0xFF2B4150));
    this._pixelRect(canvas, Rect.fromLTWH(1, 30 + bob, 6, 12), outline);
    this._pixelRect(canvas, Rect.fromLTWH(2, 30 + bob, 4, 11), new Color(0xFF2B4150));
    this._pixelRect(canvas, Rect.fromLTWH(-11, 9 + bob, 22, 24), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 10 + bob, 20, 22), m);
    this._pixelRect(canvas, Rect.fromLTWH(-10, 10 + bob, 20, 4), l);
    this._pixelRect(canvas, Rect.fromLTWH(7, 10 + bob, 3, 22), s);
    this._pixelRect(canvas, Rect.fromLTWH(-9, 1 + bob, 18, 11), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-8, 2 + bob, 16, 9), new Color(0xFF1D3557));
    this._pixelRect(canvas, Rect.fromLTWH(-7, -2 + bob, 8, 4), new Color(0xFF1D3557));
    this._glow(canvas, new Offset(3, 7 + bob), 3, new Color(0xFFFFD166).withOpacity(0.5), 3);

    this._pixelRect(canvas, Rect.fromLTWH(16, 6 + bob, 4, 24), outline);
    this._pixelRect(canvas, Rect.fromLTWH(17, 7 + bob, 2, 22), new Color(0xFF8D6E63));
    if (aiming) {
      this._pixelRect(canvas, Rect.fromLTWH(7, 17 + bob, 12, 2), new Color(0xFFCFD8DC));
      this._pixelRect(canvas, Rect.fromLTWH(8, 16 + bob, 11, 1), Colors.white70);
    }
  }

  _brute(canvas, e, flash) {
    const body = flash ? Colors.white : new Color(0xFF6D597A);
    const [s, m, l] = this._ramp(body);
    const lunging = e.t2 > 0;
    const lean = lunging ? 6.0 : 0.0;
    const outline = new Color(0xFF1B1422);
    this._pixelRect(canvas, Rect.fromLTWH(-18, e.h + 2, 36, 7), Colors.black.withOpacity(0.3));
    this._pixelRect(canvas, Rect.fromLTWH(-16, e.h - 16, 12, 16), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-15, e.h - 16, 10, 15), s);
    this._pixelRect(canvas, Rect.fromLTWH(4, e.h - 16, 12, 16), outline);
    this._pixelRect(canvas, Rect.fromLTWH(5, e.h - 16, 10, 15), s);
    this._pixelRect(canvas, Rect.fromLTWH(-17 + lean, 7, 34, e.h - 20), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-16 + lean, 8, 32, e.h - 22), m);
    this._pixelRect(canvas, Rect.fromLTWH(-16 + lean, 8, 32, 6), l);
    this._pixelRect(canvas, Rect.fromLTWH(13 + lean, 8, 3, e.h - 22), s);
    this._pixelRect(canvas, Rect.fromLTWH(-23 + lean, 21, 12, 12), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-22 + lean, 22, 10, 10), Color.lerp(body, Colors.black, 0.25));
    this._pixelRect(canvas, Rect.fromLTWH(11 + lean, 21, 12, 12), outline);
    this._pixelRect(canvas, Rect.fromLTWH(12 + lean, 22, 10, 10), Color.lerp(body, Colors.black, 0.25));
    this._pixelRect(canvas, Rect.fromLTWH(-15 + lean, 1, 9, 9), outline);
    this._pixelRect(canvas, Rect.fromLTWH(-14 + lean, 2, 8, 7), new Color(0xFFE8E8E8));
    this._pixelRect(canvas, Rect.fromLTWH(6 + lean, 1, 9, 9), outline);
    this._pixelRect(canvas, Rect.fromLTWH(7 + lean, 2, 8, 7), new Color(0xFFE8E8E8));
    const eyeC = lunging ? new Color(0xFFFF1744) : new Color(0xFFFFCA28);
    this._glow(canvas, new Offset(-5 + lean, 19), 5, eyeC.withOpacity(0.55), 4);
    this._glow(canvas, new Offset(13 + lean, 19), 5, eyeC.withOpacity(0.55), 4);
    this._pixelRect(canvas, Rect.fromLTWH(-8 + lean, 16, 6, 6), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(10 + lean, 16, 6, 6), eyeC);
  }

  _enemyHp(canvas, e) {
    if (e.hp >= e.maxHp) return;
    const w = e.w + 4;
    const x = e.cx - w / 2;
    const y = e.y - 10;
    canvas.drawRect(Rect.fromLTWH(x, y, w, 4), _P(Colors.black.withOpacity(0.5)));
    canvas.drawRect(Rect.fromLTWH(x, y, w * (e.hp / e.maxHp), 4), _P(new Color(0xFF80ED99)));
  }

  _statusFx(canvas, e) {
    if (e.statuses.isEmpty) return;
    let tint = null;
    for (const k of GamePainter._tintPriority) {
      if (e.hasStatus(k)) { tint = k; break; }
    }
    if (tint !== null) {
      const pulse = 0.22 + 0.26 * (0.5 + 0.5 * sin(e.animTime * 12));
      canvas.drawRect(Rect.fromLTWH(e.x, e.y, e.w, e.h), _P(statusColor(tint).withOpacity(pulse)));
    }
    const kinds = e.statuses.map(s => s.kind).toList();
    const sz = 6.0, gap = 3.0;
    let bx = e.cx - (kinds.length * (sz + gap) - gap) / 2;
    const by = e.y - 20;
    for (const k of kinds) {
      canvas.drawRect(Rect.fromLTWH(bx - 1, by - 1, sz + 2, sz + 2), _P(Colors.black.withOpacity(0.55)));
      canvas.drawRect(Rect.fromLTWH(bx, by, sz, sz), _P(statusColor(k)));
      bx += sz + gap;
    }
  }

  _boss(canvas, b) {
    canvas.save();
    canvas.translate(b.cx, b.y);
    const winding = b.state === BossState.windup;
    const t = b.animTime;
    let sx = 1, sy = 1;
    if (winding) {
      const pulse = sin(t * 30) * 0.04;
      sx = 1.08 + pulse;
      sy = 0.94 - pulse;
    } else if (b.airborne) {
      sx = 0.9; sy = 1.12;
    } else if (b.state === BossState.recover) {
      sx = 1.16; sy = 0.86;
    }
    canvas.scale(b.facing * sx, sy);
    const bHurt = (b.hurtTimer / 0.18).clamp(0.0, 1.0);
    if (bHurt > 0) canvas.rotate(bHurt * 0.08);

    const flash = b.hitFlash > 0;
    const baseCol = this._reinforced(b.spec.color);
    const col = flash ? Colors.white : baseCol;
    const dark = Color.lerp(baseCol, Colors.black, 0.4);

    canvas.drawOval(Rect.fromCenter(new Offset(0, b.h - 2), 90, 16), _P(Colors.black.withOpacity(0.3)));
    this._glow(canvas, new Offset(0, b.h * 0.5), 52, b.spec.color.withOpacity(0.16), 18);
    if (winding) {
      canvas.drawCircle(new Offset(0, b.h / 2), 70, _PB(new Color(0xFFFF1744).withOpacity(0.30), 14));
    }
    if (b.guard > 0) {
      canvas.drawCircle(new Offset(0, b.h / 2), 64, _PS(new Color(0xFF64B5F6).withOpacity(0.6), 4));
      canvas.drawCircle(new Offset(0, b.h / 2), 60, _P(new Color(0xFF64B5F6).withOpacity(0.12)));
    }
    const eyeC = winding ? new Color(0xFFFF1744) : new Color(0xFFFFEA00);
    switch (b.spec.visual) {
      case 'knight': this._bossKnight(canvas, b, col, dark, eyeC); break;
      case 'mercenary': this._bossMercenary(canvas, b, col, dark, eyeC); break;
      case 'bandit': this._bossBandit(canvas, b, col, dark, eyeC); break;
      case 'witch': this._bossWitch(canvas, b, col, dark, eyeC); break;
      case 'demonKing': this._bossDemonKing(canvas, b, col, dark, eyeC); break;
      case 'goblin': this._bossGoblin(canvas, b, col, dark, eyeC); break;
      case 'boar': this._bossBeast(canvas, b, col, dark, eyeC); break;
      case 'golem': this._bossGolem(canvas, b, col, dark, eyeC); break;
      case 'eagle': this._bossBird(canvas, b, col, dark, eyeC); break;
      case 'redBear': this._bossRedBear(canvas, b, col, dark, eyeC); break;
      case 'rockBrute': this._bossRockBrute(canvas, b, col, dark, eyeC); break;
      case 'mummy': this._bossMummy(canvas, b, col, dark, eyeC); break;
      case 'doppel': this._bossDoppel(canvas, b, col, dark, eyeC); break;
      case 'appleTree': this._bossAppleTree(canvas, b, col, dark, eyeC); break;
      case 'worm': this._bossWorm(canvas, b, col, dark, eyeC); break;
      case 'wolfKing': this._bossWolfKing(canvas, b, col, dark, eyeC); break;
      case 'spider': this._bossSpider(canvas, b, col, dark, eyeC); break;
      case 'dragon': this._bossDragon(canvas, b, col, dark, eyeC); break;
      case 'dragonkin': this._bossDragonkin(canvas, b, col, dark, eyeC); break;
      default:
        switch (b.spec.shape) {
          case BossShape.humanoid: this._bossHumanoid(canvas, b, col, dark, eyeC); break;
          case BossShape.beast: this._bossBeast(canvas, b, col, dark, eyeC); break;
          case BossShape.golem: this._bossGolem(canvas, b, col, dark, eyeC); break;
          case BossShape.bird: this._bossBird(canvas, b, col, dark, eyeC); break;
        }
    }
    canvas.restore();
    this._statusFx(canvas, b);
  }

  _bossDragonkin(canvas, b, col, dark, eyeC) {
    const h = b.h;
    const t = b.animTime;
    const lit = Color.lerp(col, Colors.white, 0.2);
    const lean = b.state === BossState.active ? 8.0 : 0.0;
    const flap = sin(t * 5) * 4;
    this._pixelRect(canvas, Rect.fromLTWH(-42, h - 30, 24, 8), col);
    this._pixelRect(canvas, Rect.fromLTWH(-34, 10 + flap, 16, 22), dark);
    this._pixelRect(canvas, Rect.fromLTWH(18, 10 - flap, 16, 22), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-22, h - 26, 16, 26), dark);
    this._pixelRect(canvas, Rect.fromLTWH(6, h - 26, 16, 26), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-22, 14, 44, h - 40), col);
    this._pixelRect(canvas, Rect.fromLTWH(-22, 14, 44, 8), lit);
    this._pixelRect(canvas, Rect.fromLTWH(-20, 30, 40, 2), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-20, 40, 40, 2), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-30 + lean, 22, 12, 30), dark);
    this._pixelRect(canvas, Rect.fromLTWH(18 + lean, 22, 12, 30), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-14, 0, 28, 16), col);
    this._pixelRect(canvas, Rect.fromLTWH(-14, 0, 28, 4), lit);
    this._pixelRect(canvas, Rect.fromLTWH(-16, 2, 4, 6), dark);
    this._pixelRect(canvas, Rect.fromLTWH(12, 2, 4, 6), dark);
    this._pixelRect(canvas, Rect.fromLTWH(10, 8, 8, 5), lit);
    this._glow(canvas, new Offset(-4, 7), 4, eyeC.withOpacity(0.6), 3);
    this._glow(canvas, new Offset(6, 7), 4, eyeC.withOpacity(0.6), 3);
    this._pixelRect(canvas, Rect.fromLTWH(-6, 5, 5, 4), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(3, 5, 5, 4), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(28 + lean, 18, 6, 6), new Color(0xFF607D8B));
    this._pixelRect(canvas, Rect.fromLTWH(30 + lean, -6, 6, 28), new Color(0xFFE3F2FD));
    this._pixelRect(canvas, Rect.fromLTWH(30 + lean, -6, 6, 5), Colors.white);
  }

  _bossSpider(canvas, b, col, dark, eyeC) {
    const t = b.animTime;
    const lit = Color.lerp(col, Colors.white, 0.18);
    const skin = Color.lerp(col, Colors.white, 0.5);
    const skinDk = Color.lerp(skin, Colors.black, 0.18);
    const hair = Color.lerp(dark, Colors.black, 0.25);
    const hx = 9.0;
    const legPaint = _PSC(dark, 5, StrokeCap.round);
    const legLit = _PSC(lit.withOpacity(0.5), 1.6, StrokeCap.round);
    for (let i = 0; i < 4; i++) {
      for (const s of [-1, 1]) {
        const ph = sin(t * 5 + i * 1.0 + (s < 0 ? 0.6 : 0)) * 4;
        const hip = new Offset(s * 8.0, 54);
        const knee = new Offset(s * (22 + i * 9.0), 38 - i * 1.0 + ph);
        const foot = new Offset(s * (30 + i * 11.0), 90.0);
        canvas.drawLine(hip, knee, legPaint);
        canvas.drawLine(knee, foot, legPaint);
        canvas.drawLine(hip, knee, legLit);
      }
    }
    canvas.drawOval(Rect.fromLTWH(-44, 44, 42, 40), _P(col));
    canvas.drawOval(Rect.fromLTWH(-42, 46, 30, 12), _P(lit.withOpacity(0.7)));
    this._pixelRect(canvas, Rect.fromLTWH(-28, 56, 10, 18), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-26, 60, 6, 10), new Color(0xFFD32F2F));
    this._pixelRect(canvas, Rect.fromLTWH(-8, 48, 32, 28), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-6, 50, 28, 6), col);
    for (const e2 of [[2, 58], [12, 58], [4, 64], [10, 64]]) {
      this._pixelRect(canvas, Rect.fromLTWH(e2[0], e2[1], 3, 3), eyeC.withOpacity(0.85));
    }
    this._pixelRect(canvas, Rect.fromLTWH(hx - 11, 6, 7, 34), hair);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 7, 38, 16, 12), skinDk);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 8, 44, 18, 6), dark);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 6, 30, 12, 12), skin);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 9, 18, 18, 14), col);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 9, 18, 18, 3), lit);
    canvas.drawCircle(new Offset(hx - 4, 22), 3.4, _P(skin));
    canvas.drawCircle(new Offset(hx + 4, 22), 3.4, _P(skin));
    this._pixelRect(canvas, Rect.fromLTWH(hx - 9, 24, 18, 2), dark);
    const armRaise = sin(t * 3) * 3;
    this._pixelRect(canvas, Rect.fromLTWH(hx + 6, 18, 5, 16), skin);
    this._pixelRect(canvas, Rect.fromLTWH(hx + 8, 30, 5, 8), skinDk);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 13, 14 + armRaise, 5, 14), skin);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 16, 8 + armRaise, 5, 8), skinDk);
    this._glow(canvas, new Offset(hx - 14, 8 + armRaise), 5, eyeC.withOpacity(0.5), 4);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 3, 12, 6, 6), skin);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 7, 0, 14, 13), skin);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 8, -3, 16, 6), hair);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 9, 1, 3, 12), hair);
    this._pixelRect(canvas, Rect.fromLTWH(hx + 6, 1, 3, 12), hair);
    this._glow(canvas, new Offset(hx - 3, 6), 2.4, eyeC.withOpacity(0.5), 2);
    this._glow(canvas, new Offset(hx + 3, 6), 2.4, eyeC.withOpacity(0.5), 2);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 4, 5, 3, 3), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(hx + 2, 5, 3, 3), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(hx - 2, 10, 4, 1), skinDk);
  }

  _bossDragon(canvas, b, col, dark, eyeC) {
    const h = b.h;
    const t = b.animTime;
    const lit = Color.lerp(col, Colors.white, 0.2);
    const flap = sin(t * 5) * 6;
    this._pixelRect(canvas, Rect.fromLTWH(-42, 4 + flap, 32, 24), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-40, 6 + flap, 28, 20), Color.lerp(col, Colors.black, 0.25));
    this._pixelRect(canvas, Rect.fromLTWH(-40, 6 + flap, 28, 4), lit);
    this._pixelRect(canvas, Rect.fromLTWH(-16, h - 24, 13, 24), dark);
    this._pixelRect(canvas, Rect.fromLTWH(6, h - 24, 13, 24), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-22, 26, 48, h - 44), col);
    this._pixelRect(canvas, Rect.fromLTWH(-22, 26, 48, 8), lit);
    this._pixelRect(canvas, Rect.fromLTWH(-20, h - 22, 44, 4), lit);
    this._pixelRect(canvas, Rect.fromLTWH(-40, h - 30, 22, 8), col);
    this._pixelRect(canvas, Rect.fromLTWH(-52, h - 26, 14, 6), dark);
    this._pixelRect(canvas, Rect.fromLTWH(16, 8, 12, 26), col);
    this._pixelRect(canvas, Rect.fromLTWH(24, -2, 24, 16), col);
    this._pixelRect(canvas, Rect.fromLTWH(24, -2, 24, 4), lit);
    this._pixelRect(canvas, Rect.fromLTWH(26, -8, 4, 7), dark);
    this._pixelRect(canvas, Rect.fromLTWH(34, -9, 4, 8), dark);
    this._pixelRect(canvas, Rect.fromLTWH(30, 3, 4, 4), eyeC);
    this._pixelRect(canvas, Rect.fromLTWH(42, 8, 8, 7), dark);
    this._glow(canvas, new Offset(48, 11), 6, new Color(0xFFFF7043).withOpacity(0.6), 5);
    this._pixelRect(canvas, Rect.fromLTWH(45, 8, 5, 5), new Color(0xFFFFD166));
  }

  _bossRedBear(canvas, b, col, dark, eyeC) {
    const h = b.h;
    const lean = b.state === BossState.active ? 10.0 : 0.0;
    const furL = Color.lerp(col, Colors.white, 0.18);
    const paw = Color.lerp(dark, Colors.black, 0.25);
    this._pixelRect(canvas, Rect.fromLTWH(-34, h - 22, 16, 22), dark);
    this._pixelRect(canvas, Rect.fromLTWH(18, h - 22, 16, 22), dark);
    this._pixelRect(canvas, Rect.fromLTWH(-22, h - 16, 16, 16), paw);
    this._pixelRect(canvas, Rect.fromLTWH(6, h - 16, 16, 16), paw);
    this._pixelRect(canvas, Rect.fromLTWH(-40, 18, 80, h - 34), col);
    this._pixelRect(canvas, Rect.fromLTWH(-40, 18, 80, 10), furL);
    this._pixelRect(canvas, Rect.fromLTWH(-32, 8, 36, 16), col);
