// ---- Offset ----

    const r = rr.rect, rad = Math.min(rr.radius.x, r.width / 2, r.height / 2);
    this.p2d.moveTo(r.left + rad, r.top);
    this.p2d.arcTo(r.right, r.top, r.right, r.bottom, rad);
    this.p2d.arcTo(r.right, r.bottom, r.left, r.bottom, rad);
    this.p2d.arcTo(r.left, r.bottom, r.left, r.top, rad);
    this.p2d.arcTo(r.left, r.top, r.right, r.top, rad);
    this.p2d.closePath();
  }
  addOval(rect) { this.p2d.ellipse(rect.center.dx, rect.center.dy, Math.abs(rect.width) / 2, Math.abs(rect.height) / 2, 0, 0, Math.PI * 2); }
  addPolygon(points, close) {
    if (!points.length) return;
    this.p2d.moveTo(points[0].dx, points[0].dy);
    for (let i = 1; i < points.length; i++) this.p2d.lineTo(points[i].dx, points[i].dy);
    if (close) this.p2d.closePath();
  }
  addArc(rect, startAngle, sweepAngle) {
    this.p2d.ellipse(rect.center.dx, rect.center.dy, Math.abs(rect.width) / 2, Math.abs(rect.height) / 2, 0, startAngle, startAngle + sweepAngle, sweepAngle < 0);
  }
  close() { this.p2d.closePath(); this._cx = this._sx; this._cy = this._sy; }
}

const FontWeight = { normal: 'normal', w400: '400', w500: '500', w600: '600', w700: '700', w800: '800', w900: '900', bold: 'bold' };
const TextAlign = { left: 'left', center: 'center', right: 'right' };
function drawText(canvas, text, x, y, opts) {
  opts = opts || {};
  const c = canvas.ctx;
  const size = opts.size || 14;
  const weight = opts.weight || FontWeight.normal;
  const family = opts.family || '"Segoe UI","Malgun Gothic",sans-serif';
  c.save();
  c.font = weight + ' ' + size + 'px ' + family;
  c.textAlign = opts.align || 'left';
  c.textBaseline = opts.baseline || 'alphabetic';
  if (opts.shadow) {
    c.fillStyle = (opts.shadowColor || Colors.black).css;
    c.fillText(text, x + (opts.shadowDx || 1), y + (opts.shadowDy || 1));
  }
  c.fillStyle = (opts.color || Colors.white).css;
  c.fillText(text, x, y);
  c.restore();
}
function measureText(canvas, text, size, weight, family) {
  const c = canvas.ctx;
  c.save();
  c.font = (weight || FontWeight.normal) + ' ' + (size || 14) + 'px ' + (family || '"Segoe UI","Malgun Gothic",sans-serif');
  const w = c.measureText(text).width;
  c.restore();
  return w;
}

class Entity {
  constructor(x, y, w, h, maxHp) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.vx = 0; this.vy = 0; this.facing = 1; this.onGround = false;
    this.maxHp = maxHp; this.hp = maxHp;
    this.hitFlash = 0; this.hurtTimer = 0; this.animTime = 0; this.dead = false;
    this.dr = 0; this.statuses = [];
  }
  hasStatus(k) { return this.statuses.any(s => s.kind === k); }
  addStatus(k, timer, power) {
    if (this instanceof Boss && k === StatusKind.stun) return;
    for (const s of this.statuses) {
      if (s.kind === k) {
        if (timer > s.timer) s.timer = timer;
        if (power > s.power) s.power = power;
        return;
      }
    }
    this.statuses.add(new Status(k, timer, power));
  }
  get rect() { return Rect.fromLTWH(this.x, this.y, this.w, this.h); }
  get cx() { return this.x + this.w / 2; }
  get cy() { return this.y + this.h / 2; }
  get center() { return new Offset(this.cx, this.cy); }
  damage(d) {
    if (this.dr > 0 && d > 0) d *= (1 - this.dr);
    this.hp -= d;
    if (this.hitFlash < 0.1) this.hitFlash = 0.14;
    this.hurtTimer = 0.18;
    if (this.hp <= 0) { this.hp = 0; this.dead = true; }
  }
  applyKnockback(vx, vy) { this.vx = vx; this.vy = vy; }
}

  attackHitbox() {
    if (this.skull.type === SkullType.lich) {
      const fwd = (this.comboStep >= 3 ? 104.0 : 86.0) * this.skull.reachMul;
      const back = 36.0;
      const hh = 72.0;
      const hx = this.facing === 1 ? this.cx - back : this.cx - fwd;
      return Rect.fromLTWH(hx, this.cy - hh / 2, fwd + back, hh);
    }
    const base = this.comboStep >= 3 ? 90.0 : 66.0;
    const auraMul = this.auraTimer > 0 ? 1.9 : 1.0;
    const reach = base * this.skull.reachMul * auraMul;
    const hh = 58.0;
    const hx = this.facing === 1 ? this.x + this.w - 6 : this.x - reach + 6;
    const hy = this.cy - hh / 2;
    return Rect.fromLTWH(hx, hy, reach, hh);
  }
}

function passiveOf(t) { return kPassives[t] || new PassiveInfo('—', PassiveKind.atkUp, 0); }

function tierWeight(t) {
  switch (t) {
    case SkullTier.common: return 100;
    case SkullTier.rare: return 45;
    case SkullTier.epic: return 16;
    case SkullTier.legendary: return 5;
  }
}

function tierLabel(t) {
  switch (t) {
    case SkullTier.common: return '일반';
    case SkullTier.rare: return '희귀';
    case SkullTier.epic: return '영웅';
    case SkullTier.legendary: return '전설';
  }
}

function tierColor(t) {
  switch (t) {
    case SkullTier.common: return new Color(0xFFB0BEC5);
    case SkullTier.rare: return new Color(0xFF42A5F5);
    case SkullTier.epic: return new Color(0xFFB388FF);
    case SkullTier.legendary: return new Color(0xFFFFD166);
  }
}

function _luckedWeight(t, luckMul) {
  const base = tierWeight(t);
  if (t === SkullTier.common) return base;
  return base * luckMul;
}

function rollSkull(rng, candidates, luckMul = 1.0) {
  const pool = Array.from(candidates);
  if (pool.length === 0) return null;
  const weights = pool.map(t => _luckedWeight(skull(t).tier, luckMul));
  const total = weights.fold(0, (a, b) => a + b);
  let r = rng.nextDouble() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r < 0) return pool[i];
  }
  return pool[pool.length - 1];
}

    this.usedBosses = new Set();
  }

  get bonusMaxHp() { return this.upMaxHp * 20.0; }
  get bonusAtkMul() { return this.upAtk * 0.10; }
  get dodgeCharges() { return 1 + this.upDodge; }
  get maxDodgeLevel() { return 2; }
  hpCost() { return 20 + this.upMaxHp * 18; }
  atkCost() { return 25 + this.upAtk * 22; }
  dodgeCost() { return 60 + this.upDodge * 80; }

  traitMax(k) { return k === 'pull' ? 2 : 5; }
  traitLevel(k) {
    if (k === 'attack') return this.trAttack;
    if (k === 'defense') return this.trDefense;
    if (k === 'utility') return this.trUtility;
    if (k === 'pull') return this.trPull;
    if (k === 'luck') return this.trLuck;
    return 0;
  }
  traitUnlocked(k) { return (k === 'pull' || k === 'luck') ? this.trUtility >= 2 : true; }
  traitCost(lv) { return (120 * pow(1.6, lv)).round(); }
  get maxPulls() { return 1 + this.trPull; }
  atkTraitMul(cat) {
    let m = this.trAttack * 0.06;
    if (cat === '검사' || cat === '짐승형' || cat === '권사' || cat === '창병') m += this.trAttack * 0.04;
    return m;
  }
  defenseDrFor(cat) {
    let dr = this.trDefense * 0.05;
    if (cat === '기사') dr += this.trDefense * 0.03;
    return dr.clamp(0.0, 0.7);
  }
  get traitBonusHp() { return this.trDefense * 15.0; }
  get soulGainMul() { return 1 + this.trUtility * 0.12; }
  get traitSpeedMul() { return 1 + this.trUtility * 0.03; }
  get luckMul() { return 1 + this.trLuck * 0.35; }

  get startSkull() { return this.preparedSkull || SkullType.basic; }
  takeStartSkull() {
    const t = this.preparedSkull || SkullType.basic;
    this.preparedSkull = null;
    return t;
  }

  load() {
    this.souls = Prefs.getInt('souls') || 0;
    this.upMaxHp = Prefs.getInt('upMaxHp') || 0;
    this.upAtk = Prefs.getInt('upAtk') || 0;
    this.upDodge = Prefs.getInt('upDodge') || 0;
    this.trAttack = Prefs.getInt('trAttack') || 0;
    this.trDefense = Prefs.getInt('trDefense') || 0;
    this.trUtility = Prefs.getInt('trUtility') || 0;
    this.trPull = Prefs.getInt('trPull') || 0;
    this.trLuck = Prefs.getInt('trLuck') || 0;
    const sn = Prefs.getString('preparedSkull') || '';
    this.preparedSkull = sn === '' ? null : SkullType.values.firstWhere(t => t === sn, () => SkullType.basic);
    if (this.preparedSkull === SkullType.basic) this.preparedSkull = null;
  }

  save() {
    Prefs.setInt('souls', this.souls);
    Prefs.setInt('upMaxHp', this.upMaxHp);
    Prefs.setInt('upAtk', this.upAtk);
    Prefs.setInt('upDodge', this.upDodge);
    Prefs.setInt('trAttack', this.trAttack);
    Prefs.setInt('trDefense', this.trDefense);
    Prefs.setInt('trUtility', this.trUtility);
    Prefs.setInt('trPull', this.trPull);
    Prefs.setInt('trLuck', this.trLuck);
    Prefs.setString('preparedSkull', this.preparedSkull || '');
  }

  buyHp() {
    if (this.souls < this.hpCost()) return false;
    this.souls -= this.hpCost();
    this.upMaxHp++;
    return true;
  }
  buyAtk() {
    if (this.souls < this.atkCost()) return false;
    this.souls -= this.atkCost();
    this.upAtk++;
    return true;
  }
  buyDodge() {
    if (this.upDodge >= this.maxDodgeLevel || this.souls < this.dodgeCost()) return false;
    this.souls -= this.dodgeCost();
    this.upDodge++;
    return true;
  }
  buyTrait(k) {
    const lv = this.traitLevel(k);
    if (lv >= this.traitMax(k) || !this.traitUnlocked(k)) return false;
    const c = this.traitCost(lv);
    if (this.souls < c) return false;
    this.souls -= c;
    if (k === 'attack') this.trAttack++;
    if (k === 'defense') this.trDefense++;
    if (k === 'utility') this.trUtility++;
    if (k === 'pull') this.trPull++;
    if (k === 'luck') this.trLuck++;
    return true;
  }
}

function generateFloor(floor, rng) {
  const cap = min(floor, 3);
  const maxDepth = 3 + cap + (rng.nextBool() ? 1 : 0);
  const nodes = [];
  const byDepth = [];
  let idc = 0;

  for (let d = 0; d <= maxDepth; d++) {
    const count = (d === 0 || d === maxDepth) ? 1 : (rng.nextBool() ? 2 : 1);
    const ids = [];
    for (let j = 0; j < count; j++) {
      const type = d === 0 ? RoomType.start : (d === maxDepth ? RoomType.boss : RoomType.combat);
      nodes.add(new RoomNode(idc, d, type, []));
      ids.add(idc);
      idc++;
    }
    byDepth.add(ids);
  }

  const middle = nodes.where(n => n.depth > 0 && n.depth < maxDepth).toList();
  if (middle.isNotEmpty) {
    const pick = middle[rng.nextInt(middle.length)];
    const idx = nodes.indexWhere(n => n.id === pick.id);
    nodes[idx] = new RoomNode(pick.id, pick.depth, RoomType.shop, pick.next);
  }

  for (let d = 0; d < maxDepth; d++) {
    const cur = byDepth[d];
    const nxt = byDepth[d + 1];
    const covered = new Set();
    for (const cid of cur) {
      const node = nodes.firstWhere(n => n.id === cid);
      const links = (nxt.length > 1 && rng.nextBool()) ? 2 : 1;
      const shuffled = nxt.slice(); shuffled.shuffle(rng);
      for (let i = 0; i < links && i < shuffled.length; i++) {
        node.next.add(shuffled[i]);
        covered.add(shuffled[i]);
      }
    }
    for (const nid of nxt) {
      if (!covered.contains(nid)) {
        const cid = cur[rng.nextInt(cur.length)];
        const cNode = nodes.firstWhere(n => n.id === cid);
        if (!cNode.next.contains(nid)) cNode.next.add(nid);
      }
    }
  }

  const biome = Biome.values[rng.nextInt(Biome.values.length)];
  return new FloorGraph(nodes, byDepth[0][0], byDepth[maxDepth][0], maxDepth, { biome: biome });
}

function buildRoom(node, floor, rng, g, usedBosses = null) {
  const type = node.type;
  const biome = kBiomes[g.biome];
  let width;
  let tall = false;
  if (type === RoomType.boss) {
    width = 1700.0;
  } else if (type === RoomType.shop) {
    width = 1500.0;
  } else if (type === RoomType.start) {
    width = 1500.0 + rng.nextDouble() * 600;
  } else {
    const roll = rng.nextDouble();
    if (roll < 0.45) {
      width = 1500.0 + rng.nextDouble() * 600;
    } else if (roll < 0.68) {
      width = 2500.0 + rng.nextDouble() * 1100;
    } else if (roll < 0.85) {
      width = 1500.0 + rng.nextDouble() * 500;
      tall = true;
    } else {
      width = 2500.0 + rng.nextDouble() * 1100;
      tall = true;
    }
  }

  const bottom = kGroundY + 320;

  const groundSegments = [];
  if (type === RoomType.combat) {
    const terraceStep = 26.0;
    const hillTop = kGroundY - 150;
    const valleyTop = kGroundY + 80;
    let curTop = kGroundY;
    const startFlat = 340.0;
    groundSegments.add(Rect.fromLTWH(0, curTop, startFlat, bottom - curTop));
    let gx = startFlat;
    while (gx < width) {
      const plateauW = 140 + rng.nextDouble() * 260;
      const endP = min(gx + plateauW, width);
      groundSegments.add(Rect.fromLTWH(gx, curTop, endP - gx, bottom - curTop));
      gx = endP;
      if (gx >= width) break;
      const dir = rng.nextBool() ? -1.0 : 1.0;
      const steps = 1 + rng.nextInt(3);
      for (let s = 0; s < steps && gx < width; s++) {
        const nt = (curTop + dir * terraceStep).clamp(hillTop, valleyTop);
        if (nt === curTop) break;
        curTop = nt;
        const stairW = 30 + rng.nextDouble() * 28;
        const endS = min(gx + stairW, width);
        groundSegments.add(Rect.fromLTWH(gx, curTop, endS - gx, bottom - curTop));
        gx = endS;
      }
    }
    if (gx < width) {
      groundSegments.add(Rect.fromLTWH(gx, curTop, width - gx, bottom - curTop));
    }
  } else {
    groundSegments.add(Rect.fromLTWH(0, kGroundY, width, bottom - kGroundY));
  }

  function groundTopAt(qx) {
    for (const s of groundSegments) {
      if (qx >= s.left && qx < s.right) return s.top;
    }
    return kGroundY;
  }

  let minTop = kGroundY;
  for (const s of groundSegments) {
    if (s.top < minTop) minTop = s.top;
  }
  const ground = Rect.fromLTWH(0, minTop, width, bottom - minTop);
  const solids = [
    ...groundSegments,
    Rect.fromLTWH(-60, -600, 60, 1600),
    Rect.fromLTWH(width, -600, 60, 1600),
  ];

  const platforms = [];
  const surfaces = [ground];
  if (type !== RoomType.boss) {
    const maxLayers = tall ? 6 : 2;
    const topLimit = tall ? -260.0 - rng.nextDouble() * 200 : 130.0;
    let x = 320;
    while (x < width - 360) {
      if (rng.nextDouble() < 0.72) {
        let curY = groundTopAt(x);
        let lx = x;
        const layers = tall ? (3 + rng.nextInt(maxLayers - 2)) : (1 + (rng.nextDouble() < 0.45 ? 1 : 0));
        for (let L = 0; L < layers; L++) {
          const pw = L === 0 ? 120 + rng.nextDouble() * 120 : 90 + rng.nextDouble() * 80;
          const rise = L === 0 ? 90 + rng.nextDouble() * 55 : 100 + rng.nextDouble() * 45;
          const ny = curY - rise;
          if (ny < topLimit) break;
          lx = (lx + (L === 0 ? 0 : rng.nextDouble() * 70 - 12)).clamp(40.0, width - pw - 40);
          const p = Rect.fromLTWH(lx, ny, pw, 20);
          platforms.add(p);
          surfaces.add(p);
          curY = ny;
        }
      }
      x += 250 + rng.nextDouble() * 210;
    }
  }

  let highestTop = kGroundY;
  for (const p of platforms) {
    if (p.top < highestTop) highestTop = p.top;
  }
  const camMinY = min(0.0, highestTop - 110);

  const shop = [];
  if (type === RoomType.shop) {
    const defs = _shopDefs(rng);
    for (let i = 0; i < defs.length; i++) {
      const px = width * 0.42 + (i - (defs.length - 1) / 2) * 230;
      shop.add(new ShopItem(defs[i][0], defs[i][1], defs[i][2], Rect.fromLTWH(px - 32, kGroundY - 56, 64, 56)));
    }
  }
  const shopXs = shop.map(s => s.pedestal.center.dx);
  const clearOfShops = (x) => shopXs.every(sx => (sx - x).abs() > 150);

  const doors = [];
  if (type !== RoomType.boss) {
    const dn = node.next.length;
    const isShop = type === RoomType.shop;
    const cands = [];
    const fxStart = isShop ? 0.84 : 0.5;
    for (let fx = fxStart; fx <= 0.94; fx += 0.05) {
      const x = width * fx;
      if (isShop && !clearOfShops(x)) continue;
      cands.add(new Offset(x, groundTopAt(x)));
    }
    for (const p of platforms) {
      if (p.center.dx > width * 0.42 && p.width > 90 && (!isShop || clearOfShops(p.center.dx))) {
        cands.add(new Offset(p.center.dx, p.top));
      }
    }
    cands.shuffle(rng);
    const chosen = [];
    for (const c of cands) {
      if (chosen.length >= dn) break;
      if (chosen.every(o => (o.dx - c.dx).abs() > 180)) chosen.add(c);
    }
    let fi = 0;
    while (chosen.length < dn) {
      const fx = isShop ? (0.94 - 0.08 * fi) : (0.6 + 0.12 * fi);
      const dx = (width * fx).clamp(0.0, width - 80);
      chosen.add(new Offset(dx, groundTopAt(dx)));
      fi++;
    }
    for (let i = 0; i < dn; i++) {
      const t = g.byId(node.next[i]);
      const a = chosen[i];
      doors.add(new Door(Rect.fromLTWH(a.dx - 35, a.dy - 120, 70, 120), t.id, t.type));
    }
  }

  const doorXs = doors.map(d => d.rect.center.dx);
  const clearOfDoors = (x) => doorXs.every(dx => (dx - x).abs() > 110);

  const spawns = [];
  if (type === RoomType.combat) {
    const cnt = min(3 + Math.trunc(floor / 2) + rng.nextInt(3), 6);
    for (let i = 0; i < cnt; i++) {
      let kind = biome.pool[rng.nextInt(biome.pool.length)];
      if (floor >= 6 && _fireBiome(g.biome) && rng.nextDouble() < 0.12 + floor * 0.015) kind = EnemyKind.fireMage;
      if (floor >= 3 && _humanBiome(g.biome) && rng.nextDouble() < 0.18) kind = EnemyKind.assassin;
      if (_humanBiome(g.biome) && rng.nextDouble() < 0.12) kind = EnemyKind.thief;
      if (floor >= 6 && _darkBiome(g.biome) && rng.nextDouble() < 0.14) kind = EnemyKind.heretic;
      if (floor >= 2 && (g.biome === Biome.keep || g.biome === Biome.kingdom) && rng.nextDouble() < 0.2) kind = EnemyKind.knightSoldier;
      if ((g.biome === Biome.goblinCamp || g.biome === Biome.bloodRiver || g.biome === Biome.ruins) && rng.nextDouble() < 0.16) kind = EnemyKind.brawler;
      if ((g.biome === Biome.cave || g.biome === Biome.ruins || g.biome === Biome.keep || g.biome === Biome.kingdom || g.biome === Biome.crystalMine) && rng.nextDouble() < 0.12) kind = EnemyKind.gargoyle;
      if (floor >= 4 && _darkBiome(g.biome) && rng.nextDouble() < 0.16) kind = EnemyKind.ghoul;
      let sx, sy;
      if (kind === EnemyKind.bat) {
        sx = 320 + rng.nextDouble() * (width - 640);
        sy = kGroundY - (150 + rng.nextDouble() * (tall ? 460 : 170));
      } else if (platforms.isNotEmpty && rng.nextBool()) {
        const s = platforms[rng.nextInt(platforms.length)];
        sx = s.left + rng.nextDouble() * max(20.0, s.width - 30);
        sy = s.top;
      } else {
        sx = 300 + rng.nextDouble() * max(120.0, width - 420);
        sy = groundTopAt(sx);
      }
      if (sx < 300) sx = 300 + rng.nextDouble() * 160;
      spawns.add(new SpawnInfo(kind, sx, sy));
    }
  }

  let chest = null;
  if (type === RoomType.combat && rng.nextDouble() < 0.08) {
    const cx = width * (0.4 + rng.nextDouble() * 0.2);
    chest = new Chest(cx, { groundY: groundTopAt(cx) });
  }

  const bushes = [];
  if (type === RoomType.combat || type === RoomType.start) {
    const bn = 1 + rng.nextInt(3);
    for (let i = 0; i < bn; i++) {
      let bx = 0;
      for (let tryN = 0; tryN < 6; tryN++) {
        bx = width * (0.3 + rng.nextDouble() * 0.6);
        if (clearOfDoors(bx)) break;
        bx = -1;
      }
      if (bx < 0) continue;
      const by = groundTopAt(bx);
      bushes.add(new Bush(Rect.fromLTWH(bx - 45, by - 46, 90, 46)));
    }
  }

  const traps = [];
  if (type === RoomType.combat) {
    let trapPool;
    switch (g.biome) {
      case Biome.volcano:
      case Biome.magma:
      case Biome.dragonLair:
        trapPool = ['flame', 'flame', 'spike', 'arrow']; break;
      case Biome.cave:
      case Biome.crystalMine:
      case Biome.dwarfMine:
        trapPool = ['saw', 'saw', 'spike', 'arrow']; break;
      case Biome.keep:
      case Biome.kingdom:
        trapPool = ['arrow', 'arrow', 'spike', 'saw']; break;
      default:
        trapPool = ['spike', 'saw', 'arrow'];
    }
    const tn = rng.nextInt(3);
    for (let i = 0; i < tn; i++) {
      const tx = width * (0.35 + rng.nextDouble() * 0.5);
      if (!clearOfDoors(tx)) continue;
      const ty = groundTopAt(tx);
      const kind = trapPool[rng.nextInt(trapPool.length)];
      if (kind === 'spike') {
        traps.add(new Trap('spike', tx - 32, ty - 18, 64, 18));
      } else if (kind === 'saw') {
        const span = 120 + rng.nextDouble() * 160;
        traps.add(new Trap('saw', tx, ty - 22, 34, 22, { minX: (tx - span).clamp(40.0, width - 80), maxX: (tx + span).clamp(80.0, width - 50) }));
      } else if (kind === 'flame') {
        traps.add(new Trap('flame', tx - 18, ty - 12, 36, 12));
      } else {
        traps.add(new Trap('arrow', tx - 11, ty - 150, 22, 30));
      }
    }
  }

  const props = [];
  if (type !== RoomType.boss) {
    const usedX = [];
    let propKinds;
    switch (g.biome) {
      case Biome.forest: propKinds = ['crate', 'torch', 'mushroom', 'pillar', 'root', 'banner']; break;
      case Biome.cave: propKinds = ['stone', 'stalactite', 'pillar', 'torch', 'skull', 'root']; break;
      case Biome.ruins: propKinds = ['barrel', 'banner', 'sign', 'pillar', 'rune', 'torch']; break;
      case Biome.volcano: propKinds = ['stone', 'torch', 'rune', 'sign', 'pillar']; break;
      case Biome.abyss: propKinds = ['skull', 'rune', 'pillar', 'torch', 'stone']; break;
      case Biome.keep: propKinds = ['banner', 'crate', 'pillar', 'torch', 'sign']; break;
      case Biome.kingdom: propKinds = ['banner', 'sign', 'pillar', 'crate', 'torch']; break;
      case Biome.goblinCamp: propKinds = ['skull', 'root', 'crate', 'torch', 'mushroom']; break;
      case Biome.dragonLair: propKinds = ['stone', 'rune', 'pillar', 'sign', 'torch']; break;
      case Biome.dwarfMine: propKinds = ['barrel', 'stone', 'pillar', 'torch', 'sign']; break;
      case Biome.crystalMine: propKinds = ['rune', 'stone', 'crystal', 'pillar', 'torch']; break;
      case Biome.magma: propKinds = ['stone', 'rune', 'torch', 'pillar']; break;
      case Biome.bearCave: propKinds = ['root', 'stone', 'skull', 'pillar']; break;
      case Biome.darkForest: propKinds = ['mushroom', 'root', 'banner', 'torch']; break;
      case Biome.silentJungle: propKinds = ['mushroom', 'root', 'banner', 'rune']; break;
      case Biome.bloodRiver: propKinds = ['skull', 'rune', 'stone', 'sign']; break;
      default: propKinds = ['crate', 'torch', 'pillar'];
    }
    const propCount = 2 + rng.nextInt(4);
    for (let i = 0; i < propCount; i++) {
      let px = -1;
      for (let attempt = 0; attempt < 6; attempt++) {
        px = width * (0.2 + rng.nextDouble() * 0.55);
        if (!clearOfDoors(px)) continue;
        if (usedX.any(x => (x - px).abs() < 150)) continue;
        break;
      }
      if (px < 0) continue;
      usedX.add(px);
      const anchorY = groundTopAt(px) - 8;
      const kind = propKinds[rng.nextInt(propKinds.length)];
      let color, w0, h0;
      switch (kind) {
        case 'crate': color = new Color(0xFF8D6E63); w0 = 56; h0 = 44; break;
        case 'barrel': color = new Color(0xFF6D4C41); w0 = 42; h0 = 48; break;
        case 'torch': color = new Color(0xFFFFAB40); w0 = 22; h0 = 60; break;
        case 'skull': color = new Color(0xFFECEFF1); w0 = 34; h0 = 34; break;
        case 'mushroom': color = biome.accent; w0 = 34; h0 = 40; break;
        case 'stone': color = biome.hill; w0 = 44; h0 = 52; break;
        case 'banner': color = biome.accent; w0 = 44; h0 = 56; break;
        case 'pillar': color = biome.ground; w0 = 30; h0 = 60; break;
        case 'root': color = new Color(0xFF4E342E); w0 = 32; h0 = 62; break;
        case 'stalactite': color = new Color(0xFFB0BEC5); w0 = 24; h0 = 46; break;
        case 'rune': color = biome.accent; w0 = 32; h0 = 32; break;
        case 'crystal': color = biome.accent; w0 = 28; h0 = 48; break;
        case 'sign':
        default: color = new Color(0xFF6D4C41); w0 = 36; h0 = 44; break;
      }
      const rect = Rect.fromLTWH(px - w0 / 2, anchorY - h0, w0, h0);
      props.add(new RoomProp(kind, rect, color));
    }
  }

  const boss = type === RoomType.boss ? pickBoss(floor, rng, usedBosses, g.biome) : null;
  if (boss !== null && usedBosses) usedBosses.add(boss.name);
  return new RoomData(type, width, ground, platforms, solids, spawns, doors, shop, boss, chest, bushes, traps, props, { groundSegments: groundSegments, camMinY: camMinY });
}

function _shopDefs(rng) {
  const pool = [
    ['체력 회복 +50', 'heal', 14],
    ['최대 체력 +25', 'maxhp', 28],
    ['공격력 +25%', 'atk', 34],
    ['보호막 (20초)', 'shieldbuff', 24],
    ['재생 물약 (15초)', 'regenbuff', 22],
    ['신속 물약 (18초)', 'hastebuff', 22],
    ['격노 물약 (15초)', 'atkupbuff', 26],
    ['흡혈 부적 (영구)', 'lifesteal', 42],
  ];
  pool.shuffle(rng);
  return pool.take(3).toList();
}

const _tier0 = [
  new BossSpec('멧돼지 왕', BossArchetype.boarSmash, BossShape.beast, new Color(0xFF8D6E63), 330, 185, { visual: 'boar' }),
  new BossSpec('고블린 족장', BossArchetype.guardian, BossShape.humanoid, new Color(0xFF9B5DE5), 300, 130, { visual: 'goblin' }),
